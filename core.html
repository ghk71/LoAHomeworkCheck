<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 코어현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#0a0a0f;--s1:#111118;--s2:#16161f;--s3:#1e1e2a;--border:#2a2a3d;--border-lit:#3d3d5c;--gold:#c8a84b;--gold-bright:#e8c86a;--gold-dim:#8a6e2a;--gold-glow:rgba(200,168,75,.2);--text:#e0ddd5;--muted:#5a5f72;--dim:#2e3045;--green:#2ecc71;--red:#e74c3c;--teal:#1abc9c;--r:5px;
  --grade-hero:#5b8dd9;--grade-legend:#d4a017;--grade-relic:#4aa8e8;--grade-ancient:#e8e4d8;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column;}
.page-nav{background:#070710;border-bottom:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;}
.pnav-item{padding:8px 20px;font-size:.82rem;color:var(--muted);text-decoration:none;transition:all .15s;display:flex;align-items:center;gap:6px;border-right:1px solid var(--border);}
.pnav-item:hover{color:var(--text);background:rgba(255,255,255,.03);}
.pnav-item.active{color:var(--gold);background:rgba(200,168,75,.06);border-bottom:2px solid var(--gold);}
.header{background:var(--s1);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);}
.header-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);letter-spacing:2px;}
.main-content{flex:1;overflow-y:auto;padding:16px 22px;}
.grade-none{background:var(--s3);color:var(--dim);border:2px solid var(--border);}
.grade-hero{background:rgba(30,50,100,.55);color:var(--grade-hero);border:2px solid rgba(91,141,217,.5);}
.grade-legend{background:rgba(80,55,0,.5);color:var(--grade-legend);border:2px solid rgba(212,160,23,.55);}
.grade-relic{background:rgba(20,60,110,.5);color:var(--grade-relic);border:2px solid rgba(74,168,232,.55);}
.grade-ancient{background:rgba(200,190,160,.15);color:var(--grade-ancient);border:2px solid rgba(220,210,185,.5);}
.grade-skip{background:#0d0d0d;color:#111;border:2px solid #0a0a0a;}
.view-mode-bar{display:flex;align-items:center;gap:6px;margin-bottom:14px;padding:9px 14px;background:var(--s2);border:1px solid var(--border);border-radius:6px;flex-wrap:wrap;}
.vm-label{font-size:.74rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-right:4px;}
.vm-opt{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:12px;border:1px solid var(--border);cursor:pointer;font-size:.8rem;font-family:'Noto Sans KR',sans-serif;color:var(--muted);background:var(--s3);transition:all .15s;user-select:none;}
.vm-opt:hover{border-color:var(--border-lit);color:var(--text);}
.vm-opt.on{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,.09);}
/* Lock */
.lock-btn{padding:5px 12px;border-radius:12px;border:1px solid var(--border);cursor:pointer;font-size:.8rem;font-family:'Noto Sans KR',sans-serif;color:var(--muted);background:var(--s3);transition:all .15s;user-select:none;margin-left:auto;}
.lock-btn:hover{border-color:var(--border-lit);color:var(--text);}
.lock-btn.locked{border-color:#e74c3c;color:#e74c3c;background:rgba(231,76,60,.09);}
.core-locked .core-cell{pointer-events:none;cursor:default;}
.core-locked .core-name-input{pointer-events:none;}
.core-locked .core-priority-btn{display:none;}
.core-locked .row-hide-btn{display:none;}
.core-locked .cgr-badge{pointer-events:none;cursor:default;}
.core-locked .cgr-prio{display:none;}
.core-locked .combo-add-btn{display:none;}
.core-locked .btn-ghost,.core-locked .btn-danger{display:none;}
.grade-legend-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
.grade-pill{padding:2px 10px;border-radius:10px;font-size:.74rem;font-weight:600;border:1px solid;}
.grade-pill.hero{background:rgba(30,50,100,.5);color:var(--grade-hero);border-color:rgba(91,141,217,.5);}
.grade-pill.legend{background:rgba(80,55,0,.45);color:var(--grade-legend);border-color:rgba(212,160,23,.5);}
.grade-pill.relic{background:rgba(20,60,110,.45);color:var(--grade-relic);border-color:rgba(74,168,232,.5);}
.grade-pill.ancient{background:rgba(200,190,160,.12);color:var(--grade-ancient);border-color:rgba(220,210,185,.45);}
.grade-pill.skip{background:#0d0d0d;color:#444;border-color:#222;}
.grade-hint{font-size:.73rem;color:var(--muted);}
.filter-bar{margin-bottom:14px;background:var(--s2);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.filter-bar-hd{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;user-select:none;transition:background .12s;}
.filter-bar-hd:hover{background:rgba(255,255,255,.02);}
.filter-label{font-size:.75rem;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;flex:1;}
.filter-bar-body{padding:9px 14px 12px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;border-top:1px solid var(--border);}
.char-filter-btn{padding:4px 11px;border-radius:12px;border:1px solid var(--border);background:var(--s3);color:var(--muted);cursor:pointer;font-size:.79rem;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.char-filter-btn:hover{border-color:var(--border-lit);color:var(--text);}
.char-filter-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,.09);}
.core-table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:6px;margin-bottom:18px;}
.core-table{width:100%;border-collapse:collapse;}
.core-table th{background:var(--s1);padding:8px;border:1px solid var(--border);font-size:.74rem;color:var(--muted);font-weight:600;text-align:center;white-space:nowrap;}
.core-table th.type-header{text-align:left;padding-left:12px;min-width:120px;}
.core-table th.char-header{min-width:110px;}
.core-table td{padding:0;border:1px solid var(--border);vertical-align:middle;}
.section-hrow{cursor:pointer;user-select:none;}
.section-hrow-td{background:var(--s1);padding:6px 12px;font-size:.71rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.sec-order{color:#a0c8ff;}.sec-chaos{color:#ffb0b0;}.sec-num{color:var(--gold);}
.core-row-label-wrap{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--s1);}
.core-row-label-text{font-size:.78rem;color:var(--muted);flex:1;white-space:nowrap;}
.row-hide-btn{font-size:.65rem;background:none;border:none;cursor:pointer;color:var(--dim);opacity:0;transition:opacity .15s;padding:2px;}
.core-row-label-wrap:hover .row-hide-btn{opacity:1;}
.core-cell-wrap{position:relative;display:flex;flex-direction:column;}
.core-cell{width:100%;min-height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:.73rem;font-weight:600;}
.core-cell:hover{filter:brightness(1.18);}
.core-priority-btn{position:absolute;top:2px;right:2px;font-size:.58rem;background:none;border:none;cursor:pointer;opacity:0;transition:opacity .15s;z-index:2;padding:2px;}
.core-cell-wrap:hover .core-priority-btn,.core-cell-wrap.is-priority .core-priority-btn{opacity:1;}
.core-name-input{width:100%;background:transparent;border:none;border-top:1px solid var(--border);color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:.67rem;padding:3px 6px;outline:none;text-align:center;transition:all .15s;}
.core-name-input:focus{background:rgba(200,168,75,.06);color:var(--gold);border-top-color:rgba(200,168,75,.3);}
.core-name-input::placeholder{color:var(--dim);}
.combo-section-label{font-family:'Cinzel',serif;font-size:.9rem;color:var(--gold);letter-spacing:1px;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
.combo-section-label::after{content:'';flex:1;height:1px;background:var(--gold-dim);}
.combo-cards-wrap{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:22px;}
.combo-char-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;min-width:210px;max-width:270px;flex:1;overflow:hidden;}
.ccard-header{padding:9px 14px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.ccard-name{font-size:.88rem;font-weight:700;flex:1;}
.ccard-ilvl{font-size:.69rem;color:var(--muted);}
.ccard-body{padding:8px 10px 4px;}
.ccard-empty{font-size:.78rem;color:var(--dim);padding:6px 0;text-align:center;}
.combo-entry{margin-bottom:9px;border:1px solid var(--border);border-radius:5px;overflow:hidden;}
.combo-entry-hd{display:flex;align-items:center;gap:6px;padding:5px 9px;background:var(--s3);border-bottom:1px solid var(--border);}
.combo-label-text{font-size:.76rem;font-weight:600;flex:1;color:var(--gold-bright);}
.combo-nums-text{font-size:.67rem;color:var(--muted);}
.combo-grade-list{padding:5px 9px;display:flex;flex-direction:column;gap:3px;}
.combo-grade-row{display:flex;align-items:center;gap:8px;font-size:.74rem;padding:2px 0;}
.cgr-name{width:58px;flex-shrink:0;color:var(--muted);font-size:.71rem;}
.cgr-badge{padding:2px 10px;border-radius:8px;font-size:.69rem;font-weight:600;border:1px solid;cursor:pointer;transition:filter .12s;user-select:none;display:inline-block;}
.cgr-badge:hover{filter:brightness(1.28);}
.cgr-prio{background:none;border:none;cursor:pointer;font-size:.62rem;padding:0 2px;opacity:.45;transition:opacity .15s;}
.cgr-prio:hover{opacity:1;}.cgr-prio.on{opacity:1;}
.combo-add-btn{display:block;width:calc(100% - 20px);margin:4px 10px 9px;padding:5px;border:1px dashed var(--border);border-radius:var(--r);background:none;color:var(--dim);cursor:pointer;font-size:.75rem;font-family:'Noto Sans KR',sans-serif;transition:all .15s;text-align:center;}
.combo-add-btn:hover{border-color:var(--gold);color:var(--gold);}
.hidden-mgmt-wrap{display:flex;flex-wrap:wrap;gap:6px;max-height:200px;overflow-y:auto;}
.hidden-row-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--s3);border:1px solid var(--border);border-radius:10px;font-size:.76rem;}
.hidden-chip-key{color:var(--muted);}
.hidden-chip-restore{background:none;border:none;cursor:pointer;color:var(--teal);font-size:.71rem;padding:0 2px;}
.hidden-chip-restore:hover{color:var(--gold);}
.btn{padding:7px 14px;border-radius:var(--r);border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.82rem;transition:all .15s;display:inline-flex;align-items:center;gap:5px;line-height:1;}
.btn-gold{background:var(--gold);color:#1a0f00;font-weight:700;}.btn-gold:hover{background:var(--gold-bright);}
.btn-sec{background:var(--s3);color:var(--text);border:1px solid var(--border-lit);}.btn-sec:hover{border-color:var(--gold);color:var(--gold-bright);}
.btn-ghost{background:transparent;color:var(--muted);padding:4px 7px;font-size:.74rem;border-radius:3px;}.btn-ghost:hover{color:var(--text);}
.btn-danger{background:transparent;color:var(--red);padding:4px 7px;font-size:.74rem;border-radius:3px;}.btn-danger:hover{background:rgba(231,76,60,.12);}
.btn-sm{padding:4px 9px;font-size:.76rem;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--s2);border:1px solid var(--gold-dim);border-radius:8px;padding:24px 26px;width:100%;max-width:440px;box-shadow:0 0 60px var(--gold-glow),0 20px 60px rgba(0,0,0,.5);max-height:88vh;overflow-y:auto;}
.modal-title{font-family:'Cinzel',serif;color:var(--gold);font-size:1.02rem;letter-spacing:1px;margin-bottom:18px;}
.form-group{margin-bottom:12px;}.form-label{display:block;font-size:.74rem;color:var(--muted);margin-bottom:4px;letter-spacing:.5px;}
.form-row{display:flex;gap:10px;}.form-row>.form-group{flex:1;}
.form-input,.form-select{width:100%;background:var(--s1);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:var(--r);font-family:'Noto Sans KR',sans-serif;font-size:.87rem;transition:border .15s;outline:none;-webkit-appearance:none;}
.form-input:focus,.form-select:focus{border-color:var(--gold);}.form-select option{background:var(--s2);}
.modal-footer{display:flex;gap:7px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-full{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:var(--muted);font-size:.88rem;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:var(--s1);}::-webkit-scrollbar-thumb{background:var(--border-lit);border-radius:3px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--s3);border:1px solid var(--gold-dim);color:var(--text);padding:9px 16px;border-radius:var(--r);font-size:.84rem;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:300;animation:toastIn .25s ease,toastOut .25s ease 2.25s forwards;}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes toastOut{to{opacity:0;transform:translateY(8px);}}
</style>
</head>
<body>
<nav class="page-nav">
  <a href="index.html" class="pnav-item">⚔️ 숙제</a>
  <a href="core.html" class="pnav-item active">🔮 코어현황</a>
  <a href="raid.html" class="pnav-item">🏰 레이드</a>
  <a href="overview.html" class="pnav-item">📊 레이드 현황</a>
</nav>
<div class="header">
  <span>🔮</span>
  <div class="header-title">코어현황</div>
  <div style="margin-left:auto;font-size:.75rem;color:var(--muted);">좌클릭: 등급 순환 &nbsp;|&nbsp; 우클릭: 제외 &nbsp;|&nbsp; ⭐: 필수 &nbsp;|&nbsp; 이름: 직접 입력</div>
</div>
<div class="main-content">
  <div id="loading" class="loading-full"><div class="spinner"></div> 불러오는 중...</div>
  <div id="content" style="display:none;">
    <div class="grade-legend-row">
      <span class="grade-hint">등급:</span>
      <span class="grade-pill">없음</span><span class="grade-pill hero">영웅</span><span class="grade-pill legend">전설</span><span class="grade-pill relic">유물</span><span class="grade-pill ancient">고대</span><span class="grade-pill skip">제외</span>
      <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;">
        <button class="btn btn-sec btn-sm" onclick="openHiddenMgmt()">🙈 숨긴 코어 관리</button>
        <button class="btn btn-sec btn-sm" onclick="resetAll()">전체 초기화</button>
      </div>
    </div>
    <div class="view-mode-bar">
      <span class="vm-label">보기:</span>
      <div class="vm-opt" id="vm-basic" onclick="setViewMode('basic')">📋 기본</div>
      <div class="vm-opt" id="vm-numbered" onclick="setViewMode('numbered')">🔢 번호별 묶음</div>
      <div class="vm-opt" id="vm-combo" onclick="setViewMode('combo')">⚗️ 사용자 조합</div>
      <button class="lock-btn" id="lock-btn" onclick="toggleLock()">🔓 편집 가능</button>
    </div>
    <div class="filter-bar">
      <div class="filter-bar-hd" onclick="toggleFilterBar()">
        <span class="filter-label">🔍 캐릭터 필터</span>
        <span id="filter-selected-count" style="font-size:.73rem;color:var(--muted);"></span>
        <button class="btn btn-sec btn-sm" onclick="event.stopPropagation();selectAllChars()">전체</button>
        <button class="btn btn-sec btn-sm" onclick="event.stopPropagation();deselectAllChars()">해제</button>
        <span id="filter-toggle-icon" style="font-size:.7rem;color:var(--muted);">▼</span>
      </div>
      <div class="filter-bar-body" id="filter-bar-body">
        <div id="char-filters" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
      </div>
    </div>
    <div id="core-container"></div>
  </div>
</div>
<div class="overlay" id="modal-hidden"><div class="modal">
  <div class="modal-title">🙈 숨긴 코어 관리</div>
  <p style="font-size:.8rem;color:var(--muted);margin-bottom:14px;">숨긴 행은 모든 캐릭터에서 숨겨집니다.</p>
  <div class="hidden-mgmt-wrap" id="hidden-mgmt-list"></div>
  <div id="hidden-empty-msg" style="display:none;padding:14px;text-align:center;font-size:.82rem;color:var(--muted);">숨긴 코어가 없습니다</div>
  <div class="modal-footer"><button class="btn btn-sec" onclick="closeModal('modal-hidden')">닫기</button></div>
</div></div>
<div class="overlay" id="modal-combo"><div class="modal">
  <div class="modal-title" id="combo-modal-title">조합 추가</div>
  <div style="font-size:.8rem;color:var(--muted);margin-bottom:14px;" id="combo-char-label"></div>
  <div class="form-group"><label class="form-label">조합 이름</label><input class="form-input" id="combo-label" lang="ko" inputmode="text" placeholder="예: 딜러셋, 서포터셋"></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">질서해 번호</label><select class="form-select" id="combo-sun"></select></div>
    <div class="form-group"><label class="form-label">질서달 번호</label><select class="form-select" id="combo-moon"></select></div>
    <div class="form-group"><label class="form-label">질서별 번호</label><select class="form-select" id="combo-star"></select></div>
  </div>
  <input type="hidden" id="combo-char-id"><input type="hidden" id="combo-id">
  <div class="modal-footer"><button class="btn btn-sec" onclick="closeModal('modal-combo')">취소</button><button class="btn btn-gold" id="combo-submit-btn" onclick="submitCombo()">추가</button></div>
</div></div>
<script>
const{createClient}=supabase;
function getConfig(){const u=localStorage.getItem('la_url'),k=localStorage.getItem('la_key');return u&&k?{url:u,key:k}:null;}
let sb=null,allChars=[],selectedChars=new Set(),coreData={};
let filterCollapsed=localStorage.getItem('la_core_filter_col')==='1';
let viewMode=localStorage.getItem('la_core_view')||'combo';
let isLocked=localStorage.getItem('la_core_locked')==='1';

function toggleLock(){
  isLocked=!isLocked;
  localStorage.setItem('la_core_locked',isLocked?'1':'0');
  applyLock();
}
function applyLock(){
  const btn=document.getElementById('lock-btn');
  const container=document.getElementById('core-container');
  if(btn){btn.textContent=isLocked?'🔒 잠금':'🔓 편집 가능';btn.classList.toggle('locked',isLocked);}
  if(container){container.classList.toggle('core-locked',isLocked);}
  // Also lock the action buttons in header
  const resetBtn=document.querySelector('[onclick="resetAll()"]');
  const hiddenBtn=document.querySelector('[onclick="openHiddenMgmt()"]');
  if(resetBtn)resetBtn.disabled=isLocked;
  if(hiddenBtn)hiddenBtn.disabled=isLocked;
}
let collapsedSections=new Set(JSON.parse(localStorage.getItem('la_core_sections')||'[]'));
let hiddenRows=new Set(JSON.parse(localStorage.getItem('la_core_hidden')||'[]'));
const TYPES=[
  {group:'질서',type:'order',cls:'sec-order',elements:[{name:'해',key:'sun'},{name:'달',key:'moon'},{name:'별',key:'star'}]},
  {group:'혼돈',type:'chaos',cls:'sec-chaos',elements:[{name:'해',key:'sun'},{name:'달',key:'moon'},{name:'별',key:'star'}]}
];
const GRADES=['none','hero','legend','relic','ancient'];
const GL={none:'—',hero:'영웅',legend:'전설',relic:'유물',ancient:'고대',skip:'제외'};
const GC={none:'grade-none',hero:'grade-hero',legend:'grade-legend',relic:'grade-relic',ancient:'grade-ancient',skip:'grade-skip'};
const GB={
  none:'background:var(--s3);color:var(--dim);border-color:var(--border);',
  hero:'background:rgba(30,50,100,.55);color:#5b8dd9;border-color:rgba(91,141,217,.5);',
  legend:'background:rgba(80,55,0,.5);color:#d4a017;border-color:rgba(212,160,23,.55);',
  relic:'background:rgba(20,60,110,.5);color:#4aa8e8;border-color:rgba(74,168,232,.55);',
  ancient:'background:rgba(200,190,160,.15);color:#e8e4d8;border-color:rgba(220,210,185,.5);',
  skip:'background:#0d0d0d;color:#333;border-color:#111;',
};
const getGrade=(cid,k)=>(coreData[cid]?.cores[k]?.grade)||'none';
const getPrio=(cid,k)=>!!(coreData[cid]?.cores[k]?.priority);
const getCname=(cid,k)=>(coreData[cid]?.cores[k]?.name)||'';
const getCombos=(cid)=>(coreData[cid]?.cores.__combos)||[];
const ck=(t,e,s)=>`${t}_${e}_${s}`;
const sk=(t,e)=>`${t}_${e}`;
async function init(){
  const cfg=getConfig();if(!cfg){window.location.href='index.html';return;}
  sb=createClient(cfg.url,cfg.key);
  const[{data:accs},{data:chars},{data:cores}]=await Promise.all([
    sb.from('accounts').select('id,name,sort_order').order('sort_order').order('created_at'),
    sb.from('characters').select('*').order('sort_order').order('created_at'),
    sb.from('character_cores').select('*')
  ]);
  const aOrd={};(accs||[]).forEach((a,i)=>{aOrd[a.id]=a.sort_order??i;});
  allChars=(chars||[]).filter(c=>(c.item_level||0)>=1700).sort((a,b)=>{const d=(aOrd[a.account_id]??999)-(aOrd[b.account_id]??999);return d||((a.sort_order??0)-(b.sort_order??0));});
  const sv=localStorage.getItem('la_core_filter_sel');
  if(sv){try{const ids=JSON.parse(sv);selectedChars=new Set(ids.filter(id=>allChars.some(c=>c.id===id)));}catch{selectedChars=new Set(allChars.map(c=>c.id));}}
  else selectedChars=new Set(allChars.map(c=>c.id));
  (cores||[]).forEach(r=>{coreData[r.character_id]={id:r.id,cores:r.cores||{}};});
  allChars.forEach(c=>{if(!coreData[c.id])coreData[c.id]={id:null,cores:{}};});
  setViewModeUI(viewMode);
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  renderFilters();renderMain();applyLock();
}
function setViewMode(m){viewMode=m;localStorage.setItem('la_core_view',m);setViewModeUI(m);renderMain();}
function setViewModeUI(m){['basic','numbered','combo'].forEach(v=>document.getElementById('vm-'+v)?.classList.toggle('on',v===m));}
function saveFilter(){localStorage.setItem('la_core_filter_sel',JSON.stringify([...selectedChars]));}
function toggleFilterBar(){filterCollapsed=!filterCollapsed;localStorage.setItem('la_core_filter_col',filterCollapsed?'1':'0');document.getElementById('filter-bar-body').style.display=filterCollapsed?'none':'flex';document.getElementById('filter-toggle-icon').textContent=filterCollapsed?'▶':'▼';}
function renderFilters(){
  document.getElementById('char-filters').innerHTML=allChars.map(c=>`<button class="char-filter-btn ${selectedChars.has(c.id)?'on':''}" onclick="toggleChar('${c.id}')">${esc(c.name)}${c.item_level?` <span style="opacity:.55;font-size:.69rem">Lv.${c.item_level}</span>`:''}</button>`).join('');
  const cnt=document.getElementById('filter-selected-count');if(cnt)cnt.textContent=`${selectedChars.size}/${allChars.length}명`;
  document.getElementById('filter-bar-body').style.display=filterCollapsed?'none':'flex';
  document.getElementById('filter-toggle-icon').textContent=filterCollapsed?'▶':'▼';
}
function toggleChar(id){if(selectedChars.has(id))selectedChars.delete(id);else selectedChars.add(id);saveFilter();renderFilters();renderMain();}
function selectAllChars(){selectedChars=new Set(allChars.map(c=>c.id));saveFilter();renderFilters();renderMain();}
function deselectAllChars(){selectedChars.clear();saveFilter();renderFilters();renderMain();}
function toggleSection(key){if(collapsedSections.has(key))collapsedSections.delete(key);else collapsedSections.add(key);localStorage.setItem('la_core_sections',JSON.stringify([...collapsedSections]));renderMain();}
function hideRow(key){hiddenRows.add(key);localStorage.setItem('la_core_hidden',JSON.stringify([...hiddenRows]));renderMain();}
function restoreRow(key){hiddenRows.delete(key);localStorage.setItem('la_core_hidden',JSON.stringify([...hiddenRows]));renderMain();renderHiddenMgmt();}
function openHiddenMgmt(){renderHiddenMgmt();openModal('modal-hidden');}
function renderHiddenMgmt(){
  const el=document.getElementById('hidden-mgmt-list'),em=document.getElementById('hidden-empty-msg');
  if(!hiddenRows.size){el.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  const tm={order:'질서',chaos:'혼돈'},em2={sun:'해',moon:'달',star:'별'};
  el.innerHTML=[...hiddenRows].map(k=>{const p=k.split('_');const nm=`${tm[p[0]]||p[0]}${em2[p[1]]||p[1]}${p[2]||''}`;return`<div class="hidden-row-chip"><span class="hidden-chip-key">${nm}</span><button class="hidden-chip-restore" onclick="restoreRow('${k}')">👁 복원</button></div>`;}).join('');
}
function renderMain(){
  const vis=allChars.filter(c=>selectedChars.has(c.id));
  const el=document.getElementById('core-container');
  if(!vis.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:.85rem;">캐릭터를 선택하세요</div>';applyLock();return;}
  if(viewMode==='basic')renderBasic(vis,el);
  else if(viewMode==='numbered')renderNumbered(vis,el);
  else renderCombo(vis,el);
  applyLock();
}
function thead(vis){return`<thead><tr><th class="type-header">코어</th>${vis.map(c=>`<th class="char-header">${esc(c.name)}${c.item_level?`<br><span style="font-size:.66rem;font-weight:400;color:var(--muted)">Lv.${c.item_level}</span>`:''}</th>`).join('')}</tr></thead><tbody>`;}
function cell(cid,key){const g=getGrade(cid,key),p=getPrio(cid,key),cn=getCname(cid,key);return`<td><div class="core-cell-wrap ${p?'is-priority':''}"><div class="core-cell ${GC[g]}" onclick="cycleGrade('${cid}','${key}',this)" oncontextmenu="toggleSkip('${cid}','${key}',this);return false;"><span>${GL[g]}</span></div><input class="core-name-input" value="${esc(cn)}" placeholder="코어명" onchange="saveCoreName('${cid}','${key}',this.value)" onclick="event.stopPropagation()" oncontextmenu="event.stopPropagation()"><button class="core-priority-btn" onclick="togglePriority('${cid}','${key}',this)">${p?'⭐':'☆'}</button></div></td>`;}
function renderBasic(vis,el){
  let h=thead(vis);
  TYPES.forEach(({group,type,cls,elements})=>{elements.forEach(({name,key:ek})=>{const sk2=sk(type,ek),col=collapsedSections.has(sk2);h+=`<tr class="section-hrow" onclick="toggleSection('${sk2}')"><td colspan="${vis.length+1}" class="section-hrow-td ${cls}"><span style="margin-right:6px;font-size:.65rem;">${col?'▶':'▼'}</span>${group} ${name}</td></tr>`;if(!col){for(let s=1;s<=6;s++){const rk=ck(type,ek,s);if(hiddenRows.has(rk))continue;h+=`<tr><td><div class="core-row-label-wrap"><span class="core-row-label-text">${group}${name}${s}</span><button class="row-hide-btn" onclick="event.stopPropagation();hideRow('${rk}')">🙈</button></div></td>`;vis.forEach(c=>{h+=cell(c.id,rk);});h+=`</tr>`;}}});});
  el.innerHTML=`<div class="core-table-wrap"><table class="core-table">${h}</tbody></table></div>`;
}
function renderNumbered(vis,el){
  let h=thead(vis);
  TYPES.forEach(({group,type,cls,elements})=>{const tsk=`${type}_all`,col=collapsedSections.has(tsk);h+=`<tr class="section-hrow" onclick="toggleSection('${tsk}')"><td colspan="${vis.length+1}" class="section-hrow-td ${cls}"><span style="margin-right:6px;font-size:.65rem;">${col?'▶':'▼'}</span>${group}</td></tr>`;if(!col){for(let s=1;s<=6;s++){const nsk=`${type}_num_${s}`,ncol=collapsedSections.has(nsk);h+=`<tr class="section-hrow" onclick="event.stopPropagation();toggleSection('${nsk}')"><td colspan="${vis.length+1}" class="section-hrow-td sec-num" style="padding-left:20px;"><span style="margin-right:6px;font-size:.65rem;color:var(--muted);">${ncol?'▶':'▼'}</span>${s}번</td></tr>`;if(!ncol){elements.forEach(({name,key:ek})=>{const rk=ck(type,ek,s);if(hiddenRows.has(rk))return;h+=`<tr><td><div class="core-row-label-wrap" style="padding-left:18px;"><span class="core-row-label-text">${group}${name}${s}</span><button class="row-hide-btn" onclick="event.stopPropagation();hideRow('${rk}')">🙈</button></div></td>`;vis.forEach(c=>{h+=cell(c.id,rk);});h+=`</tr>`;});}}}});
  el.innerHTML=`<div class="core-table-wrap"><table class="core-table">${h}</tbody></table></div>`;
}
function renderCombo(vis,el){
  let oH=`<div class="combo-section-label">⚗️ 질서 조합 (사용자 설정)</div><div class="combo-cards-wrap">`;
  vis.forEach(c=>{
    const combos=getCombos(c.id);
    const combosHTML=combos.map(combo=>{
      const rows=[
        {nm:`질서해${combo.sun}`, key:ck('order','sun',combo.sun)},
        {nm:`질서달${combo.moon}`, key:ck('order','moon',combo.moon)},
        {nm:`질서별${combo.star}`, key:ck('order','star',combo.star)}
      ].map(r=>{
        const g=getGrade(c.id,r.key),p=getPrio(c.id,r.key);
        return`<div class="combo-grade-row">
          <span class="cgr-name">${r.nm}</span>
          <span class="cgr-badge" style="${GB[g]||GB.none}" onclick="comboCycleGrade('${c.id}','${r.key}',this)">${GL[g]||'—'}</span>
          <button class="cgr-prio ${p?'on':''}" onclick="comboPrio('${c.id}','${r.key}',this)">${p?'⭐':'☆'}</button>
        </div>`;
      }).join('');
      return`<div class="combo-entry">
        <div class="combo-entry-hd">
          <span class="combo-label-text">${esc(combo.label||'조합')}</span>
          <span class="combo-nums-text">해${combo.sun}/달${combo.moon}/별${combo.star}</span>
          <button class="btn btn-ghost" style="padding:2px 5px;font-size:.67rem;" onclick="openEditCombo('${c.id}','${combo.id}')">✏️</button>
          <button class="btn btn-danger" style="padding:2px 4px;font-size:.67rem;" onclick="deleteCombo('${c.id}','${combo.id}')">🗑</button>
        </div>
        <div class="combo-grade-list">${rows}</div>
      </div>`;
    }).join('');
    oH+=`<div class="combo-char-card">
      <div class="ccard-header"><span class="ccard-name">${esc(c.name)}</span><span class="ccard-ilvl">${c.item_level?`Lv.${c.item_level}`:''}</span></div>
      <div class="ccard-body">${combos.length?'':'<div class="ccard-empty">조합을 추가하세요</div>'}${combosHTML}</div>
      <button class="combo-add-btn" onclick="openAddCombo('${c.id}')">＋ 조합 추가</button>
    </div>`;
  });
  oH+=`</div>`;
  // 혼돈: 번호별 테이블
  let cH=`<div class="combo-section-label">💫 혼돈 (번호별 묶음)</div>`;
  let th=thead(vis);
  const chaosT=TYPES.find(t=>t.type==='chaos');
  for(let s=1;s<=6;s++){const nsk=`chaos_num_${s}`,ncol=collapsedSections.has(nsk);th+=`<tr class="section-hrow" onclick="toggleSection('${nsk}')"><td colspan="${vis.length+1}" class="section-hrow-td sec-num"><span style="margin-right:6px;font-size:.65rem;color:var(--muted);">${ncol?'▶':'▼'}</span>${s}번</td></tr>`;if(!ncol){chaosT.elements.forEach(({name,key:ek})=>{const rk=ck('chaos',ek,s);if(hiddenRows.has(rk))return;th+=`<tr><td><div class="core-row-label-wrap"><span class="core-row-label-text">혼돈${name}${s}</span><button class="row-hide-btn" onclick="event.stopPropagation();hideRow('${rk}')">🙈</button></div></td>`;vis.forEach(c=>{th+=cell(c.id,rk);});th+=`</tr>`;});}}
  cH+=`<div class="core-table-wrap"><table class="core-table">${th}</tbody></table></div>`;
  el.innerHTML=oH+cH;
}
// ─── Debounced DB save (최적화: 500ms 내 연속 클릭은 마지막만 저장) ───
const _saveTimer={};
function scheduleSave(cid){clearTimeout(_saveTimer[cid]);_saveTimer[cid]=setTimeout(()=>saveCores(cid),500);}
async function saveCores(cid){const e=coreData[cid];if(!e)return;if(e.id){await sb.from('character_cores').update({cores:e.cores}).eq('id',e.id);}else{const{data}=await sb.from('character_cores').insert({character_id:cid,cores:e.cores}).select().single();if(data)coreData[cid].id=data.id;}}

function ensure(cid,key){if(!coreData[cid])coreData[cid]={id:null,cores:{}};if(key&&!coreData[cid].cores[key])coreData[cid].cores[key]={grade:'none',priority:false,name:''};}

// 테이블 셀 클릭 - DOM 직접 업데이트 (re-render 없음)
function cycleGrade(cid,key,el){
  ensure(cid,key);const cur=getGrade(cid,key),next=cur==='skip'?'none':GRADES[(GRADES.indexOf(cur)+1)%GRADES.length];
  coreData[cid].cores[key].grade=next;
  el.className=`core-cell ${GC[next]}`;el.querySelector('span').textContent=GL[next];
  scheduleSave(cid);
}
function toggleSkip(cid,key,el){
  ensure(cid,key);const n=getGrade(cid,key)==='skip'?'none':'skip';
  coreData[cid].cores[key].grade=n;
  el.className=`core-cell ${GC[n]}`;el.querySelector('span').textContent=GL[n];
  scheduleSave(cid);
}
function togglePriority(cid,key,btn){
  ensure(cid,key);const p=!coreData[cid].cores[key].priority;
  coreData[cid].cores[key].priority=p;
  btn.textContent=p?'⭐':'☆';btn.parentElement.classList.toggle('is-priority',p);
  scheduleSave(cid);
}

// 콤보 뷰 뱃지 클릭 - DOM 직접 업데이트 (re-render 없음)
function comboCycleGrade(cid,key,badgeEl){
  ensure(cid,key);const cur=getGrade(cid,key),next=cur==='skip'?'none':GRADES[(GRADES.indexOf(cur)+1)%GRADES.length];
  coreData[cid].cores[key].grade=next;
  badgeEl.textContent=GL[next];badgeEl.style.cssText=GB[next]||GB.none;
  scheduleSave(cid);
}
function comboPrio(cid,key,btn){
  ensure(cid,key);const p=!coreData[cid].cores[key].priority;
  coreData[cid].cores[key].priority=p;
  btn.textContent=p?'⭐':'☆';btn.classList.toggle('on',p);
  scheduleSave(cid);
}

const _nt={};
function saveCoreName(cid,key,val){ensure(cid,key);coreData[cid].cores[key].name=val;clearTimeout(_nt[cid+key]);_nt[cid+key]=setTimeout(()=>saveCores(cid),800);}
async function resetAll(){if(!confirm('화면에 보이는 캐릭터의 코어 데이터를 모두 초기화하시겠습니까?'))return;const vis=allChars.filter(c=>selectedChars.has(c.id));for(const c of vis){const combos=getCombos(c.id);coreData[c.id]={...(coreData[c.id]||{}),cores:{__combos:combos}};await saveCores(c.id);}renderMain();toast('✅ 초기화 완료');}
const genId=()=>'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const slotOpts=()=>[1,2,3,4,5,6].map(n=>`<option value="${n}">${n}</option>`).join('');
function openAddCombo(cid){document.getElementById('combo-modal-title').textContent='조합 추가';document.getElementById('combo-submit-btn').textContent='추가';document.getElementById('combo-char-id').value=cid;document.getElementById('combo-id').value='';document.getElementById('combo-label').value='';['combo-sun','combo-moon','combo-star'].forEach(id=>{document.getElementById(id).innerHTML=slotOpts();});const c=allChars.find(x=>x.id===cid);document.getElementById('combo-char-label').textContent=c?`${c.name}${c.item_level?' (Lv.'+c.item_level+')':''}의 조합`:'';openModal('modal-combo');}
function openEditCombo(cid,cid2){const combo=getCombos(cid).find(x=>x.id===cid2);if(!combo)return;document.getElementById('combo-modal-title').textContent='조합 수정';document.getElementById('combo-submit-btn').textContent='저장';document.getElementById('combo-char-id').value=cid;document.getElementById('combo-id').value=cid2;document.getElementById('combo-label').value=combo.label||'';['combo-sun','combo-moon','combo-star'].forEach(id=>{document.getElementById(id).innerHTML=slotOpts();});document.getElementById('combo-sun').value=String(combo.sun);document.getElementById('combo-moon').value=String(combo.moon);document.getElementById('combo-star').value=String(combo.star);const c=allChars.find(x=>x.id===cid);document.getElementById('combo-char-label').textContent=c?`${c.name}의 조합`:'';openModal('modal-combo');}
async function submitCombo(){const cid=document.getElementById('combo-char-id').value,cid2=document.getElementById('combo-id').value,label=document.getElementById('combo-label').value.trim(),sun=parseInt(document.getElementById('combo-sun').value),moon=parseInt(document.getElementById('combo-moon').value),star=parseInt(document.getElementById('combo-star').value);ensure(cid,null);if(!coreData[cid].cores.__combos)coreData[cid].cores.__combos=[];const combos=coreData[cid].cores.__combos;if(cid2){const idx=combos.findIndex(x=>x.id===cid2);if(idx>=0)combos[idx]={...combos[idx],label,sun,moon,star};toast('✅ 조합 수정됨');}else{combos.push({id:genId(),label:label||`조합${combos.length+1}`,sun,moon,star});toast('✅ 조합 추가됨');}await saveCores(cid);closeModal('modal-combo');renderMain();}
async function deleteCombo(cid,cid2){if(!confirm('이 조합을 삭제하시겠습니까?'))return;ensure(cid,null);if(!coreData[cid].cores.__combos)return;coreData[cid].cores.__combos=coreData[cid].cores.__combos.filter(x=>x.id!==cid2);await saveCores(cid);renderMain();toast('🗑️ 삭제됨');}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('open');}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'));});
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2600);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
init();
</script>
</body>
</html>
