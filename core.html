<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 코어현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#0a0a0f;--s1:#111118;--s2:#16161f;--s3:#1e1e2a;--s4:#252535;--border:#2a2a3d;--border-lit:#3d3d5c;--gold:#c8a84b;--gold-bright:#e8c86a;--gold-dim:#8a6e2a;--gold-glow:rgba(200,168,75,.2);--text:#e0ddd5;--muted:#5a5f72;--dim:#2e3045;--green:#2ecc71;--red:#e74c3c;--blue:#4a8fd4;--purple:#9b59b6;--teal:#1abc9c;--r:5px;
  --grade-hero:#9b59b6;--grade-legend:#27ae60;--grade-relic:#e74c3c;--grade-ancient:#e8d48a;--grade-skip:#1a1a1a;
}
*{margin:0;padding:0;box-sizing:border-box;}html,body{height:100%;overflow-y:auto;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;}

.page-nav{background:#070710;border-bottom:1px solid var(--border);display:flex;align-items:stretch;position:sticky;top:0;z-index:100;}
.pnav-item{padding:8px 20px;font-size:.82rem;color:var(--muted);text-decoration:none;transition:all .15s;display:flex;align-items:center;gap:6px;border-right:1px solid var(--border);}
.pnav-item:hover{color:var(--text);background:rgba(255,255,255,.03);}
.pnav-item.active{color:var(--gold);background:rgba(200,168,75,.06);border-bottom:2px solid var(--gold);}

.header{background:var(--s1);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;position:relative;}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);}
.header-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);letter-spacing:2px;}
.main-content{padding:18px 22px;}

/* Grade colors */
.grade-none{background:var(--s3);color:var(--dim);border:2px solid var(--border);}
.grade-hero{background:rgba(155,89,182,.22);color:var(--grade-hero);border:2px solid rgba(155,89,182,.45);}
.grade-legend{background:rgba(39,174,96,.2);color:var(--grade-legend);border:2px solid rgba(39,174,96,.45);}
.grade-relic{background:rgba(231,76,60,.2);color:var(--grade-relic);border:2px solid rgba(231,76,60,.45);}
.grade-ancient{background:rgba(232,212,138,.12);color:var(--grade-ancient);border:2px solid rgba(232,212,138,.38);}
.grade-skip{background:#0d0d0d;color:#222;border:2px solid #111;cursor:pointer;}

/* Filter bar */
.filter-bar{margin-bottom:16px;background:var(--s2);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.filter-bar-hd{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;user-select:none;transition:background .12s;}
.filter-bar-hd:hover{background:rgba(255,255,255,.02);}
.filter-label{font-size:.75rem;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;flex:1;}
.filter-toggle-icon{font-size:.7rem;color:var(--muted);}
.filter-bar-body{padding:9px 14px 12px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;border-top:1px solid var(--border);}
.char-filter-btn{padding:4px 11px;border-radius:12px;border:1px solid var(--border);background:var(--s3);color:var(--muted);cursor:pointer;font-size:.79rem;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.char-filter-btn:hover{border-color:var(--border-lit);color:var(--text);}
.char-filter-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,.09);}

/* Legend */
.grade-legend-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.grade-pill{padding:2px 10px;border-radius:10px;font-size:.74rem;font-weight:600;border:1px solid;}
.grade-pill.hero{background:rgba(155,89,182,.2);color:var(--grade-hero);border-color:rgba(155,89,182,.4);}
.grade-pill.legend{background:rgba(39,174,96,.2);color:var(--grade-legend);border-color:rgba(39,174,96,.4);}
.grade-pill.relic{background:rgba(231,76,60,.2);color:var(--grade-relic);border-color:rgba(231,76,60,.4);}
.grade-pill.ancient{background:rgba(232,212,138,.12);color:var(--grade-ancient);border-color:rgba(232,212,138,.35);}
.grade-pill.skip{background:#0d0d0d;color:#444;border-color:#222;}
.grade-hint{font-size:.73rem;color:var(--muted);}

/* Core table */
.core-table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:6px;}
.core-table{width:100%;border-collapse:collapse;}
.core-table th{background:var(--s1);padding:8px 8px;border:1px solid var(--border);font-size:.74rem;color:var(--muted);font-weight:600;text-align:center;white-space:nowrap;}
.core-table th.type-header{text-align:left;padding-left:12px;min-width:100px;}
.core-table th.char-header{min-width:110px;}
.core-table td{padding:0;border:1px solid var(--border);vertical-align:middle;}
.core-row-label{padding:6px 12px;font-size:.78rem;color:var(--muted);white-space:nowrap;background:var(--s1);}
.core-type-group{background:var(--s1);padding:5px 12px;font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--border);}
.core-group-order{color:#a0c8ff;}
.core-group-chaos{color:#ffb0b0;}

/* Core cell */
.core-cell-wrap{position:relative;display:flex;flex-direction:column;}
.core-cell{width:100%;min-height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:.73rem;font-weight:600;}
.core-cell:hover{filter:brightness(1.18);}
.core-cell-title{font-size:.65rem;letter-spacing:.2px;}

/* Core name input */
.core-name-input{width:100%;background:transparent;border:none;border-top:1px solid var(--border);color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:.67rem;padding:3px 6px;outline:none;text-align:center;transition:color .15s,background .15s;}
.core-name-input:focus{background:rgba(200,168,75,.06);color:var(--gold);border-top-color:rgba(200,168,75,.3);}
.core-name-input::placeholder{color:var(--dim);}

/* Priority button */
.core-priority-btn{position:absolute;top:2px;right:2px;font-size:.58rem;background:none;border:none;cursor:pointer;opacity:0;transition:opacity .15s;z-index:2;padding:2px;}
.core-cell-wrap:hover .core-priority-btn{opacity:1;}
.core-cell-wrap.is-priority .core-priority-btn{opacity:1;}

/* Buttons */
.btn{padding:6px 13px;border-radius:var(--r);border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.82rem;transition:all .15s;display:inline-flex;align-items:center;gap:5px;line-height:1;}
.btn-gold{background:var(--gold);color:#1a0f00;font-weight:700;}
.btn-gold:hover{background:var(--gold-bright);}
.btn-sec{background:var(--s3);color:var(--text);border:1px solid var(--border-lit);}
.btn-sm{padding:3px 9px;font-size:.75rem;}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-full{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:var(--muted);font-size:.88rem;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--s1);}
::-webkit-scrollbar-thumb{background:var(--border-lit);border-radius:3px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--s3);border:1px solid var(--gold-dim);color:var(--text);padding:9px 16px;border-radius:var(--r);font-size:.84rem;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:300;animation:toastIn .25s ease,toastOut .25s ease 2.25s forwards;}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes toastOut{to{opacity:0;transform:translateY(8px);}}
</style>
</head>
<body>
<nav class="page-nav">
  <a href="index.html" class="pnav-item">⚔️ 숙제</a>
  <a href="core.html" class="pnav-item active">🔮 코어현황</a>
  <a href="raid.html" class="pnav-item">🏰 레이드</a>
</nav>
<div class="header">
  <span>🔮</span>
  <div class="header-title">코어현황</div>
  <div style="margin-left:auto;font-size:.76rem;color:var(--muted);">클릭: 등급 순환 &nbsp;|&nbsp; ⭐: 필수 &nbsp;|&nbsp; 우클릭: 제외(검정)</div>
</div>

<div class="main-content">
  <div id="loading" class="loading-full"><div class="spinner"></div> 불러오는 중...</div>
  <div id="content" style="display:none">
    <div class="grade-legend-row">
      <span class="grade-hint">등급:</span>
      <span class="grade-pill">없음</span>
      <span class="grade-pill hero">영웅</span>
      <span class="grade-pill legend">전설</span>
      <span class="grade-pill relic">유물</span>
      <span class="grade-pill ancient">고대</span>
      <span class="grade-pill skip">제외</span>
      <span class="grade-hint" style="margin-left:6px;">⭐필수 &nbsp; 이름: 코어명 직접 입력</span>
      <button class="btn btn-sec btn-sm" style="margin-left:auto" onclick="resetAll()">전체 초기화</button>
    </div>
    <div class="filter-bar">
      <div class="filter-bar-hd" onclick="toggleFilterBar()">
        <span class="filter-label">🔍 캐릭터 필터</span>
        <span id="filter-selected-count" style="font-size:.73rem;color:var(--muted);"></span>
        <button class="btn btn-sec btn-sm" onclick="event.stopPropagation();selectAllChars()">전체</button>
        <button class="btn btn-sec btn-sm" onclick="event.stopPropagation();deselectAllChars()">해제</button>
        <span class="filter-toggle-icon" id="filter-toggle-icon">▼</span>
      </div>
      <div class="filter-bar-body" id="filter-bar-body">
        <div id="char-filters" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
      </div>
    </div>
    <div id="core-table-container"></div>
  </div>
</div>

<script>
const{createClient}=supabase;
function getConfig(){const u=localStorage.getItem('la_url'),k=localStorage.getItem('la_key');return u&&k?{url:u,key:k}:null;}

let sb=null,allChars=[],selectedChars=new Set(),coreData={};
let filterCollapsed=localStorage.getItem('la_core_filter_col')==='1';

const CORE_TYPES=[
  {group:'질서',type:'order',elements:[{name:'해',key:'sun'},{name:'달',key:'moon'},{name:'별',key:'star'}]},
  {group:'혼돈',type:'chaos',elements:[{name:'해',key:'sun'},{name:'달',key:'moon'},{name:'별',key:'star'}]}
];
// skip = 제외(검정색), 우클릭으로 토글
const GRADES=['none','hero','legend','relic','ancient'];
const GRADE_LABELS={none:'—',hero:'영웅',legend:'전설',relic:'유물',ancient:'고대',skip:'제외'};
const GRADE_CLASSES={none:'grade-none',hero:'grade-hero',legend:'grade-legend',relic:'grade-relic',ancient:'grade-ancient',skip:'grade-skip'};

async function init(){
  const cfg=getConfig();if(!cfg){window.location.href='index.html';return;}
  sb=createClient(cfg.url,cfg.key);
  const[{data:accs},{data:chars},{data:cores}]=await Promise.all([
    sb.from('accounts').select('id,name,sort_order').order('sort_order').order('created_at'),
    sb.from('characters').select('*').order('sort_order').order('created_at'),
    sb.from('character_cores').select('*')
  ]);
  // 계정 순서 맵
  const accOrder={};(accs||[]).forEach((a,i)=>{accOrder[a.id]=a.sort_order??i;});
  // 1700 이상만, 계정 순서 → 캐릭터 순서로 정렬
  allChars=(chars||[]).filter(c=>(c.item_level||0)>=1700).sort((a,b)=>{
    const ao=accOrder[a.account_id]??999,bo=accOrder[b.account_id]??999;
    if(ao!==bo)return ao-bo;
    return (a.sort_order??0)-(b.sort_order??0);
  });
  // 필터 복원
  const saved=localStorage.getItem('la_core_filter_sel');
  if(saved){try{const ids=JSON.parse(saved);selectedChars=new Set(ids.filter(id=>allChars.some(c=>c.id===id)));}catch{selectedChars=new Set(allChars.map(c=>c.id));}}
  else selectedChars=new Set(allChars.map(c=>c.id));
  // 코어 데이터
  (cores||[]).forEach(row=>{coreData[row.character_id]={id:row.id,cores:row.cores||{}};});
  allChars.forEach(c=>{if(!coreData[c.id])coreData[c.id]={id:null,cores:{}};});
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  renderFilters();renderTable();
}

function saveFilter(){localStorage.setItem('la_core_filter_sel',JSON.stringify([...selectedChars]));}
function toggleFilterBar(){
  filterCollapsed=!filterCollapsed;
  localStorage.setItem('la_core_filter_col',filterCollapsed?'1':'0');
  document.getElementById('filter-bar-body').style.display=filterCollapsed?'none':'flex';
  document.getElementById('filter-toggle-icon').textContent=filterCollapsed?'▶':'▼';
}
function renderFilters(){
  document.getElementById('char-filters').innerHTML=allChars.map(c=>`<button class="char-filter-btn ${selectedChars.has(c.id)?'on':''}" onclick="toggleChar('${c.id}')">${esc(c.name)}${c.item_level?` <span style="opacity:.55;font-size:.69rem">Lv.${c.item_level}</span>`:''}</button>`).join('');
  const cnt=document.getElementById('filter-selected-count');
  if(cnt)cnt.textContent=`${selectedChars.size}/${allChars.length}명`;
  document.getElementById('filter-bar-body').style.display=filterCollapsed?'none':'flex';
  document.getElementById('filter-toggle-icon').textContent=filterCollapsed?'▶':'▼';
}
function toggleChar(id){if(selectedChars.has(id))selectedChars.delete(id);else selectedChars.add(id);saveFilter();renderFilters();renderTable();}
function selectAllChars(){selectedChars=new Set(allChars.map(c=>c.id));saveFilter();renderFilters();renderTable();}
function deselectAllChars(){selectedChars.clear();saveFilter();renderFilters();renderTable();}

function getCoreKey(type,elem,slot){return`${type}_${elem}_${slot}`;}
function getGrade(cid,key){return(coreData[cid]?.cores[key]?.grade)||'none';}
function getPriority(cid,key){return!!(coreData[cid]?.cores[key]?.priority);}
function getCoreName(cid,key){return(coreData[cid]?.cores[key]?.name)||'';}

function renderTable(){
  const vis=allChars.filter(c=>selectedChars.has(c.id));
  const container=document.getElementById('core-table-container');
  if(!vis.length){container.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:.85rem;">캐릭터를 선택하세요</div>';return;}

  let html=`<div class="core-table-wrap"><table class="core-table">
    <thead><tr>
      <th class="type-header">코어</th>
      ${vis.map(c=>`<th class="char-header">${esc(c.name)}${c.item_level?`<br><span style="font-size:.66rem;font-weight:400;color:var(--muted)">Lv.${c.item_level}</span>`:''}</th>`).join('')}
    </tr></thead><tbody>`;

  CORE_TYPES.forEach(({group,type,elements})=>{
    elements.forEach(({name,key:elemKey})=>{
      html+=`<tr><td colspan="${vis.length+1}" class="core-type-group core-group-${type}">${group} ${name}</td></tr>`;
      for(let slot=1;slot<=6;slot++){
        const coreKey=getCoreKey(type,elemKey,slot);
        html+=`<tr><td class="core-row-label">${group} ${name} ${slot}</td>`;
        vis.forEach(c=>{
          const grade=getGrade(c.id,coreKey),prio=getPriority(c.id,coreKey),cname=getCoreName(c.id,coreKey);
          html+=`<td><div class="core-cell-wrap ${prio?'is-priority':''}">
            <div class="core-cell ${GRADE_CLASSES[grade]}"
              onclick="cycleGrade('${c.id}','${coreKey}',this)"
              oncontextmenu="toggleSkip('${c.id}','${coreKey}',this);return false;"
              title="클릭: 등급 변경 | 우클릭: 제외 처리">
              <span>${GRADE_LABELS[grade]}</span>
            </div>
            <input class="core-name-input" value="${esc(cname)}" placeholder="코어명"
              onchange="saveCoreName('${c.id}','${coreKey}',this.value)"
              onclick="event.stopPropagation()"
              oncontextmenu="event.stopPropagation()">
            <button class="core-priority-btn" onclick="togglePriority('${c.id}','${coreKey}',this)">${prio?'⭐':'☆'}</button>
          </div></td>`;
        });
        html+=`</tr>`;
      }
    });
  });

  html+=`</tbody></table></div>`;
  container.innerHTML=html;
}

function ensureEntry(cid,key){
  if(!coreData[cid])coreData[cid]={id:null,cores:{}};
  if(!coreData[cid].cores[key])coreData[cid].cores[key]={grade:'none',priority:false,name:''};
}

async function cycleGrade(cid,key,el){
  ensureEntry(cid,key);
  const cur=getGrade(cid,key);
  // skip에서는 클릭하면 none으로
  const next=cur==='skip'?'none':GRADES[(GRADES.indexOf(cur)+1)%GRADES.length];
  coreData[cid].cores[key].grade=next;
  el.className=`core-cell ${GRADE_CLASSES[next]}`;
  el.querySelector('span').textContent=GRADE_LABELS[next];
  await saveCharCores(cid);
}

async function toggleSkip(cid,key,el){
  ensureEntry(cid,key);
  const isSkip=getGrade(cid,key)==='skip';
  const next=isSkip?'none':'skip';
  coreData[cid].cores[key].grade=next;
  el.className=`core-cell ${GRADE_CLASSES[next]}`;
  el.querySelector('span').textContent=GRADE_LABELS[next];
  await saveCharCores(cid);
}

async function togglePriority(cid,key,btn){
  ensureEntry(cid,key);
  const prio=!coreData[cid].cores[key].priority;
  coreData[cid].cores[key].priority=prio;
  btn.textContent=prio?'⭐':'☆';
  btn.parentElement.classList.toggle('is-priority',prio);
  await saveCharCores(cid);
}

// 코어 이름 저장 (debounce)
const _nameTimers={};
function saveCoreName(cid,key,val){
  ensureEntry(cid,key);
  coreData[cid].cores[key].name=val;
  clearTimeout(_nameTimers[cid+key]);
  _nameTimers[cid+key]=setTimeout(()=>saveCharCores(cid),600);
}

async function saveCharCores(cid){
  const entry=coreData[cid];
  if(entry.id){await sb.from('character_cores').update({cores:entry.cores}).eq('id',entry.id);}
  else{const{data}=await sb.from('character_cores').insert({character_id:cid,cores:entry.cores}).select().single();if(data)coreData[cid].id=data.id;}
}

async function resetAll(){
  if(!confirm('현재 화면에 보이는 캐릭터의 코어 데이터를 모두 초기화하시겠습니까?'))return;
  const vis=allChars.filter(c=>selectedChars.has(c.id));
  for(const c of vis){coreData[c.id]={...(coreData[c.id]||{}),cores:{}};await saveCharCores(c.id);}
  renderTable();toast('✅ 초기화 완료');
}

function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2600);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
init();
</script>
</body>
</html>
