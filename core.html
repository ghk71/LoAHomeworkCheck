<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 코어현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>

/* ══════════════════════════════════════════════════════
   MODERN DESIGN SYSTEM 2025
   - Refined dark theme with depth
   - Smooth transitions + micro-interactions
   - Glass morphism cards
   - Better typography hierarchy
   ══════════════════════════════════════════════════════ */

:root {
  /* Core palette */
  --bg: #080b12;
  --bg-grad: radial-gradient(ellipse at 20% 0%, #0d1220 0%, #080b12 60%);
  --surface-1: #0d1120;
  --surface-2: #111827;
  --surface-3: #1a2235;
  --surface-4: #1f2d42;
  --surface-glass: rgba(17,24,39,.75);

  /* Borders */
  --border: rgba(255,255,255,.07);
  --border-lit: rgba(255,255,255,.12);
  --border-focus: rgba(139,92,246,.5);

  /* Brand - Purple/Blue accent (더 세련된 팔레트) */
  --accent: #7c3aed;
  --accent-2: #6d28d9;
  --accent-glow: rgba(124,58,237,.25);

  /* Gold - 레이드 관련 (기존 유지하되 더 세련되게) */
  --gold: #f59e0b;
  --gold-bright: #fbbf24;
  --gold-dim: #78350f;
  --gold-glow: rgba(245,158,11,.2);
  --gold-text: #fcd34d;

  /* Semantic */
  --green: #10b981;
  --green-glow: rgba(16,185,129,.15);
  --red: #ef4444;
  --red-glow: rgba(239,68,68,.12);
  --blue: #3b82f6;
  --teal: #14b8a6;
  --orange: #f97316;
  --purple: #a78bfa;

  /* Text */
  --text: #f1f5f9;
  --text-2: #94a3b8;
  --text-3: #475569;
  --dim: #2d3748;

  /* Radius */
  --r: 8px;
  --r-sm: 5px;
  --r-lg: 12px;
  --r-xl: 16px;

  /* Shadow */
  --shadow-sm: 0 1px 3px rgba(0,0,0,.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,.5);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.6);
  --shadow-gold: 0 0 20px rgba(245,158,11,.15);

  /* Transition */
  --t: .18s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; }
body {
  background: var(--bg);
  background-image: var(--bg-grad);
  color: var(--text);
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
  font-size: 14px;
  line-height: 1.5;
}
input[type="text"],input:not([type]),textarea { ime-mode:active; }

/* ── Scrollbars ── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:10px; }
::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,.2); }

/* ── Page Nav ── */
.page-nav {
  background: rgba(8,11,18,.95);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  flex-shrink: 0;
  backdrop-filter: blur(12px);
  position: relative;
  z-index: 20;
}
.page-nav::after {
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(124,58,237,.4),var(--gold-dim),transparent);
}
.pnav-item {
  padding: 10px 22px;
  font-size: .81rem;
  font-weight: 500;
  color: var(--text-2);
  text-decoration: none;
  transition: all var(--t);
  display: flex;
  align-items: center;
  gap: 7px;
  border-right: 1px solid var(--border);
  position: relative;
  letter-spacing: .3px;
}
.pnav-item:hover { color: var(--text); background: rgba(255,255,255,.04); }
.pnav-item.active {
  color: var(--gold-text);
  background: rgba(245,158,11,.06);
}
.pnav-item.active::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

/* ── DnD ── */
[draggable="true"] { cursor:grab; user-select:none; }
.dnd-dragging { opacity:.3!important; }
.dnd-over-v { box-shadow:inset 0 -3px 0 var(--gold)!important; }
.dnd-over-h { box-shadow:inset -3px 0 0 var(--gold)!important; }
.dnd-handle {
  font-size:.7rem; color:var(--text-3); cursor:grab;
  flex-shrink:0; padding:0 4px; line-height:1; opacity:.5;
  transition:opacity var(--t);
}
.dnd-handle:hover { opacity:1; color:var(--text-2); }

/* ── Buttons ── */
.btn {
  padding: 8px 16px;
  border-radius: var(--r-sm);
  border: none;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: .82rem;
  font-weight: 500;
  transition: all var(--t);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  line-height: 1;
  white-space: nowrap;
}
.btn:active { transform:scale(.97); }
.btn-gold {
  background: linear-gradient(135deg, var(--gold), #d97706);
  color: #1a0a00;
  font-weight: 700;
  box-shadow: 0 2px 10px rgba(245,158,11,.3);
}
.btn-gold:hover { background:linear-gradient(135deg,var(--gold-bright),var(--gold)); box-shadow:0 4px 16px rgba(245,158,11,.4); }
.btn-sec {
  background: var(--surface-3);
  color: var(--text-2);
  border: 1px solid var(--border-lit);
}
.btn-sec:hover { border-color:rgba(245,158,11,.4); color:var(--gold-text); background:var(--surface-4); }
.btn-teal { background:rgba(20,184,166,.12); color:var(--teal); border:1px solid rgba(20,184,166,.3); }
.btn-teal:hover { background:rgba(20,184,166,.22); }
.btn-orange { background:rgba(249,115,22,.12); color:var(--orange); border:1px solid rgba(249,115,22,.3); }
.btn-orange:hover { background:rgba(249,115,22,.22); }
.btn-purple { background:rgba(167,139,250,.12); color:var(--purple); border:1px solid rgba(167,139,250,.3); }
.btn-purple:hover { background:rgba(167,139,250,.22); }
.btn-ghost { background:transparent; color:var(--text-3); padding:5px 8px; font-size:.77rem; border-radius:var(--r-sm); }
.btn-ghost:hover { color:var(--text); background:rgba(255,255,255,.06); }
.btn-danger { background:transparent; color:var(--red); padding:5px 8px; font-size:.77rem; border-radius:var(--r-sm); }
.btn-danger:hover { background:var(--red-glow); }
.btn-icon { background:transparent; color:var(--text-3); padding:5px 7px; font-size:.82rem; border-radius:var(--r-sm); }
.btn-icon:hover { color:var(--text); }
.btn-full { width:100%; justify-content:center; padding:10px; }
.btn-sm { padding:5px 10px; font-size:.75rem; }

/* ── Modals ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
  backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none;
  transition: opacity .22s;
}
.overlay.open { opacity:1; pointer-events:all; }
.modal {
  background: var(--surface-2);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: var(--r-lg);
  padding: 26px 28px;
  width: 100%;
  max-width: 460px;
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(124,58,237,.08);
  max-height: 88vh;
  overflow-y: auto;
  animation: modalIn .2s ease;
}
@keyframes modalIn { from{transform:translateY(8px) scale(.98);opacity:0;} to{transform:none;opacity:1;} }
.modal.modal-gold { border-color:rgba(245,158,11,.25); }
.modal-title {
  font-family: 'Cinzel', serif;
  color: var(--gold-text);
  font-size: .98rem;
  letter-spacing: 1px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: .72rem;
  color: var(--text-3);
  margin-bottom: 5px;
  letter-spacing: .5px;
  text-transform: uppercase;
  font-weight: 600;
}
.form-row { display:flex; gap:10px; }
.form-row>.form-group { flex:1; }
.form-input, .form-select {
  width: 100%;
  background: var(--surface-1);
  border: 1px solid var(--border-lit);
  color: var(--text);
  padding: 9px 12px;
  border-radius: var(--r-sm);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: .86rem;
  transition: border var(--t), box-shadow var(--t);
  outline: none;
  -webkit-appearance: none;
}
.form-input:focus, .form-select:focus {
  border-color: rgba(245,158,11,.5);
  box-shadow: 0 0 0 3px rgba(245,158,11,.1);
}
.form-select option { background: var(--surface-2); }
.form-textarea { resize:vertical; min-height:76px; line-height:1.6; }
.modal-footer {
  display: flex; gap: 8px; justify-content: flex-end;
  margin-top: 18px; padding-top: 14px;
  border-top: 1px solid var(--border);
}

/* ── States ── */
.loading-row {
  display: flex; align-items: center; gap: 10px;
  justify-content: center; padding: 40px;
  color: var(--text-3); font-size: .84rem;
}
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid var(--border-lit);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface-3);
  border: 1px solid rgba(255,255,255,.1);
  border-left: 3px solid var(--gold);
  color: var(--text);
  padding: 10px 18px;
  border-radius: var(--r);
  font-size: .84rem;
  box-shadow: var(--shadow-lg);
  z-index: 300;
  animation: toastIn .28s cubic-bezier(.34,1.56,.64,1), toastOut .25s ease 2.25s forwards;
  backdrop-filter: blur(8px);
}
@keyframes toastIn { from{opacity:0;transform:translateY(12px) scale(.95);} to{opacity:1;transform:none;} }
@keyframes toastOut { to{opacity:0;transform:translateY(6px);} }

/* ── Image Picker ── */
.pick-bc { cursor:pointer; color:var(--gold); font-size:.78rem; }
.pick-bc:hover { text-decoration:underline; }
.pick-folder {
  padding: 9px 12px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  cursor: pointer; font-size:.82rem;
  margin-bottom: 6px;
  transition: all var(--t);
  display: flex; align-items: center; gap: 8px;
}
.pick-folder:hover { border-color:var(--gold); background:var(--surface-4); }
.pick-imgs { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
.pick-img-wrap {
  width:72px; height:72px;
  border: 2px solid var(--border-lit);
  border-radius: var(--r);
  overflow:hidden; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition: all var(--t);
  background: var(--surface-3);
}
.pick-img-wrap:hover { border-color:var(--gold); box-shadow:var(--shadow-gold); transform:scale(1.05); }
.pick-img-wrap img { width:60px; height:60px; object-fit:contain; }
.pick-empty { font-size:.82rem; color:var(--text-3); padding:24px; text-align:center; }
.entity-icon { width:22px; height:22px; object-fit:contain; border-radius:4px; flex-shrink:0; }
.entity-icon-sm { width:18px; height:18px; object-fit:contain; border-radius:3px; flex-shrink:0; }
.icon-btn {
  padding:3px 8px; font-size:.7rem;
  border:1px solid var(--border-lit); border-radius:var(--r-sm);
  background:var(--surface-3); color:var(--text-3);
  cursor:pointer; transition:all var(--t);
}
.icon-btn:hover { border-color:var(--gold); color:var(--gold-text); }

/* ── Diff colors ── */
.diff-nightmare { color:#a78bfa; font-weight:600; }
.diff-hard { color:#f59e0b; font-weight:600; }
.diff-normal { color:#64748b; font-weight:600; }
.muted-gold { color:var(--text-3)!important; text-decoration:line-through; }

/* ══ core.html specific ══ */
body { overflow:hidden; }
.header { background:rgba(13,17,32,.92); border-bottom:1px solid var(--border); padding:10px 22px; display:flex; align-items:center; gap:12px; flex-shrink:0; position:relative; }
.header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(245,158,11,.3),transparent); }
.header-title { font-family:'Cinzel',serif; font-size:1.05rem; color:var(--gold-text); letter-spacing:2px; }
.header-right { margin-left:auto; display:flex; gap:8px; align-items:center; }
.main { flex:1; overflow:hidden; display:flex; flex-direction:column; }

/* View mode tabs */
.vm-opts {
  display:flex; gap:0; padding:0 20px;
  background:rgba(13,17,32,.8);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.vm-opt {
  padding:10px 18px; cursor:pointer; font-size:.82rem;
  color:var(--text-3); font-weight:500;
  position:relative; transition:all var(--t);
  border-bottom:2px solid transparent;
}
.vm-opt:hover { color:var(--text); background:rgba(255,255,255,.03); }
.vm-opt.on { color:var(--gold-text); border-bottom-color:var(--gold); }

/* Char filters */
.char-filter-row {
  padding: 10px 20px;
  background: rgba(13,17,32,.6);
  border-bottom: 1px solid var(--border);
  display:flex; align-items:center; gap:8px;
  flex-wrap:wrap; flex-shrink:0;
}
.char-filter-btn {
  padding: 4px 12px; border-radius:14px;
  border: 1px solid rgba(255,255,255,.08);
  background: var(--surface-3); color:var(--text-3);
  cursor:pointer; font-size:.78rem;
  font-family:'Noto Sans KR',sans-serif; transition:all var(--t);
}
.char-filter-btn:hover { border-color:rgba(255,255,255,.15); color:var(--text); }
.char-filter-btn.on { border-color:rgba(245,158,11,.45); color:var(--gold-text); background:rgba(245,158,11,.08); }

/* Lock + action buttons */
.lock-btn {
  padding: 5px 12px; border-radius:var(--r-sm);
  border: 1px solid var(--border-lit);
  background:var(--surface-3); color:var(--text-3);
  cursor:pointer; font-size:.82rem;
  font-family:'Noto Sans KR',sans-serif; transition:all var(--t);
}
.lock-btn:hover { border-color:rgba(245,158,11,.4); color:var(--gold-text); }
.lock-btn.locked { border-color:rgba(239,68,68,.4); color:#fca5a5; background:rgba(239,68,68,.06); }
.hidden-manage-btn { padding:4px 10px; border-radius:var(--r-sm); font-size:.76rem; border:1px solid var(--border); background:var(--surface-3); color:var(--text-3); cursor:pointer; transition:all var(--t); }
.hidden-manage-btn:hover { color:var(--text); border-color:rgba(255,255,255,.18); }

/* Core content area */
.core-content { flex:1; overflow-y:auto; }
.core-table-wrap { overflow-x:auto; }
.core-table { border-collapse:collapse; min-width:100%; }
.core-table th, .core-table td { border:1px solid rgba(255,255,255,.06); padding:0; }
.type-header {
  background: rgba(13,17,32,.8);
  padding: 6px 12px;
  font-size:.72rem; font-weight:700;
  color:var(--text-2); white-space:nowrap;
  text-align:left; min-width:100px;
}
.char-header {
  background: var(--surface-1);
  padding: 10px 8px;
  font-size:.78rem; font-weight:600;
  text-align:center; min-width:100px;
  color:var(--text-2);
}

/* Grade cells */
.core-cell {
  width:100%; padding:5px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:44px; cursor:pointer;
  transition:all var(--t); user-select:none;
  position:relative;
}
.core-cell:hover { filter:brightness(1.2); }
.grade-none { background:var(--surface-2); color:var(--dim); border:2px solid rgba(255,255,255,.05); }
.grade-skip { background:#050508; color:var(--text-3); border:2px solid rgba(255,255,255,.03); }
.grade-hero { background:rgba(0,60,120,.6); color:#56b4e9; border:2px solid rgba(86,180,233,.6); }
.grade-legend { background:rgba(90,80,0,.6); color:#f0e442; border:2px solid rgba(240,228,66,.6); }
.grade-relic { background:rgba(120,0,80,.65); color:#ff40b0; border:2px solid rgba(255,64,176,.6); }
.grade-ancient { background:rgba(200,190,160,.15); color:#e8e4d8; border:2px solid rgba(220,210,185,.5); }
.grade-label { font-size:.72rem; font-weight:700; }
.grade-star { font-size:.62rem; position:absolute; top:2px; right:3px; color:var(--gold); }

/* Grade pills (legend row) */
.grade-legend-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; align-items:center; padding:0 20px; }
.grade-pill {
  display:inline-flex; align-items:center; gap:4px;
  padding: 4px 12px; border-radius:10px; border:1px solid;
  font-size:.76rem; font-weight:600;
}
.grade-pill.hero { background:rgba(0,60,120,.5); color:#56b4e9; border-color:rgba(86,180,233,.5); }
.grade-pill.legend { background:rgba(90,80,0,.45); color:#f0e442; border-color:rgba(240,228,66,.5); }
.grade-pill.relic { background:rgba(120,0,80,.6); color:#ff40b0; border-color:rgba(255,64,176,.5); }
.grade-pill.ancient { background:rgba(200,190,160,.12); color:#e8e4d8; border-color:rgba(220,210,185,.45); }

/* Section headers */
.section-hrow { cursor:pointer; }
.section-hrow-td {
  background: rgba(13,17,32,.9);
  padding: 7px 12px;
  font-size:.75rem; font-weight:700;
  letter-spacing:1px; text-transform:uppercase;
  border-left: 3px solid transparent;
  transition:background var(--t);
}
.section-hrow:hover .section-hrow-td { background:rgba(255,255,255,.04); }
.sec-order { color:#93c5fd; border-left-color:#93c5fd!important; background:rgba(147,197,253,.04)!important; }
.sec-order-sun { color:#93c5fd!important; border-left-color:#93c5fd!important; background:rgba(147,197,253,.05)!important; }
.sec-order-moon { color:#c4b5fd!important; border-left-color:#a78bfa!important; background:rgba(167,139,250,.07)!important; }
.sec-order-star { color:#f9d976!important; border-left-color:#f59e0b!important; background:rgba(245,158,11,.07)!important; }
.sec-chaos { color:#fca5a5; border-left-color:#fca5a5!important; background:rgba(252,165,165,.04)!important; }
.sec-num { color:var(--gold-text); }

/* Core row label */
.core-row-label-wrap {
  display:flex; align-items:center; gap:4px;
  padding: 4px 8px; background:rgba(13,17,32,.7);
  white-space:nowrap;
}
.core-row-label-text { font-size:.8rem; color:var(--text-2); flex:1; font-weight:500; }
.row-hide-btn { background:none; border:none; font-size:.72rem; cursor:pointer; opacity:0; transition:opacity var(--t); color:var(--text-3); flex-shrink:0; }
.core-row-label-wrap:hover .row-hide-btn { opacity:.7; }
.row-hide-btn:hover { opacity:1!important; }

/* Core name input */
.core-name-input {
  width:100%; background:transparent; border:none;
  border-top: 1px solid rgba(255,255,255,.06);
  color:rgba(240,235,225,.55); font-family:'Noto Sans KR',sans-serif;
  font-size:.72rem; padding:3px 6px;
  outline:none; text-align:center; transition:all var(--t);
}
.core-name-input:focus { color:var(--text); background:rgba(245,158,11,.05); }

/* Combo cards */
.combo-view { padding:16px 20px; display:flex; flex-direction:column; gap:16px; }
.combo-char-card {
  background: var(--surface-2);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: var(--r-lg);
  overflow:hidden; min-width:210px; max-width:270px;
  flex:1; transition:all var(--t);
}
.combo-char-card:hover { border-color:rgba(255,255,255,.15); box-shadow:var(--shadow-md); }
.ccard-header {
  padding: 10px 14px;
  background: rgba(255,255,255,.03);
  border-bottom: 1px solid rgba(255,255,255,.06);
  display:flex; align-items:center; gap:8px;
}
.ccard-name { font-size:.88rem; font-weight:700; flex:1; }
.ccard-ilvl { font-size:.68rem; color:var(--text-3); }
.ccard-body { padding:10px; display:flex; flex-direction:column; gap:6px; }
.combo-slot {
  display:flex; align-items:center; gap:8px;
  padding: 5px 8px; border-radius:var(--r-sm);
  background:var(--surface-1); border:1px solid rgba(255,255,255,.05);
}
.combo-slot-label { font-size:.72rem; color:var(--text-3); width:55px; flex-shrink:0; }
.combo-grade-badges { display:flex; gap:4px; flex-wrap:wrap; }
.combo-grade-cell {
  padding: 3px 8px; border-radius:6px; border:2px solid;
  font-size:.7rem; font-weight:700;
  cursor:pointer; transition:all var(--t);
  user-select:none;
}
.combo-grade-cell:hover { filter:brightness(1.25); transform:scale(1.08); }

/* Combo selector (설정 팝업) */

const{createClient}=supabase;

const ICON_API=`https://api.github.com/repos/${ICON_REPO}/contents/`;
let _pickerCb=null;
function iconImg(url,cls='entity-icon'){return url?`<img class="${cls}" src="${url}" onerror="this.style.display='none'">`:'';} 

async function openImagePicker(cb,path='images/'){
  _pickerCb=cb;
  document.getElementById('picker-content').innerHTML='<div class="pick-empty"><div class="spinner"></div></div>';
  openModal('modal-img-picker');
  await loadPickerDir(path);
}
async function loadPickerDir(path){
  const cKey='la_ic_'+path;
  let items;
  try{const c=sessionStorage.getItem(cKey);if(c)items=JSON.parse(c);}catch{}
  if(!items){
    const r=await fetch(ICON_API+path);
    if(!r.ok){document.getElementById('picker-content').innerHTML='<div class="pick-empty">폴더를 불러올 수 없습니다<br><small>images/ 폴더가 repo에 있는지 확인하세요</small></div>';return;}
    items=await r.json();
    try{sessionStorage.setItem(cKey,JSON.stringify(items));}catch{}
  }
  const dirs=items.filter(x=>x.type==='dir');
  const imgs=items.filter(x=>x.type==='file'&&/\.(png|jpg|jpeg|gif|webp|svg)$/i.test(x.name));
  // Breadcrumb
  const parts=path.replace(/^\/images\//,'').replace(/^images\//,'').split('/').filter(Boolean);
  let bc=`<span class="pick-bc" onclick="loadPickerDir('images/')">images</span>`;
  let cum='images/';parts.forEach(p=>{cum+=p+'/';bc+=` / <span class="pick-bc" onclick="loadPickerDir('${cum}')">${p}</span>`;});
  document.getElementById('picker-breadcrumb').innerHTML=bc;
  // Content
  let html='';
  if(dirs.length){html+=dirs.map(d=>`<div class="pick-folder" onclick="loadPickerDir('${path}${d.name}/')">📁 ${d.name}</div>`).join('');}
  if(imgs.length){html+=`<div class="pick-imgs">${imgs.map(f=>{const url=ICON_RAW+f.path;return`<div class="pick-img-wrap" title="${f.name}" onclick="selectPickerImg('${url}')"><img src="${url}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`;}).join('')}</div>`;}
  if(!dirs.length&&!imgs.length)html='<div class="pick-empty">이미지가 없습니다</div>';
  document.getElementById('picker-content').innerHTML=html;
}

const sk=(t,e)=>`${t}_${e}`;
async function init(){
  const cfg=getConfig();if(!cfg){window.location.href='index.html';return;}
  sb=createClient(cfg.url,cfg.key);
  const results=await Promise.all([
    sb.from('accounts').select('id,name,sort_order').order('sort_order').order('created_at'),
    sb.from('characters').select('*').order('sort_order').order('created_at'),
    sb.from('character_cores').select('*')
  ]);
  const firstError=results.find(r=>r.error)?.error;
  if(firstError){toast('❗ 로딩 오류: '+firstError.message);console.error(firstError);return;}
  const[{data:accs},{data:chars},{data:cores}]=results;
  const aOrd={};(accs||[]).forEach((a,i)=>{aOrd[a.id]=a.sort_order??i;});
  allChars=(chars||[]).filter(c=>(c.item_level||0)>=1700).sort((a,b)=>{const d=(aOrd[a.account_id]??999)-(aOrd[b.account_id]??999);return d||((a.sort_order??0)-(b.sort_order??0));});
  const sv=localStorage.getItem('la_core_filter_sel');
  if(sv){try{const ids=JSON.parse(sv);selectedChars=new Set(ids.filter(id=>allChars.some(c=>c.id===id)));}catch{selectedChars=new Set(allChars.map(c=>c.id));}}
  else selectedChars=new Set(allChars.map(c=>c.id));
  (cores||[]).forEach(r=>{coreData[r.character_id]={id:r.id,cores:r.cores||{}};});
  allChars.forEach(c=>{if(!coreData[c.id])coreData[c.id]={id:null,cores:{}};});
  setViewModeUI(viewMode);
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='flex';
  renderFilters();renderMain();applyLock();
}
function setViewMode(m){viewMode=m;localStorage.setItem('la_core_view',m);setViewModeUI(m);renderMain();}
function setViewModeUI(m){['basic','numbered','combo'].forEach(v=>document.getElementById('vm-'+v)?.classList.toggle('on',v===m));}
function saveFilter(){localStorage.setItem('la_core_filter_sel',JSON.stringify([...selectedChars]));}
function toggleFilterBar(){filterCollapsed=!filterCollapsed;localStorage.setItem('la_core_filter_col',filterCollapsed?'1':'0');document.getElementById('filter-bar-body').style.display=filterCollapsed?'none':'flex';document.getElementById('filter-toggle-icon').textContent=filterCollapsed?'▶':'▼';}
function renderFilters(){
  document.getElementById('char-filters').innerHTML=allChars.map(c=>`<button class="char-filter-btn ${selectedChars.has(c.id)?'on':''}" onclick="toggleChar('${c.id}')">${esc(c.name)}${c.item_level?` <span style="opacity:.55;font-size:.69rem">Lv.${c.item_level}</span>`:''}</button>`).join('');
  const cnt=document.getElementById('filter-selected-count');if(cnt)cnt.textContent=`${selectedChars.size}/${allChars.length}명`;
  document.getElementById('filter-bar-body').style.display=filterCollapsed?'none':'flex';
  document.getElementById('filter-toggle-icon').textContent=filterCollapsed?'▶':'▼';
}
function toggleChar(id){if(selectedChars.has(id))selectedChars.delete(id);else selectedChars.add(id);saveFilter();renderFilters();renderMain();}
function selectAllChars(){selectedChars=new Set(allChars.map(c=>c.id));saveFilter();renderFilters();renderMain();}
function deselectAllChars(){selectedChars.clear();saveFilter();renderFilters();renderMain();}
function toggleSection(key){if(collapsedSections.has(key))collapsedSections.delete(key);else collapsedSections.add(key);localStorage.setItem('la_core_sections',JSON.stringify([...collapsedSections]));renderMain();}
function hideRow(key){hiddenRows.add(key);localStorage.setItem('la_core_hidden',JSON.stringify([...hiddenRows]));renderMain();}
function restoreRow(key){hiddenRows.delete(key);localStorage.setItem('la_core_hidden',JSON.stringify([...hiddenRows]));renderMain();renderHiddenMgmt();}
function openHiddenMgmt(){renderHiddenMgmt();openModal('modal-hidden');}
function renderHiddenMgmt(){
  const el=document.getElementById('hidden-mgmt-list'),em=document.getElementById('hidden-empty-msg');
  if(!hiddenRows.size){el.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  const tm={order:'질서',chaos:'혼돈'},em2={sun:'해',moon:'달',star:'별'};
  el.innerHTML=[...hiddenRows].map(k=>{const p=k.split('_');const nm=`${tm[p[0]]||p[0]}${em2[p[1]]||p[1]}${p[2]||''}`;return`<div class="hidden-row-chip"><span class="hidden-chip-key">${nm}</span><button class="hidden-chip-restore" onclick="restoreRow('${k}')">👁 복원</button></div>`;}).join('');
}
function renderMain(){
  const vis=allChars.filter(c=>selectedChars.has(c.id));
  const el=document.getElementById('core-container');
  if(!vis.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:.85rem;">캐릭터를 선택하세요</div>';applyLock();return;}
  if(viewMode==='basic')renderBasic(vis,el);
  else if(viewMode==='numbered')renderNumbered(vis,el);
  else renderCombo(vis,el);
  applyLock();
}
function thead(vis){return`<thead><tr><th class="type-header">코어</th>${vis.map(c=>`<th class="char-header">${c.icon_url?`<img class="entity-icon-sm" src="${c.icon_url}" onerror="this.style.display='none'" style="display:block;margin:0 auto 2px;"><br>`:''}<span style="display:flex;align-items:center;justify-content:center;gap:3px;">${esc(c.name)}</span>${c.item_level?`<br><span style="font-size:.66rem;font-weight:400;color:var(--muted)">Lv.${c.item_level}</span>`:''}</th>`).join('')}</tr></thead><tbody>`;
}
function cell(cid,key){const g=getGrade(cid,key),p=getPrio(cid,key),cn=getCname(cid,key);return`<td><div class="core-cell-wrap ${p?'is-priority':''}"><div class="core-cell ${GC[g]}" onclick="cycleGrade('${cid}','${key}',this)" oncontextmenu="toggleSkip('${cid}','${key}',this);return false;"><span>${GL[g]}</span></div><input class="core-name-input" value="${esc(cn)}" placeholder="코어명" onchange="saveCoreName('${cid}','${key}',this.value)" onclick="event.stopPropagation()" oncontextmenu="event.stopPropagation()"><button class="core-priority-btn" onclick="togglePriority('${cid}','${key}',this)">${p?'⭐':'☆'}</button></div></td>`;}
function renderBasic(vis,el){
  let h=thead(vis);
  TYPES.forEach(({group,type,cls,elements},ti)=>{
    elements.forEach(({name,key:ek},ei)=>{
      const sk2=sk(type,ek),col=collapsedSections.has(sk2);
      // 질서: 해/달/별 사이에 구분선
      if(type==='order'&&ei>0)h+=`<tr><td colspan="${vis.length+1}" style="height:6px;background:rgba(160,200,255,.15);border-top:2px solid rgba(160,200,255,.4);border-bottom:1px solid rgba(160,200,255,.2);padding:0;"></td></tr>`;
      h+=`<tr class="section-hrow" onclick="toggleSection('${sk2}')"><td colspan="${vis.length+1}" class="section-hrow-td ${cls} ${type==='order'?'sec-order-'+ek:''}"><span style="margin-right:6px;font-size:.65rem;">${col?'▶':'▼'}</span>${group} ${name}</td></tr>`;
      if(!col){for(let s=1;s<=6;s++){const rk=ck(type,ek,s);if(hiddenRows.has(rk))continue;
        // 혼돈: 클릭 가능한 이름 (첫번째 표시 캐릭터 기준)
        const isChaos=type==='chaos';
        let labelEl='';
        if(isChaos){
          const firstCharId=vis[0]?.id||'';
          const chaosLabel=getChaosName(firstCharId,type,ek,s);
          labelEl=`<span class="core-row-label-text editable-chaos" title="클릭해서 이름 변경" onclick="promptChaosName('${firstCharId}','${ek}',${s},'${escAttr(chaosLabel)}');event.stopPropagation();">${esc(chaosLabel)}</span>`;
        } else {
          labelEl=`<span class="core-row-label-text">${group}${name}${s}</span>`;
        }
        h+=`<tr><td><div class="core-row-label-wrap">${labelEl}<button class="row-hide-btn" onclick="event.stopPropagation();hideRow('${rk}')">🙈</button></div></td>`;vis.forEach(c=>{h+=cell(c.id,rk);});h+=`</tr>`;}}
    });
  });
  el.innerHTML=`<div class="core-table-wrap"><table class="core-table">${h}</tbody></table></div>`;
}
function renderNumbered(vis,el){
  let h=thead(vis);
  TYPES.forEach(({group,type,cls,elements})=>{const tsk=`${type}_all`,col=collapsedSections.has(tsk);h+=`<tr class="section-hrow" onclick="toggleSection('${tsk}')"><td colspan="${vis.length+1}" class="section-hrow-td ${cls}"><span style="margin-right:6px;font-size:.65rem;">${col?'▶':'▼'}</span>${group}</td></tr>`;if(!col){for(let s=1;s<=6;s++){const nsk=`${type}_num_${s}`,ncol=collapsedSections.has(nsk);h+=`<tr class="section-hrow" onclick="event.stopPropagation();toggleSection('${nsk}')"><td colspan="${vis.length+1}" class="section-hrow-td sec-num" style="padding-left:20px;"><span style="margin-right:6px;font-size:.65rem;color:var(--muted);">${ncol?'▶':'▼'}</span>${s}번</td></tr>`;if(!ncol){elements.forEach(({name,key:ek})=>{const rk=ck(type,ek,s);if(hiddenRows.has(rk))return;let label=`<span class="core-row-label-text">${group}${name}${s}</span>`;if(type==='chaos'){const firstCharId=vis[0]?.id||'';const chaosLabel=getChaosName(firstCharId,type,ek,s);label=`<span class="core-row-label-text editable-chaos" title="클릭해서 이름 변경" onclick="promptChaosName('${firstCharId}','${ek}',${s},'${escAttr(chaosLabel)}');event.stopPropagation();">${esc(chaosLabel)}</span>`;}h+=`<tr><td><div class="core-row-label-wrap" style="padding-left:18px;">${label}<button class="row-hide-btn" onclick="event.stopPropagation();hideRow('${rk}')">🙈</button></div></td>`;vis.forEach(c=>{h+=cell(c.id,rk);});h+=`</tr>`;});}}}});
  el.innerHTML=`<div class="core-table-wrap"><table class="core-table">${h}</tbody></table></div>`;
}
function renderCombo(vis,el){
  let oH=`<div class="combo-section-label">⚗️ 질서 조합 (사용자 설정)</div><div class="combo-cards-wrap">`;
  vis.forEach(c=>{
    const combos=getCombos(c.id);
    const combosHTML=combos.map(combo=>{
      const rows=[
        {nm:`질서해${combo.sun}`, key:ck('order','sun',combo.sun)},
        {nm:`질서달${combo.moon}`, key:ck('order','moon',combo.moon)},
        {nm:`질서별${combo.star}`, key:ck('order','star',combo.star)}
      ].map(r=>{
        const g=getGrade(c.id,r.key),p=getPrio(c.id,r.key);
        return`<div class="combo-grade-row">
          <span class="cgr-name">${r.nm}</span>
          <span class="cgr-badge" style="${GB[g]||GB.none}" onclick="comboCycleGrade('${c.id}','${r.key}',this)">${GL[g]||'—'}</span>
          <button class="cgr-prio ${p?'on':''}" onclick="comboPrio('${c.id}','${r.key}',this)">${p?'⭐':'☆'}</button>
        </div>`;
      }).join('');
      return`<div class="combo-entry">
        <div class="combo-entry-hd">
          <span class="combo-label-text">${esc(combo.label||'조합')}</span>
          <span class="combo-nums-text">해${combo.sun}/달${combo.moon}/별${combo.star}</span>
          <button class="btn btn-ghost" style="padding:2px 5px;font-size:.67rem;" onclick="openEditCombo('${c.id}','${combo.id}')">✏️</button>
          <button class="btn btn-danger" style="padding:2px 4px;font-size:.67rem;" onclick="deleteCombo('${c.id}','${combo.id}')">🗑</button>
        </div>
        <div class="combo-grade-list">${rows}</div>
      </div>`;
    }).join('');
    oH+=`<div class="combo-char-card">
      <div class="ccard-header">${c.icon_url?`<img class="entity-icon-sm" src="${c.icon_url}" onerror="this.style.display='none'">`:'<span>'}</span><span class="ccard-name">${esc(c.name)}</span><span class="ccard-ilvl">${c.item_level?`Lv.${c.item_level}`:''}</span></div>
      <div class="ccard-body">${combos.length?'':'<div class="ccard-empty">조합을 추가하세요</div>'}${combosHTML}</div>
      <button class="combo-add-btn" onclick="openAddCombo('${c.id}')">＋ 조합 추가</button>
    </div>`;
  });
  oH+=`</div>`;
  // 혼돈: 번호별 테이블
  let cH=`<div class="combo-section-label">💫 혼돈 (번호별 묶음)</div>`;
  let th=thead(vis);
  const chaosT=TYPES.find(t=>t.type==='chaos');
  for(let s=1;s<=6;s++){const nsk=`chaos_num_${s}`,ncol=collapsedSections.has(nsk);th+=`<tr class="section-hrow" onclick="toggleSection('${nsk}')"><td colspan="${vis.length+1}" class="section-hrow-td sec-num"><span style="margin-right:6px;font-size:.65rem;color:var(--muted);">${ncol?'▶':'▼'}</span>${s}번</td></tr>`;if(!ncol){chaosT.elements.forEach(({name,key:ek})=>{const rk=ck('chaos',ek,s);if(hiddenRows.has(rk))return;const firstCharId=vis[0]?.id||'';const chaosLabel=getChaosName(firstCharId,'chaos',ek,s);th+=`<tr><td><div class="core-row-label-wrap"><span class="core-row-label-text editable-chaos" title="클릭해서 이름 변경" onclick="promptChaosName('${firstCharId}','${ek}',${s},'${escAttr(chaosLabel)}');event.stopPropagation();">${esc(chaosLabel)}</span><button class="row-hide-btn" onclick="event.stopPropagation();hideRow('${rk}')">🙈</button></div></td>`;vis.forEach(c=>{th+=cell(c.id,rk);});th+=`</tr>`;});}}
  cH+=`<div class="core-table-wrap"><table class="core-table">${th}</tbody></table></div>`;
  el.innerHTML=oH+cH;
}
// ─── Debounced DB save (최적화: 500ms 내 연속 클릭은 마지막만 저장) ───
const _saveTimer={};
function scheduleSave(cid){clearTimeout(_saveTimer[cid]);_saveTimer[cid]=setTimeout(()=>saveCores(cid),500);}
// ─── 혼돈 코어 이름 편집 ───
function getChaosName(charId,type,ek,slot){
  const data=coreData[charId]||{cores:{}};
  const names=data.cores?.__chaosNames||{};
  const typeLabel=ek==='sun'?'해':ek==='moon'?'달':'별';
  const dflt=`혼돈${typeLabel}${slot}`;
  return names[ek+'_'+slot]||dflt;
}
async function saveChaosName(charId,ek,slot,name){
  if(!charId)return;
  if(!coreData[charId])coreData[charId]={id:null,cores:{}};
  if(!coreData[charId].cores)coreData[charId].cores={};
  if(!coreData[charId].cores.__chaosNames)coreData[charId].cores.__chaosNames={};
  coreData[charId].cores.__chaosNames[ek+'_'+slot]=name;
  await saveCores(charId);
}
function promptChaosName(charId,ek,slot,current){
  const newName=prompt('혼돈 코어 이름 변경:',current);
  if(newName!==null&&newName.trim()){
    saveChaosName(charId,ek,slot,newName.trim()).then(()=>renderMain());
  }
}
async function saveCores(cid){const e=coreData[cid];if(!e)return;if(e.id){await sb.from('character_cores').update({cores:e.cores}).eq('id',e.id);}else{const{data}=await sb.from('character_cores').insert({character_id:cid,cores:e.cores}).select().single();if(data)coreData[cid].id=data.id;}}

function ensure(cid,key){if(!coreData[cid])coreData[cid]={id:null,cores:{}};if(key&&!coreData[cid].cores[key])coreData[cid].cores[key]={grade:'none',priority:false,name:''};}

// 테이블 셀 클릭 - DOM 직접 업데이트 (re-render 없음)
function cycleGrade(cid,key,el){
  if(isLocked)return;
  ensure(cid,key);const cur=getGrade(cid,key),next=cur==='skip'?'none':GRADES[(GRADES.indexOf(cur)+1)%GRADES.length];
  coreData[cid].cores[key].grade=next;
  el.className=`core-cell ${GC[next]}`;el.querySelector('span').textContent=GL[next];
  scheduleSave(cid);
}
function toggleSkip(cid,key,el){
  if(isLocked)return;
  ensure(cid,key);const n=getGrade(cid,key)==='skip'?'none':'skip';
  coreData[cid].cores[key].grade=n;
  el.className=`core-cell ${GC[n]}`;el.querySelector('span').textContent=GL[n];
  scheduleSave(cid);
}
function togglePriority(cid,key,btn){
  if(isLocked)return;
  ensure(cid,key);const p=!coreData[cid].cores[key].priority;
  coreData[cid].cores[key].priority=p;
  btn.textContent=p?'⭐':'☆';btn.parentElement.classList.toggle('is-priority',p);
  scheduleSave(cid);
}

// 콤보 뷰 뱃지 클릭 - DOM 직접 업데이트 (re-render 없음)
function comboCycleGrade(cid,key,badgeEl){
  if(isLocked)return;
  ensure(cid,key);const cur=getGrade(cid,key),next=cur==='skip'?'none':GRADES[(GRADES.indexOf(cur)+1)%GRADES.length];
  coreData[cid].cores[key].grade=next;
  badgeEl.textContent=GL[next];badgeEl.style.cssText=GB[next]||GB.none;
  scheduleSave(cid);
}
function comboPrio(cid,key,btn){
  if(isLocked)return;
  ensure(cid,key);const p=!coreData[cid].cores[key].priority;
  coreData[cid].cores[key].priority=p;
  btn.textContent=p?'⭐':'☆';btn.classList.toggle('on',p);
  scheduleSave(cid);
}

const _nt={};
function saveCoreName(cid,key,val){if(isLocked)return;ensure(cid,key);coreData[cid].cores[key].name=val;clearTimeout(_nt[cid+key]);_nt[cid+key]=setTimeout(()=>saveCores(cid),800);}
async function resetAll(){if(!confirm('화면에 보이는 캐릭터의 코어 데이터를 모두 초기화하시겠습니까?'))return;const vis=allChars.filter(c=>selectedChars.has(c.id));for(const c of vis){const combos=getCombos(c.id);coreData[c.id]={...(coreData[c.id]||{}),cores:{__combos:combos}};await saveCores(c.id);}renderMain();toast('✅ 초기화 완료');}
const genId=()=>'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const slotOpts=()=>[1,2,3,4,5,6].map(n=>`<option value="${n}">${n}</option>`).join('');
function openAddCombo(cid){if(isLocked)return;document.getElementById('combo-modal-title').textContent='조합 추가';document.getElementById('combo-submit-btn').textContent='추가';document.getElementById('combo-char-id').value=cid;document.getElementById('combo-id').value='';document.getElementById('combo-label').value='';['combo-sun','combo-moon','combo-star'].forEach(id=>{document.getElementById(id).innerHTML=slotOpts();});const c=allChars.find(x=>x.id===cid);document.getElementById('combo-char-label').textContent=c?`${c.name}${c.item_level?' (Lv.'+c.item_level+')':''}의 조합`:'';openModal('modal-combo');}
function openEditCombo(cid,cid2){if(isLocked)return;const combo=getCombos(cid).find(x=>x.id===cid2);if(!combo)return;document.getElementById('combo-modal-title').textContent='조합 수정';document.getElementById('combo-submit-btn').textContent='저장';document.getElementById('combo-char-id').value=cid;document.getElementById('combo-id').value=cid2;document.getElementById('combo-label').value=combo.label||'';['combo-sun','combo-moon','combo-star'].forEach(id=>{document.getElementById(id).innerHTML=slotOpts();});document.getElementById('combo-sun').value=String(combo.sun);document.getElementById('combo-moon').value=String(combo.moon);document.getElementById('combo-star').value=String(combo.star);const c=allChars.find(x=>x.id===cid);document.getElementById('combo-char-label').textContent=c?`${c.name}의 조합`:'';openModal('modal-combo');}
async function submitCombo(){if(isLocked)return;const cid=document.getElementById('combo-char-id').value,cid2=document.getElementById('combo-id').value,label=document.getElementById('combo-label').value.trim(),sun=parseInt(document.getElementById('combo-sun').value),moon=parseInt(document.getElementById('combo-moon').value),star=parseInt(document.getElementById('combo-star').value);ensure(cid,null);if(!coreData[cid].cores.__combos)coreData[cid].cores.__combos=[];const combos=coreData[cid].cores.__combos;if(cid2){const idx=combos.findIndex(x=>x.id===cid2);if(idx>=0)combos[idx]={...combos[idx],label,sun,moon,star};toast('✅ 조합 수정됨');}else{combos.push({id:genId(),label:label||`조합${combos.length+1}`,sun,moon,star});toast('✅ 조합 추가됨');}await saveCores(cid);closeModal('modal-combo');renderMain();}
async function deleteCombo(cid,cid2){if(isLocked)return;if(!confirm('이 조합을 삭제하시겠습니까?'))return;ensure(cid,null);if(!coreData[cid].cores.__combos)return;coreData[cid].cores.__combos=coreData[cid].cores.__combos.filter(x=>x.id!==cid2);await saveCores(cid);renderMain();toast('🗑️ 삭제됨');}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('open');}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'));});
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2600);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return esc(s).replace(/'/g,'&#39;');}
init();
</script>

<!-- Image Picker Modal -->
<div class="overlay" id="modal-img-picker"><div class="modal" style="max-width:520px;height:70vh;display:flex;flex-direction:column;">
  <div class="modal-title">🖼️ 아이콘 선택</div>
  <div id="picker-breadcrumb" style="font-size:.78rem;padding:2px 0 8px;color:var(--muted);flex-shrink:0;border-bottom:1px solid var(--border);margin-bottom:8px;"></div>
  <div id="picker-content" style="flex:1;overflow-y:auto;"></div>
  <div class="modal-footer" style="margin-top:8px;">
    <button class="btn btn-danger btn-sm" style="margin-right:auto;" onclick="pickerRemoveIcon()">🗑 아이콘 제거</button>
    <button class="btn btn-sec" onclick="closeModal('modal-img-picker')">취소</button>
  </div>
</div></div>
