<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ 로스트아크 숙제 체크</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg:#07090f;--s1:#0d1120;--s2:#131928;--s3:#1a2235;
  --border:#243050;--border-lit:#3a4d7a;
  --gold:#c8a84b;--gold-bright:#e8c86a;--gold-dim:#8a6e2a;--gold-glow:rgba(200,168,75,.25);
  --text:#ddd5c0;--muted:#6a7485;--dim:#3a4050;
  --green:#3cba78;--green-dim:rgba(60,186,120,.08);
  --red:#c84040;--blue:#4a8fd4;
  --purple:#a060d8;--purple-dim:rgba(160,96,216,.12);
  --teal:#2ab8a0;--teal-dim:rgba(42,184,160,.1);
  --orange:#e07840;--orange-dim:rgba(224,120,64,.1);
  --r:4px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow:hidden;
  background-image:radial-gradient(ellipse at 15% 50%,rgba(200,168,75,.04) 0%,transparent 55%),radial-gradient(ellipse at 85% 15%,rgba(74,143,212,.04) 0%,transparent 55%);}
input[type="text"],input:not([type]),textarea{ime-mode:active;}

/* Drag */
[draggable="true"]{cursor:grab;user-select:none;}
.dnd-dragging{opacity:.35!important;}
.dnd-over-v{box-shadow:inset 0 -3px 0 var(--gold)!important;background:rgba(200,168,75,.05)!important;}
.dnd-over-h{box-shadow:inset -3px 0 0 var(--gold)!important;background:rgba(200,168,75,.05)!important;}
.dnd-handle{font-size:.72rem;color:var(--dim);cursor:grab;flex-shrink:0;padding:0 3px;}
.dnd-handle:hover{color:var(--muted);}

/* Setup */
#setup-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;z-index:200;background:var(--bg);}
.setup-card{background:var(--s2);border:1px solid var(--gold);border-radius:8px;padding:36px 40px;width:100%;max-width:520px;box-shadow:0 0 50px var(--gold-glow);}
.setup-logo{text-align:center;font-size:2.5rem;margin-bottom:8px;}
.setup-title{font-family:'Cinzel',serif;font-size:1.5rem;color:var(--gold-bright);text-align:center;letter-spacing:2px;margin-bottom:4px;}
.setup-sub{text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:24px;}
.setup-step{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;}
.setup-step-label{font-size:.73rem;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.sql-block{background:#060810;border:1px solid var(--border);border-radius:3px;padding:10px 12px;font-family:'Courier New',monospace;font-size:.67rem;color:#6a9fcf;overflow:auto;max-height:120px;white-space:pre;line-height:1.5;}
.copy-sql-btn{margin-top:8px;font-size:.72rem;padding:4px 10px;background:var(--s3);border:1px solid var(--border-lit);color:var(--muted);border-radius:3px;cursor:pointer;transition:all .15s;}
.copy-sql-btn:hover{color:var(--text);border-color:var(--gold);}

/* App */
#app{display:none;height:100vh;flex-direction:column;}
#app.active{display:flex;}
.header{background:var(--s1);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);}
.header-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);letter-spacing:2px;}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.layout{display:flex;flex:1;overflow:hidden;}

/* Sidebar */
.sidebar{width:210px;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
.sidebar-list{flex:1;overflow-y:auto;}
.account-item{padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;transition:background .12s;position:relative;}
.account-item:hover{background:rgba(255,255,255,.02);}
.account-item.active{background:var(--s3);}
.account-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);}
.account-name{font-size:.88rem;font-weight:500;flex:1;min-width:0;}
.account-meta{font-size:.7rem;color:var(--muted);margin-top:2px;}
.acc-del-btn{opacity:0;background:none;border:none;color:var(--red);font-size:.85rem;cursor:pointer;padding:2px 5px;border-radius:3px;transition:opacity .2s;flex-shrink:0;}
.account-item:hover .acc-del-btn{opacity:.7;}
.sidebar-add{padding:12px;border-top:1px solid var(--border);}

/* Main + Tabs */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.char-tabs-wrap{background:var(--s2);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:stretch;overflow-x:auto;}
.char-tab{padding:10px 14px;cursor:pointer;border-right:1px solid var(--border);white-space:nowrap;transition:all .12s;display:flex;align-items:center;gap:6px;flex-shrink:0;position:relative;min-width:100px;}
.char-tab:hover{background:var(--s3);}
.char-tab.active{background:var(--s3);color:var(--gold-bright);}
.char-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.char-tab-name{font-size:.84rem;font-weight:500;}
.char-tab-ilvl{font-size:.67rem;color:var(--muted);}
.char-tab-prog{width:44px;height:3px;background:var(--border);border-radius:2px;margin-top:3px;overflow:hidden;}
.char-tab-prog-bar{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}
.char-tab-btns{display:flex;gap:2px;opacity:0;transition:opacity .2s;flex-shrink:0;}
.char-tab:hover .char-tab-btns{opacity:1;}
.char-tab-btn{background:none;border:none;font-size:.72rem;cursor:pointer;padding:2px 4px;border-radius:2px;transition:all .15s;}
.char-tab-btn-edit{color:var(--muted);}
.char-tab-btn-edit:hover{color:var(--gold);}
.char-tab-btn-del{color:var(--red);}
.char-tab-btn-del:hover{opacity:1!important;}
.tab-add-btn{padding:10px 14px;cursor:pointer;color:var(--muted);font-size:.82rem;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;transition:all .12s;}
.tab-add-btn:hover{color:var(--gold);}

/* Task Area */
.task-area{flex:1;overflow-y:auto;padding:20px 24px;}

/* Expedition */
.exp-section{background:var(--purple-dim);border:1px solid rgba(160,96,216,.3);border-radius:6px;margin-bottom:14px;overflow:hidden;}
.exp-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .12s;user-select:none;}
.exp-header:hover{background:rgba(160,96,216,.08);}
.exp-toggle{color:var(--purple);font-size:.7rem;width:10px;}
.exp-title{font-size:.88rem;font-weight:600;color:#c090e8;font-family:'Cinzel',serif;}
.exp-stat{font-size:.75rem;color:var(--muted);}
.exp-prog-wrap{height:3px;width:60px;background:var(--border);border-radius:2px;overflow:hidden;}
.exp-prog-bar{height:100%;background:var(--purple);border-radius:2px;transition:width .3s;}
.exp-body{padding:10px 14px 12px;border-top:1px solid rgba(160,96,216,.15);}
.exp-empty{font-size:.82rem;color:var(--muted);text-align:center;padding:12px 0;}

/* Mini Sections */
.mini-section{background:var(--s2);border:1px solid var(--border);border-radius:6px;margin-bottom:14px;overflow:hidden;}
.mini-section-header{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);}
.mini-section-title{font-size:.8rem;font-weight:600;color:var(--teal);}
.mini-section-body{padding:10px 14px 12px;}
.currency-chips{display:flex;flex-wrap:wrap;gap:8px;}
.currency-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:var(--s3);border:1px solid var(--border-lit);border-radius:20px;cursor:pointer;transition:all .15s;user-select:none;}
.currency-chip:hover{border-color:var(--teal);}
.curr-chip-icon{font-size:1rem;}
.curr-chip-name{font-size:.78rem;color:var(--muted);}
.curr-chip-amount{font-size:.88rem;font-weight:700;}
.curr-empty{font-size:.82rem;color:var(--muted);padding:4px 0;}
.popup-btn-section{background:var(--orange-dim);border:1px solid rgba(224,120,64,.25);border-radius:6px;margin-bottom:14px;overflow:hidden;}
.popup-btn-section .mini-section-header{border-color:rgba(224,120,64,.2);}
.popup-btn-section .mini-section-title{color:var(--orange);}
.popup-buttons-row{display:flex;flex-wrap:wrap;gap:8px;}
.popup-btn-item{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;background:var(--s3);border:1px solid rgba(224,120,64,.3);border-radius:6px;cursor:pointer;transition:all .15s;}
.popup-btn-item:hover{border-color:var(--orange);}
.popup-btn-icon{font-size:1.1rem;}
.popup-btn-label{font-size:.82rem;font-weight:500;}
.no-popup-btns{font-size:.82rem;color:var(--muted);padding:4px 0;}

/* Character Section Header */
.char-section-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.char-section-title{font-family:'Cinzel',serif;font-size:.95rem;color:var(--gold);letter-spacing:1px;}
.char-section-class{font-size:.72rem;color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:1px 8px;}
.section-divider{display:flex;align-items:center;gap:10px;margin:4px 0 12px;font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.global-prog-wrap{background:var(--s3);border-radius:3px;height:5px;margin-bottom:4px;overflow:hidden;}
.global-prog-bar{height:100%;background:var(--green);border-radius:3px;transition:width .4s;}
.prog-label{font-size:.7rem;color:var(--muted);margin-bottom:14px;}

/* Task Items */
.tasks-list{display:flex;flex-direction:column;gap:7px;}
.task-group{display:flex;flex-direction:column;gap:4px;}
.task-item{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:10px 13px;display:flex;align-items:center;gap:8px;transition:all .12s;}
.task-item:hover{border-color:var(--border-lit);background:var(--s3);}
.task-item.done{border-color:rgba(60,186,120,.4);background:var(--green-dim);}
.task-item.done .task-name{color:var(--muted);text-decoration:line-through;}
.task-item.is-parent{border-color:var(--border-lit);background:rgba(255,255,255,.02);}
.task-item.is-parent .checkbox{cursor:default;border-color:var(--dim);}
.task-item.is-parent.done .checkbox{background:var(--green);border-color:var(--green);cursor:default;}
.checkbox{width:21px;height:21px;border:2px solid var(--border-lit);border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;user-select:none;}
.checkbox:not(.no-click):hover{border-color:var(--gold);}
.task-item.done .checkbox:not(.no-click){background:var(--green);border-color:var(--green);box-shadow:0 0 8px rgba(60,186,120,.35);}
.checkbox-icon{color:#fff;font-size:11px;opacity:0;transition:opacity .15s;font-weight:700;}
.task-item.done .checkbox-icon{opacity:1;}
.task-body{flex:1;min-width:0;}
.task-name-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.task-name{font-size:.88rem;font-weight:500;}
.task-badge-row{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-size:.68rem;font-weight:500;}
.badge-daily{background:rgba(74,143,212,.15);color:var(--blue);border:1px solid rgba(74,143,212,.3);}
.badge-weekly{background:rgba(200,168,75,.12);color:var(--gold);border:1px solid rgba(200,168,75,.25);}
.reset-info{font-size:.67rem;color:var(--dim);}
.task-actions{display:flex;gap:3px;opacity:0;transition:opacity .15s;flex-shrink:0;}
.task-item:hover .task-actions{opacity:1;}

/* Subtasks */
.subtask-list{padding-left:32px;display:flex;flex-direction:column;gap:4px;border-left:2px solid rgba(200,168,75,.2);margin-left:14px;}
.subtask-item{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:8px 11px;display:flex;align-items:center;gap:8px;transition:all .12s;}
.subtask-item:hover{border-color:var(--border-lit);background:var(--s2);}
.subtask-item.done{border-color:rgba(60,186,120,.3);background:rgba(60,186,120,.04);}
.subtask-item.done .task-name{color:var(--muted);text-decoration:line-through;}
.subtask-item.done .checkbox{background:var(--green);border-color:var(--green);}
.subtask-item.done .checkbox-icon{opacity:1;}
.expand-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.72rem;padding:2px 5px;border-radius:3px;transition:all .15s;flex-shrink:0;}
.expand-btn:hover{color:var(--gold);background:rgba(200,168,75,.1);}

/* Count Input */
.count-group{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.count-input{width:52px;text-align:center;background:var(--s1);border:1px solid var(--border-lit);color:var(--text);padding:3px 5px;border-radius:3px;font-size:.85rem;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border .15s;-moz-appearance:textfield;}
.count-input::-webkit-inner-spin-button,.count-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.count-input:focus{border-color:var(--gold);}

/* Currency Popup */
.curr-popup-modal{max-width:360px!important;}
.curr-popup-top{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.curr-popup-icon{font-size:1.8rem;}
.curr-popup-name{font-size:1.1rem;font-weight:700;flex:1;}
.curr-amount-display{text-align:center;font-size:2.2rem;font-weight:700;color:var(--teal);margin:4px 0 16px;padding:10px;background:var(--s1);border-radius:var(--r);border:1px solid var(--border);}
.curr-adj-section{margin-bottom:12px;}
.curr-adj-label{font-size:.72rem;color:var(--muted);margin-bottom:6px;}
.curr-adj-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
.curr-adj-btn{padding:7px 10px;border-radius:var(--r);border:none;cursor:pointer;font-size:.8rem;font-family:'Noto Sans KR',sans-serif;font-weight:600;transition:all .15s;min-width:52px;}
.curr-adj-plus{background:rgba(42,184,160,.2);color:var(--teal);border:1px solid rgba(42,184,160,.35);}
.curr-adj-plus:hover{background:rgba(42,184,160,.35);}
.curr-adj-minus{background:rgba(200,64,64,.15);color:#e07070;border:1px solid rgba(200,64,64,.3);}
.curr-adj-minus:hover{background:rgba(200,64,64,.28);}
.curr-direct-row{display:flex;gap:6px;align-items:center;margin-top:12px;}

/* Popup Viewer */
.popup-viewer-modal{max-width:640px!important;max-height:90vh!important;}
.popup-viewer-top{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.popup-viewer-icon{font-size:1.6rem;}
.popup-viewer-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);flex:1;}
.popup-content{display:flex;flex-direction:column;gap:14px;}
.block-label-hd{font-size:.78rem;font-weight:600;color:var(--gold-bright);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
.block-text-content{font-size:.88rem;line-height:1.7;white-space:pre-wrap;}
.popup-table{width:100%;border-collapse:collapse;font-size:.84rem;}
.popup-table th{background:var(--s3);color:var(--gold);padding:7px 10px;border:1px solid var(--border-lit);font-weight:600;text-align:left;}
.popup-table td{padding:6px 10px;border:1px solid var(--border);}
.popup-table tr:nth-child(even) td{background:rgba(255,255,255,.02);}
.block-divider{border:none;border-top:1px solid var(--border);margin:4px 0;}
.popup-empty-msg{text-align:center;color:var(--muted);font-size:.85rem;padding:20px 0;}

/* Popup Editor */
.popup-editor-modal{max-width:680px!important;max-height:92vh!important;}
.editor-top{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.editor-icon-display{font-size:1.5rem;cursor:pointer;padding:4px 8px;border-radius:4px;border:1px solid var(--border);transition:border .15s;}
.editor-icon-display:hover{border-color:var(--gold);}
.editor-block-list{display:flex;flex-direction:column;gap:10px;min-height:40px;}
.editor-block{background:var(--s1);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.editor-block-hd{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--s3);border-bottom:1px solid var(--border);}
.editor-block-type{font-size:.75rem;color:var(--muted);font-weight:600;flex:1;}
.editor-block-body{padding:12px;}
.editor-block-body .form-group{margin-bottom:10px;}
.editor-block-body .form-group:last-child{margin-bottom:0;}
.editor-hint{font-size:.72rem;color:var(--dim);margin-top:4px;}
.editor-add-row{display:flex;gap:8px;flex-wrap:wrap;padding:12px 0 0;border-top:1px solid var(--border);margin-top:12px;}
.editor-add-label{font-size:.75rem;color:var(--muted);width:100%;margin-bottom:4px;}
.icon-picker{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.icon-opt{font-size:1.2rem;padding:5px 7px;border-radius:4px;cursor:pointer;border:1px solid transparent;transition:all .15s;user-select:none;}
.icon-opt:hover{background:var(--s3);}
.icon-opt.selected{border-color:var(--gold);background:rgba(200,168,75,.15);}

/* Copy modal account grouping */
.copy-acc-header{font-size:.72rem;color:var(--gold);padding:6px 10px 3px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}

/* Hide completed button */
.hide-done-btn{font-size:.75rem;padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:var(--s3);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
.hide-done-btn.active{border-color:var(--green);color:var(--green);background:rgba(60,186,120,.08);}
.hide-done-btn:hover{border-color:var(--border-lit);color:var(--text);}

/* Buttons */
.btn{padding:8px 16px;border-radius:var(--r);border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.82rem;font-weight:400;transition:all .15s;display:inline-flex;align-items:center;gap:5px;line-height:1;}
.btn-gold{background:var(--gold);color:#1a0f00;font-weight:700;}
.btn-gold:hover{background:var(--gold-bright);}
.btn-teal{background:rgba(42,184,160,.18);color:var(--teal);border:1px solid rgba(42,184,160,.4);}
.btn-teal:hover{background:rgba(42,184,160,.3);}
.btn-orange{background:rgba(224,120,64,.18);color:var(--orange);border:1px solid rgba(224,120,64,.4);}
.btn-orange:hover{background:rgba(224,120,64,.3);}
.btn-purple{background:rgba(160,96,216,.18);color:#c090e8;border:1px solid rgba(160,96,216,.4);}
.btn-purple:hover{background:rgba(160,96,216,.3);}
.btn-sec{background:var(--s3);color:var(--text);border:1px solid var(--border-lit);}
.btn-sec:hover{border-color:var(--gold);color:var(--gold-bright);}
.btn-ghost{background:transparent;color:var(--muted);padding:5px 8px;font-size:.75rem;border-radius:3px;}
.btn-ghost:hover{color:var(--text);background:rgba(255,255,255,.05);}
.btn-danger{background:transparent;color:var(--red);padding:5px 8px;font-size:.75rem;border-radius:3px;}
.btn-danger:hover{background:rgba(200,64,64,.12);}
.btn-icon{background:transparent;color:var(--muted);padding:5px 7px;font-size:.8rem;border-radius:3px;}
.btn-icon:hover{color:var(--text);}
.btn-full{width:100%;justify-content:center;padding:10px;}
.btn-sm{padding:5px 10px;font-size:.78rem;}
.btn-xs{padding:3px 7px;font-size:.72rem;}

/* States */
.center-state{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--muted);}
.center-state-icon{font-size:3rem;filter:grayscale(.5);}
.empty-state{padding:50px 20px;text-align:center;color:var(--muted);}
.empty-state-icon{font-size:2.5rem;margin-bottom:12px;}
.empty-state-text{font-size:.85rem;line-height:1.7;}

/* Modals */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--s2);border:1px solid var(--gold-dim);border-radius:8px;padding:26px 28px;width:100%;max-width:460px;box-shadow:0 0 60px var(--gold-glow),0 20px 60px rgba(0,0,0,.5);max-height:88vh;overflow-y:auto;}
.modal.modal-purple{border-color:rgba(160,96,216,.5);}
.modal.modal-teal{border-color:rgba(42,184,160,.5);}
.modal.modal-orange{border-color:rgba(224,120,64,.5);}
.modal-title{font-family:'Cinzel',serif;color:var(--gold);font-size:1.05rem;letter-spacing:1px;margin-bottom:20px;}
.modal-title.purple{color:#c090e8;}
.modal-title.teal{color:var(--teal);}
.modal-title.orange{color:var(--orange);}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:5px;letter-spacing:.5px;}
.form-row{display:flex;gap:10px;}
.form-row>.form-group{flex:1;}
.form-input,.form-select{width:100%;background:var(--s1);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--r);font-family:'Noto Sans KR',sans-serif;font-size:.88rem;transition:border .15s;outline:none;-webkit-appearance:none;}
.form-input:focus,.form-select:focus{border-color:var(--gold);}
.form-select option{background:var(--s2);}
.form-textarea{resize:vertical;min-height:80px;line-height:1.6;}
.count-toggle-box{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;user-select:none;}
.count-toggle-box input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--gold);pointer-events:none;}
.count-toggle-lbl{font-size:.85rem;flex:1;}
.count-toggle-lbl small{display:block;font-size:.72rem;color:var(--muted);margin-top:1px;}
.count-max-row{display:flex;align-items:center;gap:8px;margin-top:10px;padding-left:4px;}
.count-max-row .form-input{max-width:100px;}
.count-max-unit{font-size:.82rem;color:var(--muted);}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:16px;border-top:1px solid var(--border);}
.copy-list{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);max-height:240px;overflow-y:auto;padding:4px;}
.copy-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:3px;cursor:pointer;transition:background .1s;}
.copy-item:hover{background:var(--s2);}
.copy-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--gold);}
.copy-item label{cursor:pointer;font-size:.87rem;flex:1;}
.copy-item .ci-meta{font-size:.72rem;color:var(--muted);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--s1);}
::-webkit-scrollbar-thumb{background:var(--border-lit);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim);}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-row{display:flex;align-items:center;gap:8px;justify-content:center;padding:40px;color:var(--muted);font-size:.85rem;}
.toast{position:fixed;bottom:28px;right:28px;background:var(--s3);border:1px solid var(--gold-dim);color:var(--text);padding:10px 18px;border-radius:var(--r);font-size:.85rem;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:300;animation:toastIn .25s ease,toastOut .25s ease 2.25s forwards;}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes toastOut{to{opacity:0;transform:translateY(10px);}}
</style>
</head>
<body>

<!-- Setup -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-logo">⚔️</div>
    <div class="setup-title">로스트아크 숙제</div>
    <div class="setup-sub">Supabase 연결 정보를 입력하면 시작합니다</div>
    <div class="setup-step">
      <div class="setup-step-label">① Supabase SQL Editor에서 실행</div>
      <div class="sql-block" id="sql-display"></div>
      <button class="copy-sql-btn" onclick="copySql()">📋 SQL 복사</button>
    </div>
    <div class="setup-step">
      <div class="setup-step-label">② 연결 정보 입력</div>
      <div class="form-group"><label class="form-label">Project URL</label><input class="form-input" id="setup-url" lang="ko" type="url" placeholder="https://xxxxxx.supabase.co"></div>
      <div class="form-group" style="margin-bottom:0"><label class="form-label">Anon Public Key</label><input class="form-input" id="setup-key" lang="ko" type="text" placeholder="eyJhbGciO..."></div>
    </div>
    <button class="btn btn-gold btn-full" style="margin-top:18px;font-size:.9rem;padding:13px;" onclick="saveConfig()">⚔️ 연결하고 시작하기</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="header">
    <span style="font-size:1.2rem">⚔️</span>
    <div class="header-title">로스트아크 숙제</div>
    <div class="header-right"><span id="header-time" style="font-size:.72rem;color:var(--muted);"></span><button class="btn btn-icon" onclick="openSettings()">⚙️</button></div>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">계정 목록</div>
      <div class="sidebar-list" id="account-list"></div>
      <div class="sidebar-add"><button class="btn btn-sec btn-full" onclick="openModal('modal-account')">+ 계정 추가</button></div>
    </div>
    <div class="main" id="main-area">
      <div class="center-state"><div class="center-state-icon">🗡️</div><span style="color:var(--muted);font-size:.88rem">왼쪽에서 계정을 선택하세요</span></div>
    </div>
  </div>
</div>

<!-- ── Modals ── -->
<div class="overlay" id="modal-account"><div class="modal">
  <div class="modal-title">계정 추가</div>
  <div class="form-group"><label class="form-label">계정명</label><input class="form-input" id="acc-name" lang="ko" inputmode="text" placeholder="예: 본계, 서브계1" maxlength="30" onkeydown="if(event.key==='Enter')createAccount()"></div>
  <div class="modal-footer"><button class="btn btn-sec" onclick="closeModal('modal-account')">취소</button><button class="btn btn-gold" onclick="createAccount()">추가</button></div>
</div></div>

<div class="overlay" id="modal-char"><div class="modal">
  <div class="modal-title">캐릭터 추가</div>
  <div class="form-group"><label class="form-label">캐릭터명</label><input class="form-input" id="char-name" lang="ko" inputmode="text" placeholder="캐릭터 이름" maxlength="30"></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">직업</label><input class="form-input" id="char-class" lang="ko" inputmode="text" placeholder="예: 워로드, 바드"></div>
    <div class="form-group"><label class="form-label">아이템 레벨</label><input class="form-input" id="char-ilvl" type="number" placeholder="1620" min="0" max="9999"></div>
  </div>
  <div class="modal-footer"><button class="btn btn-sec" onclick="closeModal('modal-char')">취소</button><button class="btn btn-gold" onclick="createChar()">추가</button></div>
</div></div>

<!-- Character Edit Modal -->
<div class="overlay" id="modal-edit-char"><div class="modal">
  <div class="modal-title">캐릭터 수정</div>
  <div class="form-group"><label class="form-label">캐릭터명</label><input class="form-input" id="edit-char-name" lang="ko" inputmode="text" maxlength="30"></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">직업</label><input class="form-input" id="edit-char-class" lang="ko" inputmode="text"></div>
    <div class="form-group"><label class="form-label">아이템 레벨</label><input class="form-input" id="edit-char-ilvl" type="number" min="0" max="9999"></div>
  </div>
  <input type="hidden" id="edit-char-id">
  <div class="modal-footer"><button class="btn btn-sec" onclick="closeModal('modal-edit-char')">취소</button><button class="btn btn-gold" onclick="updateChar()">저장</button></div>
</div></div>

<div class="overlay" id="modal-task"><div class="modal" id="modal-task-box">
  <div class="modal-title" id="task-modal-title">숙제 추가</div>
  <div class="form-group"><label class="form-label">숙제명</label><input class="form-input" id="task-name" lang="ko" inputmode="text" placeholder="예: 카오스 던전, 가디언 토벌, 낙원 레이드" maxlength="60"></div>
  <div class="form-group" id="count-toggle-wrap">
    <div class="count-toggle-box" onclick="toggleHasCount()">
      <input type="checkbox" id="has-count" tabindex="-1">
      <div class="count-toggle-lbl">수량 추적 사용<small>최대값이 있는 완료형 카운터</small></div>
    </div>
    <div id="count-max-row" class="count-max-row" style="display:none">
      <span class="count-max-unit">최대 수량:</span><input class="form-input" id="task-count-max" type="number" min="1" max="9999" placeholder="10"><span class="count-max-unit">개</span>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">초기화 주기</label>
      <select class="form-select" id="task-reset" onchange="onResetTypeChange()">
        <option value="daily">매일 (06:00 KST)</option><option value="weekly">매주</option>
      </select>
    </div>
    <div class="form-group" id="day-group"><label class="form-label">초기화 요일</label>
      <select class="form-select" id="task-day">
        <option value="1">월요일</option><option value="2">화요일</option><option value="3" selected>수요일</option>
        <option value="4">목요일</option><option value="5">금요일</option><option value="6">토요일</option><option value="0">일요일</option>
      </select>
    </div>
  </div>
  <input type="hidden" id="task-edit-id"><input type="hidden" id="task-is-exp" value="0"><input type="hidden" id="task-parent-id" value="">
  <div class="modal-footer"><button class="btn btn-sec" onclick="closeModal('modal-task')">취소</button><button class="btn btn-gold" id="task-submit-btn" onclick="submitTask()">추가</button></div>
</div></div>

<div class="overlay" id="modal-copy"><div class="modal">
  <div class="modal-title">다른 캐릭터에 복제</div>
  <div style="font-size:.82rem;color:var(--muted);margin-bottom:14px;" id="copy-task-label"></div>
  <div class="form-group"><label class="form-label">복제할 캐릭터 선택 (계정 전체)</label><div class="copy-list" id="copy-char-list"></div></div>
  <div class="modal-footer"><button class="btn btn-sec" onclick="closeModal('modal-copy')">취소</button><button class="btn btn-gold" onclick="executeCopy()">📋 복제</button></div>
</div></div>

<div class="overlay" id="modal-settings"><div class="modal">
  <div class="modal-title">⚙️ 설정</div>
  <div class="form-group"><label class="form-label">Supabase URL</label><input class="form-input" id="set-url" lang="ko" type="url"></div>
  <div class="form-group"><label class="form-label">Anon Key</label><input class="form-input" id="set-key" lang="ko" type="text"></div>
  <div class="modal-footer"><button class="btn btn-danger" style="margin-right:auto" onclick="clearConfig()">연결 해제</button><button class="btn btn-sec" onclick="closeModal('modal-settings')">취소</button><button class="btn btn-gold" onclick="saveSettings()">저장</button></div>
</div></div>

<div class="overlay" id="modal-add-currency"><div class="modal modal-teal">
  <div class="modal-title teal">💰 재화 추가</div>
  <div class="form-group"><label class="form-label">재화 이름</label><input class="form-input" id="curr-name-input" lang="ko" inputmode="text" placeholder="예: 골드, 코어정수" maxlength="20"></div>
  <div class="form-group"><label class="form-label">아이콘</label><div class="icon-picker" id="curr-icon-picker"></div></div>
  <div class="modal-footer"><button class="btn btn-sec" onclick="closeModal('modal-add-currency')">취소</button><button class="btn btn-teal" onclick="addCurrency()">추가</button></div>
</div></div>

<div class="overlay" id="modal-curr-popup"><div class="modal curr-popup-modal modal-teal">
  <div class="curr-popup-top"><span class="curr-popup-icon" id="curr-popup-icon"></span><span class="curr-popup-name" id="curr-popup-name"></span><button class="btn btn-icon" onclick="closeModal('modal-curr-popup')">✕</button></div>
  <div class="curr-amount-display" id="curr-amount-display">0</div>
  <div class="curr-adj-section"><div class="curr-adj-label">빼기</div><div class="curr-adj-row">
    <button class="curr-adj-btn curr-adj-minus" onclick="adjustCurr(-10000)">-10,000</button>
    <button class="curr-adj-btn curr-adj-minus" onclick="adjustCurr(-1000)">-1,000</button>
    <button class="curr-adj-btn curr-adj-minus" onclick="adjustCurr(-100)">-100</button>
    <button class="curr-adj-btn curr-adj-minus" onclick="adjustCurr(-10)">-10</button>
    <button class="curr-adj-btn curr-adj-minus" onclick="adjustCurr(-1)">-1</button>
  </div></div>
  <div class="curr-adj-section"><div class="curr-adj-label">더하기</div><div class="curr-adj-row">
    <button class="curr-adj-btn curr-adj-plus" onclick="adjustCurr(1)">+1</button>
    <button class="curr-adj-btn curr-adj-plus" onclick="adjustCurr(10)">+10</button>
    <button class="curr-adj-btn curr-adj-plus" onclick="adjustCurr(100)">+100</button>
    <button class="curr-adj-btn curr-adj-plus" onclick="adjustCurr(1000)">+1,000</button>
    <button class="curr-adj-btn curr-adj-plus" onclick="adjustCurr(10000)">+10,000</button>
  </div></div>
  <div class="curr-direct-row"><input type="number" id="curr-direct-val" class="form-input" placeholder="직접 입력" style="flex:1"><button class="btn btn-teal btn-sm" onclick="setCurrDirect('add')">추가</button><button class="btn btn-sec btn-sm" onclick="setCurrDirect('set')">설정</button></div>
  <div style="display:flex;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);"><button class="btn btn-danger btn-sm" onclick="deleteCurrAndClose()">재화 삭제</button><button class="btn btn-sec btn-sm" onclick="closeModal('modal-curr-popup')">닫기</button></div>
</div></div>

<div class="overlay" id="modal-add-popup"><div class="modal modal-orange">
  <div class="modal-title orange">📋 팝업 만들기</div>
  <div class="form-group"><label class="form-label">팝업 제목</label><input class="form-input" id="popup-title-input" lang="ko" inputmode="text" placeholder="예: 스펙업 계획, 코어정수 계획" maxlength="30"></div>
  <div class="form-group"><label class="form-label">아이콘</label><div class="icon-picker" id="popup-icon-picker"></div></div>
  <div class="modal-footer"><button class="btn btn-sec" onclick="closeModal('modal-add-popup')">취소</button><button class="btn btn-orange" onclick="createCustomPopup()">만들기</button></div>
</div></div>

<div class="overlay" id="modal-popup-viewer"><div class="modal popup-viewer-modal">
  <div class="popup-viewer-top"><span class="popup-viewer-icon" id="pv-icon"></span><span class="popup-viewer-title" id="pv-title"></span><button class="btn btn-ghost" onclick="openPopupEditor()" style="font-size:.8rem">✏️ 편집</button><button class="btn btn-icon" onclick="closeModal('modal-popup-viewer')">✕</button></div>
  <div class="popup-content" id="popup-viewer-content"></div>
</div></div>

<div class="overlay" id="modal-popup-editor"><div class="modal popup-editor-modal">
  <div class="editor-top">
    <span class="editor-icon-display" id="editor-icon-display" onclick="toggleIconPickerInEditor()">📋</span>
    <input class="form-input" id="editor-title-input" lang="ko" inputmode="text" placeholder="팝업 제목" style="flex:1;font-size:.95rem;">
    <button class="btn btn-icon" onclick="closeModal('modal-popup-editor')">✕</button>
  </div>
  <div id="editor-icon-picker-wrap" style="display:none;margin-bottom:14px;padding:12px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);"><div class="icon-picker" id="editor-icon-picker"></div></div>
  <div class="editor-block-list" id="editor-block-list"></div>
  <div class="editor-add-row"><div class="editor-add-label">블록 추가</div><button class="btn btn-sec btn-sm" onclick="addBlock('text')">📝 텍스트</button><button class="btn btn-sec btn-sm" onclick="addBlock('table')">📊 표</button><button class="btn btn-sec btn-sm" onclick="addBlock('divider')">➖ 구분선</button></div>
  <div class="modal-footer"><button class="btn btn-danger btn-sm" style="margin-right:auto" onclick="deleteCurrentPopup()">팝업 삭제</button><button class="btn btn-sec" onclick="closeModal('modal-popup-editor')">취소</button><button class="btn btn-gold" onclick="savePopup()">💾 저장</button></div>
</div></div>

<script>
const { createClient } = supabase;

const SCHEMA = `-- 전체 설치 SQL (중복 실행 안전)
create extension if not exists "uuid-ossp";

create table if not exists accounts (
  id uuid default uuid_generate_v4() primary key,
  name text not null, sort_order int default 0,
  created_at timestamptz default now()
);
create table if not exists characters (
  id uuid default uuid_generate_v4() primary key,
  account_id uuid references accounts(id) on delete cascade,
  name text not null, class_name text default '',
  item_level numeric default 0, sort_order int default 0,
  created_at timestamptz default now()
);
create table if not exists tasks (
  id uuid default uuid_generate_v4() primary key,
  character_id uuid references characters(id) on delete cascade,
  parent_id uuid references tasks(id) on delete cascade,
  name text not null, reset_type text default 'weekly',
  reset_day int default 3, is_completed boolean default false,
  last_completed_at timestamptz, count_current int default 0,
  count_max int default null, sort_order int default 0,
  created_at timestamptz default now()
);
create table if not exists expedition_tasks (
  id uuid default uuid_generate_v4() primary key,
  account_id uuid references accounts(id) on delete cascade,
  parent_id uuid references expedition_tasks(id) on delete cascade,
  name text not null, reset_type text default 'weekly',
  reset_day int default 3, is_completed boolean default false,
  last_completed_at timestamptz, count_current int default 0,
  count_max int default null, sort_order int default 0,
  created_at timestamptz default now()
);
create table if not exists currencies (
  id uuid default uuid_generate_v4() primary key,
  character_id uuid references characters(id) on delete cascade,
  name text not null, amount bigint default 0,
  icon text default '💰', sort_order int default 0,
  created_at timestamptz default now()
);
create table if not exists custom_popups (
  id uuid default uuid_generate_v4() primary key,
  character_id uuid references characters(id) on delete cascade,
  title text not null, icon text default '📋',
  content jsonb default '[]'::jsonb, sort_order int default 0,
  created_at timestamptz default now()
);

alter table accounts disable row level security;
alter table characters disable row level security;
alter table tasks disable row level security;
alter table expedition_tasks disable row level security;
alter table currencies disable row level security;
alter table custom_popups disable row level security;

-- 기존 설치 업데이트 (이미 사용 중이면 아래도 실행)
alter table accounts add column if not exists sort_order int default 0;
alter table tasks add column if not exists count_current int default 0;
alter table tasks add column if not exists count_max int default null;
alter table tasks add column if not exists parent_id uuid references tasks(id) on delete cascade;
alter table expedition_tasks add column if not exists parent_id uuid references expedition_tasks(id) on delete cascade;`;

document.getElementById('sql-display').textContent = SCHEMA;
function copySql(){navigator.clipboard.writeText(SCHEMA).then(()=>toast('📋 SQL 복사됨!'));}

// ─── Config ───
function getConfig(){const u=localStorage.getItem('la_url'),k=localStorage.getItem('la_key');return u&&k?{url:u,key:k}:null;}
function saveConfig(){const u=document.getElementById('setup-url').value.trim(),k=document.getElementById('setup-key').value.trim();if(!u||!k){toast('❗ URL과 Key를 입력하세요');return;}localStorage.setItem('la_url',u);localStorage.setItem('la_key',k);initApp();}
function openSettings(){const c=getConfig();document.getElementById('set-url').value=c?.url||'';document.getElementById('set-key').value=c?.key||'';openModal('modal-settings');}
function saveSettings(){const u=document.getElementById('set-url').value.trim(),k=document.getElementById('set-key').value.trim();if(!u||!k){toast('❗ 빈 칸을 채워주세요');return;}localStorage.setItem('la_url',u);localStorage.setItem('la_key',k);closeModal('modal-settings');location.reload();}
function clearConfig(){if(!confirm('연결을 해제합니다. 데이터는 Supabase에 보존됩니다.'))return;localStorage.removeItem('la_url');localStorage.removeItem('la_key');location.reload();}

// ─── State ───
let sb=null;
let S={
  accounts:[],characters:{},tasks:{},expTasks:{},currencies:{},customPopups:{},
  selAcc:null,selChar:null,copyTaskId:null,expCollapsed:false,
  currPopupId:null,viewPopupId:null,editPopupId:null,editBlocks:[],
  selCurrIcon:'💰',selPopupIcon:'📋',editorIcon:'📋',
  hideCompleted: localStorage.getItem('la_hide')==='1',
  collapsedTasks: new Set(), // parent task IDs that are collapsed
};

// ─── DnD ───
const _dnd={srcType:null,srcIdx:null};
function dndStart(e,type,idx){_dnd.srcType=type;_dnd.srcIdx=idx;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain','');setTimeout(()=>e.target.classList.add('dnd-dragging'),0);}
function dndEnd(e){e.target.classList.remove('dnd-dragging');document.querySelectorAll('.dnd-over-v,.dnd-over-h').forEach(el=>{el.classList.remove('dnd-over-v','dnd-over-h');});}
function dndOver(e,type,isH){e.preventDefault();e.stopPropagation();if(_dnd.srcType!==type)return;e.dataTransfer.dropEffect='move';const cls=isH?'dnd-over-h':'dnd-over-v';document.querySelectorAll('.'+cls).forEach(el=>el.classList.remove(cls));e.currentTarget.classList.add(cls);}
function dndLeave(e,isH){e.currentTarget.classList.remove(isH?'dnd-over-h':'dnd-over-v');}
async function dndDrop(e,type,destIdx){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll('.dnd-over-v,.dnd-over-h,.dnd-dragging').forEach(el=>el.classList.remove('dnd-over-v','dnd-over-h','dnd-dragging'));
  if(_dnd.srcType!==type||_dnd.srcIdx===null||_dnd.srcIdx===destIdx){_dnd.srcIdx=null;return;}
  const srcIdx=_dnd.srcIdx;_dnd.srcIdx=null;_dnd.srcType=null;
  let list,table;
  if(type==='account'){list=S.accounts;table='accounts';}
  else if(type==='char'){list=S.characters[S.selAcc];table='characters';}
  else if(type==='task'){list=S.tasks[S.selChar].filter(t=>!t.parent_id);table='tasks';}
  else if(type==='exptask'){list=S.expTasks[S.selAcc].filter(t=>!t.parent_id);table='expedition_tasks';}
  else if(type==='curr'){list=S.currencies[S.selChar];table='currencies';}
  else if(type==='popup'){list=S.customPopups[S.selChar];table='custom_popups';}
  if(!list)return;
  const[moved]=list.splice(srcIdx,1);
  list.splice(destIdx,0,moved);
  // For tasks, update the original array too
  if(type==='task'){S.tasks[S.selChar]=S.tasks[S.selChar].filter(t=>t.parent_id).concat(list);}
  if(type==='exptask'){S.expTasks[S.selAcc]=S.expTasks[S.selAcc].filter(t=>t.parent_id).concat(list);}
  await Promise.all(list.map((item,i)=>sb.from(table).update({sort_order:i}).eq('id',item.id)));
  list.forEach((item,i)=>{ item.sort_order=i; });
  if(type==='account')renderSidebar();
  else if(type==='char')renderTabs();
  else renderTaskArea();
}

// ─── Reset Logic ───
function getLastResetUTC(type,day){const now=new Date();if(type==='daily'){const r=new Date(now);r.setUTCHours(21,0,0,0);if(now<r)r.setUTCDate(r.getUTCDate()-1);return r;}const rDay=(day+6)%7,r=new Date(now);r.setUTCHours(21,0,0,0);let back=(now.getUTCDay()-rDay+7)%7;if(back===0&&now<r)back=7;r.setUTCDate(r.getUTCDate()-back);return r;}
function isEffDone(t){if(!t.is_completed||!t.last_completed_at)return false;return new Date(t.last_completed_at)>getLastResetUTC(t.reset_type,t.reset_day);}
const DAYS=['일','월','화','수','목','금','토'];
function resetLabel(t){return t.reset_type==='daily'?'매일 초기화 (06:00 KST)':`매주 ${DAYS[t.reset_day]}요일 초기화`;}
function nextResetLabel(t){const r=getLastResetUTC(t.reset_type,t.reset_day),next=new Date(r);if(t.reset_type==='daily')next.setUTCDate(next.getUTCDate()+1);else next.setUTCDate(next.getUTCDate()+7);const diff=next-Date.now();if(diff<=0)return '곧 초기화';const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);return h>0?`${h}시간 후 초기화`:`${m}분 후 초기화`;}

async function autoReset(list,table){const r=list.filter(t=>t.is_completed&&!isEffDone(t));if(!r.length)return;await sb.from(table).update({is_completed:false,last_completed_at:null,count_current:0}).in('id',r.map(t=>t.id));r.forEach(t=>{t.is_completed=false;t.last_completed_at=null;t.count_current=0;});}

// ─── Parent-Child Logic ───
function buildTaskTree(list){
  const roots=list.filter(t=>!t.parent_id).sort((a,b)=>a.sort_order-b.sort_order);
  const childrenOf={};
  list.filter(t=>t.parent_id).forEach(t=>{if(!childrenOf[t.parent_id])childrenOf[t.parent_id]=[];childrenOf[t.parent_id].push(t);});
  Object.values(childrenOf).forEach(arr=>arr.sort((a,b)=>a.sort_order-b.sort_order));
  return{roots,childrenOf};
}

async function checkParentStatus(parentId,isExp){
  const list=getList(isExp);
  const parent=list.find(t=>t.id===parentId);if(!parent)return;
  const children=list.filter(t=>t.parent_id===parentId);if(!children.length)return;
  const allDone=children.every(t=>isEffDone(t));
  const parentDone=isEffDone(parent);
  if(allDone===parentDone)return;
  const now=new Date().toISOString();
  const up=allDone?{is_completed:true,last_completed_at:now}:{is_completed:false,last_completed_at:null};
  await sb.from(isExp?'expedition_tasks':'tasks').update(up).eq('id',parentId);
  Object.assign(parent,up);
}

  renderTaskArea();
}

function genId(){return 'b'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

// Subtask reorder DnD
async function dndSubDrop(e,parentId,destIdx,isExp){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll('.dnd-over-v,.dnd-over-h,.dnd-dragging').forEach(el=>el.classList.remove('dnd-over-v','dnd-over-h','dnd-dragging'));
  const srcType=_dnd.srcType;const srcIdx=_dnd.srcIdx;_dnd.srcType=null;_dnd.srcIdx=null;
  if(!srcType||srcType!==`stask_${parentId}`||srcIdx===null||srcIdx===destIdx)return;
  const list=getList(isExp).filter(t=>t.parent_id===parentId);
  const[moved]=list.splice(srcIdx,1);list.splice(destIdx,0,moved);
  await Promise.all(list.map((t,i)=>sb.from(isExp?'expedition_tasks':'tasks').update({sort_order:i}).eq('id',t.id)));
  list.forEach((item,i)=>{ item.sort_order=i; });
  // Update in main array
  const mainList=getList(isExp);list.forEach(t=>{const idx=mainList.findIndex(x=>x.id===t.id);if(idx>=0)mainList[idx]=t;});
  renderTaskArea();
}

// ─── Toggle & Count ───
async function toggleTask(taskId,isExp){
  const list=getList(isExp),t=list.find(x=>x.id===taskId);if(!t)return;
  const nowDone=!isEffDone(t),now=new Date().toISOString();
  const up={is_completed:nowDone,last_completed_at:nowDone?now:null};
  if(t.count_max!=null)up.count_current=nowDone?t.count_max:0;
  await sb.from(isExp?'expedition_tasks':'tasks').update(up).eq('id',taskId);
  Object.assign(t,up);
  if(t.parent_id)await checkParentStatus(t.parent_id,isExp);
  renderTaskArea();renderTabs();
}
async function updateCount(taskId,rawVal,isExp){
  const list=getList(isExp),t=list.find(x=>x.id===taskId);if(!t||t.count_max==null)return;
  const count=Math.max(0,Math.min(parseInt(rawVal)||0,t.count_max)),isDone=count>=t.count_max,now=new Date().toISOString();
  const up={count_current:count,is_completed:isDone,last_completed_at:isDone?now:null};
  await sb.from(isExp?'expedition_tasks':'tasks').update(up).eq('id',taskId);
  Object.assign(t,up);
  if(t.parent_id)await checkParentStatus(t.parent_id,isExp);
  const el=document.getElementById('ti-'+taskId);
  if(el){el.classList.toggle('done',isDone);const icon=el.querySelector('.checkbox-icon');if(icon)icon.style.opacity=isDone?'1':'0';const cb=el.querySelector('.checkbox');if(cb){cb.style.background=isDone?'var(--green)':'';cb.style.borderColor=isDone?'var(--green)':'';}const nm=el.querySelector('.task-name');if(nm)nm.style.textDecoration=isDone?'line-through':'';const inp=el.querySelector('.count-input');if(inp&&document.activeElement!==inp)inp.value=count;}
  renderTabs();
}

// ─── Task CRUD ───
function openAddTask(isExp=false,parentId=''){
  const isE=Boolean(isExp),hasParent=!!parentId;
  let title=isE?'원정대 숙제 추가':'숙제 추가';
  if(hasParent)title='하위 숙제 추가';
  document.getElementById('task-modal-title').textContent=title;
  document.getElementById('task-modal-title').className=isE?'modal-title purple':'modal-title';
  document.getElementById('modal-task-box').className=isE?'modal modal-purple':'modal';
  document.getElementById('task-submit-btn').textContent='추가';
  document.getElementById('task-name').value='';
  document.getElementById('task-reset').value='weekly';
  document.getElementById('task-day').value='3';
  document.getElementById('day-group').style.display='block';
  document.getElementById('task-edit-id').value='';
  document.getElementById('task-is-exp').value=isE?'1':'0';
  document.getElementById('task-parent-id').value=parentId;
  document.getElementById('has-count').checked=false;
  document.getElementById('count-max-row').style.display='none';
  document.getElementById('task-count-max').value='';
  // If sub-task, inherit parent's reset schedule and hide settings
  if(hasParent){
    const parent=getList(isE).find(t=>t.id===parentId);
    if(parent){document.getElementById('task-reset').value=parent.reset_type;document.getElementById('task-day').value=String(parent.reset_day);}
    document.getElementById('count-toggle-wrap').style.display='none';
    document.querySelector('#modal-task .form-row').style.display='none';
  } else {
    document.getElementById('count-toggle-wrap').style.display='block';
    document.querySelector('#modal-task .form-row').style.display='flex';
  }
  openModal('modal-task');setTimeout(()=>document.getElementById('task-name').focus(),80);
}
function openAddSubTask(parentId,isExp){openAddTask(isExp,parentId);}
function openEditTask(taskId,isExp){

  const isE=Boolean(isExp);

  document.getElementById('task-is-exp').value=isE?'1':'0';

function toggleHasCount(){const cb=document.getElementById('has-count');cb.checked=!cb.checked;document.getElementById('count-max-row').style.display=cb.checked?'flex':'none';if(cb.checked)setTimeout(()=>document.getElementById('task-count-max').focus(),50);}
function onResetTypeChange(){document.getElementById('day-group').style.display=document.getElementById('task-reset').value==='weekly'?'block':'none';}
async function submitTask(){
  const name=document.getElementById('task-name').value.trim(),resetType=document.getElementById('task-reset').value,resetDay=parseInt(document.getElementById('task-day').value),editId=document.getElementById('task-edit-id').value,isExp=document.getElementById('task-is-exp').value==='1',parentId=document.getElementById('task-parent-id').value||null,hc=document.getElementById('has-count').checked,countMax=hc?(parseInt(document.getElementById('task-count-max').value)||null):null;
  if(!name){toast('❗ 숙제명을 입력하세요');return;}
  const rec={name,reset_type:resetType,reset_day:resetDay,count_max:countMax};
  const table=isExp?'expedition_tasks':'tasks';
  if(editId){const{error}=await sb.from(table).update(rec).eq('id',editId);if(error){toast('❗ '+error.message);return;}const t=getList(isExp).find(x=>x.id===editId);if(t)Object.assign(t,rec);toast('✅ 수정됨');}
  else{
    if(isExp){rec.account_id=S.selAcc;}else{rec.character_id=S.selChar;}
    if(parentId){rec.parent_id=parentId;rec.sort_order=getList(isExp).filter(t=>t.parent_id===parentId).length;}
    else{rec.sort_order=getList(isExp).filter(t=>!t.parent_id).length;}
    const{data,error}=await sb.from(table).insert(rec).select().single();if(error){toast('❗ '+error.message);return;}
    if(isExp){if(!S.expTasks[S.selAcc])S.expTasks[S.selAcc]=[];S.expTasks[S.selAcc].push(data);}
    else{if(!S.tasks[S.selChar])S.tasks[S.selChar]=[];S.tasks[S.selChar].push(data);}
    toast('✅ 숙제 추가됨');
  }
  closeModal('modal-task');renderTaskArea();renderTabs();
}
async function deleteTask(taskId,isExp){
  if(!confirm('숙제를 삭제하시겠습니까? (하위 숙제도 함께 삭제됩니다)'))return;
  await sb.from(isExp?'expedition_tasks':'tasks').delete().eq('id',taskId);
  if(isExp)S.expTasks[S.selAcc]=(S.expTasks[S.selAcc]||[]).filter(t=>t.id!==taskId&&t.parent_id!==taskId);
  else S.tasks[S.selChar]=(S.tasks[S.selChar]||[]).filter(t=>t.id!==taskId&&t.parent_id!==taskId);
  renderTaskArea();renderTabs();toast('🗑️ 삭제됨');
}

// ─── Cross-account Copy ───
async function ensureAllCharsLoaded(){
  await Promise.all(S.accounts.map(async acc=>{
    if(!S.characters[acc.id]){const{data}=await sb.from('characters').select('*').eq('account_id',acc.id).order('sort_order').order('created_at');S.characters[acc.id]=data||[];}
  }));
}
async function openCopyTask(taskId){
  S.copyTaskId=taskId;
  const t=(S.tasks[S.selChar]||[]).find(x=>x.id===taskId);
  document.getElementById('copy-task-label').textContent=`"${t?.name}" 을(를) 복제합니다`;
  await ensureAllCharsLoaded();
  let html='';
  for(const acc of S.accounts){
    const chars=(S.characters[acc.id]||[]).filter(c=>c.id!==S.selChar);
    if(!chars.length)continue;
    html+=`<div class="copy-acc-header">${esc(acc.name)}</div>`;
    html+=chars.map(c=>`<div class="copy-item"><input type="checkbox" id="cc-${c.id}" value="${c.id}"><label for="cc-${c.id}">${esc(c.name)}</label><span class="ci-meta">${c.class_name?esc(c.class_name):''}${c.item_level?' · Lv.'+c.item_level:''}</span></div>`).join('');
  }
  document.getElementById('copy-char-list').innerHTML=html||'<div style="padding:14px;color:var(--muted);font-size:.83rem;text-align:center;">복제할 다른 캐릭터가 없습니다</div>';
  openModal('modal-copy');
}
async function executeCopy(){
  const checked=[...document.querySelectorAll('#copy-char-list input:checked')];if(!checked.length){toast('❗ 캐릭터를 선택하세요');return;}
  const src=(S.tasks[S.selChar]||[]).find(t=>t.id===S.copyTaskId);if(!src)return;
  const srcChildren=(S.tasks[S.selChar]||[]).filter(t=>t.parent_id===S.copyTaskId);
  let cnt=0;
  for(const cb of checked){
    const charId=cb.value;
    if(!S.tasks[charId])S.tasks[charId]=[];
    const rootCnt=S.tasks[charId].filter(t=>!t.parent_id).length;
    const{data:pd,error}=await sb.from('tasks').insert({character_id:charId,name:src.name,reset_type:src.reset_type,reset_day:src.reset_day,count_max:src.count_max,sort_order:rootCnt}).select().single();
    if(error)continue;
    S.tasks[charId].push(pd);
    if(srcChildren.length&&pd){
      const childIns=srcChildren.map((c,i)=>({character_id:charId,parent_id:pd.id,name:c.name,reset_type:c.reset_type,reset_day:c.reset_day,count_max:c.count_max,sort_order:i}));
      const{data:cd}=await sb.from('tasks').insert(childIns).select();
      if(cd)S.tasks[charId].push(...cd);
    }
    cnt++;
  }
  closeModal('modal-copy');renderTabs();toast(`✅ ${cnt}개 캐릭터에 복제 완료`);
}

// ─── Modals ───
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(ov=>{ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('open');});});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'));});

// ─── Utils ───
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2600);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

initApp();
</script>
