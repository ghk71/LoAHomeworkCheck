name: Build images/index.json

on:
  push:
    paths:
      - 'images/**'
      - '!images/index.json'
      - 'scripts/generate-image-index.js'
      - '.github/workflows/build-image-index.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-image-index
  cancel-in-progress: false

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 같은 워크플로의 push가 또다시 워크플로를 트리거하지 않도록
          # 봇 commit이라는 사실을 표시하기 위해 fetch-depth=0 사용
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate images/index.json
        run: node scripts/generate-image-index.js

      - name: Commit if changed
        run: |
          if [[ -z "$(git status --porcelain images/index.json)" ]]; then
            echo "변경 사항 없음. commit 건너뜀."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/index.json
          git commit -m "chore: update images/index.json [skip ci]"
          git push
