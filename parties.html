
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👥 파티 현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#0a0a0f;--s1:#111118;--s2:#16161f;--s3:#1e1e2a;--border:#2a2a3d;--border-lit:#3d3d5c;--gold:#c8a84b;--gold-bright:#e8c86a;--gold-dim:#8a6e2a;--gold-glow:rgba(200,168,75,.2);--text:#e0ddd5;--muted:#5a5f72;--dim:#2e3045;--green:#2ecc71;--red:#e74c3c;--orange:#e67e22;--teal:#1abc9c;--r:5px;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column;}
.page-nav{background:#070710;border-bottom:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;}
.pnav-item{padding:8px 20px;font-size:.82rem;color:var(--muted);text-decoration:none;transition:all .15s;display:flex;align-items:center;gap:6px;border-right:1px solid var(--border);}
.pnav-item:hover{color:var(--text);background:rgba(255,255,255,.03);}
.pnav-item.active{color:var(--gold);background:rgba(200,168,75,.06);border-bottom:2px solid var(--gold);}
.header{background:var(--s1);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);}
.header-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);letter-spacing:2px;}
.main{flex:1;overflow-y:auto;padding:16px 20px;}
/* Filter */
.filter-bar{margin-bottom:14px;background:var(--s2);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.filter-bar-hd{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border);}
.filter-bar-hd:hover{background:rgba(255,255,255,.02);}
.fb-label{font-size:.74rem;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;flex:1;}
.fb-count{font-size:.73rem;color:var(--muted);}
.fb-toggle{font-size:.7rem;color:var(--muted);}
.filter-bar-body{padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
.fb-acc-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.fb-acc-btn{padding:4px 12px;border-radius:12px;border:1px solid var(--border-lit);background:var(--s1);color:var(--muted);cursor:pointer;font-size:.78rem;font-family:'Noto Sans KR',sans-serif;font-weight:700;transition:all .15s;flex-shrink:0;}
.fb-acc-btn:hover{border-color:var(--gold);color:var(--gold);}
.fb-acc-btn.all-on{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,.12);}
.fb-acc-btn.partial{border-color:rgba(200,168,75,.4);color:rgba(200,168,75,.7);background:rgba(200,168,75,.06);}
.fb-acc-sep{width:1px;height:20px;background:var(--border);flex-shrink:0;margin:0 2px;}
.fb-char-btn{padding:4px 11px;border-radius:12px;border:1px solid var(--border);background:var(--s3);color:var(--muted);cursor:pointer;font-size:.79rem;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.fb-char-btn:hover{border-color:var(--border-lit);color:var(--text);}
.fb-char-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,.09);}
/* Char sections */
.char-section{margin-bottom:20px;}
.char-section-header{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--s1);border:1px solid var(--border);border-radius:6px;margin-bottom:10px;}
.cs-name{font-size:.92rem;font-weight:700;flex:1;}
.cs-class{font-size:.72rem;color:var(--muted);}
.cs-ilvl{font-size:.72rem;color:var(--muted);padding:1px 8px;background:var(--s2);border:1px solid var(--border);border-radius:8px;}
.cs-count{font-size:.76rem;color:var(--muted);}
/* Party cards */
.party-cards{display:flex;flex-wrap:wrap;gap:10px;}
.party-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;overflow:hidden;min-width:220px;max-width:300px;flex:1;transition:border-color .15s;}
.party-card:hover{border-color:var(--border-lit);}
.pc-header{padding:9px 13px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.pc-raid-name{font-size:.88rem;font-weight:700;color:var(--gold-bright);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-party-name{font-size:.72rem;color:var(--muted);margin-top:1px;}
.pc-difficulty{font-size:.7rem;padding:1px 6px;border-radius:6px;background:var(--s3);border:1px solid var(--border);color:var(--muted);}
.pc-body{padding:8px 12px;}
/* Slot list */
.slot-list{display:flex;flex-direction:column;gap:4px;}
.slot-row{display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:3px;font-size:.78rem;}
.slot-row.mine{background:rgba(200,168,75,.07);border:1px solid rgba(200,168,75,.2);border-radius:4px;}
.slot-num{font-size:.63rem;color:var(--dim);width:14px;flex-shrink:0;}
.slot-char-name{flex:1;font-size:.78rem;}
.slot-char-name.me{color:var(--gold);font-weight:600;}
.slot-char-class{font-size:.67rem;color:var(--muted);}
.slot-empty-txt{color:var(--dim);font-size:.75rem;flex:1;}
/* Leave button */
.pc-footer{padding:7px 12px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;}
.leave-btn{padding:4px 12px;border:1px solid rgba(231,76,60,.4);border-radius:var(--r);background:rgba(231,76,60,.08);color:var(--red);cursor:pointer;font-size:.76rem;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.leave-btn:hover{background:rgba(231,76,60,.2);border-color:var(--red);}
/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:10px;}
/* Buttons */
.btn{padding:6px 12px;border-radius:var(--r);border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.8rem;transition:all .15s;display:inline-flex;align-items:center;gap:4px;line-height:1;}
.btn-sec{background:var(--s3);color:var(--text);border:1px solid var(--border-lit);}.btn-sec:hover{border-color:var(--gold);}
.btn-ghost{background:transparent;color:var(--muted);padding:4px 6px;font-size:.74rem;border-radius:3px;}.btn-ghost:hover{color:var(--text);}
.btn-sm{padding:4px 8px;font-size:.75rem;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-full{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:var(--muted);}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:var(--s1);}::-webkit-scrollbar-thumb{background:var(--border-lit);border-radius:3px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--s3);border:1px solid var(--gold-dim);color:var(--text);padding:9px 16px;border-radius:var(--r);font-size:.84rem;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:300;animation:toastIn .25s ease,toastOut .25s ease 2.25s forwards;}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes toastOut{to{opacity:0;transform:translateY(8px);}}
</style>
</head>
<body>
<nav class="page-nav">
  <a href="index.html" class="pnav-item">⚔️ 숙제</a>
  <a href="core.html" class="pnav-item">🔮 코어현황</a>
  <a href="raid.html" class="pnav-item">🏰 레이드</a>
  <a href="overview.html" class="pnav-item">📊 레이드 현황</a>
  <a href="parties.html" class="pnav-item active">👥 파티 현황</a>
</nav>
<div class="header">
  <span>👥</span>
  <div class="header-title">파티 현황</div>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="btn btn-sec btn-sm" onclick="loadAll()">🔄 새로고침</button>
  </div>
</div>
<div class="main">
  <div id="loading" class="loading-full"><div class="spinner"></div> 불러오는 중...</div>
  <div id="content" style="display:none;">
    <div class="filter-bar" id="filter-bar">
      <div class="filter-bar-hd" onclick="toggleFilter()">
        <span class="fb-label">🔍 캐릭터 필터</span>
        <span class="fb-count" id="fb-count"></span>
        <button class="btn btn-sec btn-sm" onclick="event.stopPropagation();selectAll()">전체</button>
        <button class="btn btn-sec btn-sm" onclick="event.stopPropagation();deselectAll()">해제</button>
        <span class="fb-toggle" id="fb-toggle">▼</span>
      </div>
      <div class="filter-bar-body" id="fb-body"></div>
    </div>
    <div id="char-sections"></div>
  </div>
</div>
<script>
const{createClient}=supabase;
function getConfig(){const u=localStorage.getItem('la_url'),k=localStorage.getItem('la_key');return u&&k?{url:u,key:k}:null;}

let sb,accounts=[],characters=[],raids=[],parties=[],members=[];
let selectedChars=new Set();
let filterOpen=localStorage.getItem('la_pt_filter_open')!=='0';

async function init(){
  const cfg=getConfig();if(!cfg){window.location.href='index.html';return;}
  sb=createClient(cfg.url,cfg.key);
  await loadAll();
}
async function loadAll(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('content').style.display='none';
  const[r1,r2,r3,r4,r5]=await Promise.all([
    sb.from('accounts').select('*').order('sort_order').order('created_at'),
    sb.from('characters').select('*').order('sort_order').order('created_at'),
    sb.from('raid_presets').select('*').order('sort_order').order('created_at'),
    sb.from('raid_parties').select('*').order('sort_order').order('created_at'),
    sb.from('raid_party_members').select('*')
  ]);
  accounts=r1.data||[];characters=r2.data||[];raids=r3.data||[];parties=r4.data||[];members=r5.data||[];
  parties.forEach(p=>{p.members=members.filter(m=>m.party_id===p.id);});
  // Init filter: all chars that are in any party
  const charsInParties=characters.filter(c=>members.some(m=>m.character_id===c.id));
  const saved=localStorage.getItem('la_pt_sel_chars');
  if(saved){try{const ids=JSON.parse(saved);selectedChars=new Set(ids.filter(id=>charsInParties.some(c=>c.id===id)));}catch{selectedChars=new Set(charsInParties.map(c=>c.id));}}
  else selectedChars=new Set(charsInParties.map(c=>c.id));
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  renderFilter();render();
}

// ─── Filter ───
function saveFilter(){localStorage.setItem('la_pt_sel_chars',JSON.stringify([...selectedChars]));}
function toggleFilter(){filterOpen=!filterOpen;localStorage.setItem('la_pt_filter_open',filterOpen?'1':'0');applyFilterOpen();}
function applyFilterOpen(){document.getElementById('fb-body').style.display=filterOpen?'flex':'none';document.getElementById('fb-toggle').textContent=filterOpen?'▼':'▶';}
function renderFilter(){
  const charsInParties=characters.filter(c=>members.some(m=>m.character_id===c.id));
  let html='';
  accounts.forEach(acc=>{
    const chars=charsInParties.filter(c=>c.account_id===acc.id);
    if(!chars.length)return;
    const allOn=chars.every(c=>selectedChars.has(c.id)),anyOn=chars.some(c=>selectedChars.has(c.id));
    html+=`<div class="fb-acc-row">`;
    html+=`<button class="fb-acc-btn ${allOn?'all-on':anyOn?'partial':''}" onclick="toggleAccFilter('${acc.id}')">${esc(acc.name)}</button>`;
    html+=`<div class="fb-acc-sep"></div>`;
    chars.forEach(c=>{html+=`<button class="fb-char-btn ${selectedChars.has(c.id)?'on':''}" onclick="toggleCharFilter('${c.id}')">${esc(c.name)}${c.item_level?` <span style="font-size:.67rem;opacity:.6">Lv.${c.item_level}</span>`:''}</button>`;});
    html+=`</div>`;
  });
  document.getElementById('fb-body').innerHTML=html;
  const cnt=document.getElementById('fb-count');if(cnt)cnt.textContent=`${selectedChars.size}/${charsInParties.length}명`;
  applyFilterOpen();
}
function toggleAccFilter(accId){const chars=characters.filter(c=>c.account_id===accId&&members.some(m=>m.character_id===c.id));const allOn=chars.every(c=>selectedChars.has(c.id));chars.forEach(c=>{if(allOn)selectedChars.delete(c.id);else selectedChars.add(c.id);});saveFilter();renderFilter();render();}
function toggleCharFilter(id){if(selectedChars.has(id))selectedChars.delete(id);else selectedChars.add(id);saveFilter();renderFilter();render();}
function selectAll(){const ci=characters.filter(c=>members.some(m=>m.character_id===c.id));selectedChars=new Set(ci.map(c=>c.id));saveFilter();renderFilter();render();}
function deselectAll(){selectedChars.clear();saveFilter();renderFilter();render();}

// ─── Render ───
function render(){
  const el=document.getElementById('char-sections');
  const visChars=characters.filter(c=>selectedChars.has(c.id));
  if(!visChars.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">👥</div><div>캐릭터를 선택하세요</div></div>';return;}
  // Group by account
  let html='';
  accounts.forEach(acc=>{
    const chars=visChars.filter(c=>c.account_id===acc.id);
    if(!chars.length)return;
    chars.forEach(c=>{
      const charMembers=members.filter(m=>m.character_id===c.id);
      if(!charMembers.length)return;
      const charParties=charMembers.map(m=>{const p=parties.find(x=>x.id===m.party_id);return p?{party:p,member:m}:null;}).filter(Boolean);
      if(!charParties.length)return;
      html+=`<div class="char-section">
        <div class="char-section-header">
          <div class="cs-name">${esc(c.name)}</div>
          ${c.class_name?`<div class="cs-class">${esc(c.class_name)}</div>`:''}
          ${c.item_level?`<div class="cs-ilvl">Lv.${c.item_level}</div>`:''}
          <div class="cs-count">${charParties.length}개 파티</div>
        </div>
        <div class="party-cards">${charParties.map(({party:p,member:m})=>partyCardHTML(p,c,m)).join('')}</div>
      </div>`;
    });
  });
  el.innerHTML=html||'<div class="empty-state"><div class="empty-icon">👥</div><div>참여 중인 파티가 없습니다</div></div>';
}

function partyCardHTML(p,myChar,myMember){
  const preset=raids.find(x=>x.id===p.preset_id);
  const slots=[];for(let i=0;i<p.party_size;i++){const m=p.members.find(x=>x.slot_index===i);slots.push(m||{slot_index:i,character_id:null});}
  return`<div class="party-card">
    <div class="pc-header">
      <div style="flex:1;min-width:0;">
        <div class="pc-raid-name">${esc(preset?.name||'?')}</div>
        <div class="pc-party-name">${esc(p.name||'파티')} · ${p.party_size}인${preset?.difficulty?` · ${esc(preset.difficulty)}`:''}${preset?.entry_level?` · 입장 ${preset.entry_level}`:''}</div>
      </div>
    </div>
    <div class="pc-body">
      <div class="slot-list">
        ${slots.map((slot,i)=>{
          const ch=characters.find(c=>c.id===slot.character_id);
          const isMe=slot.character_id===myChar.id;
          if(ch)return`<div class="slot-row ${isMe?'mine':''}">
            <span class="slot-num">${i+1}</span>
            <span class="slot-char-name ${isMe?'me':''}">${esc(ch.name)}</span>
            <span class="slot-char-class">${esc(ch.class_name||'')}${ch.item_level?' Lv.'+ch.item_level:''}</span>
          </div>`;
          return`<div class="slot-row"><span class="slot-num">${i+1}</span><span class="slot-empty-txt">빈 슬롯</span></div>`;
        }).join('')}
      </div>
    </div>
    <div class="pc-footer">
      <button class="leave-btn" onclick="leaveParty('${p.id}','${myChar.id}','${myMember.id}','${preset?.id||''}','${esc(preset?.name||'')}')">탈퇴</button>
    </div>
  </div>`;
}

// ─── Leave party ───
async function leaveParty(partyId,charId,memberId,presetId,presetName){
  if(!confirm(`"${presetName}" 파티에서 탈퇴합니다.\n연동된 레이드 숙제도 삭제됩니다. 계속?`))return;
  // 1. Remove from party slot
  await sb.from('raid_party_members').delete().eq('id',memberId);
  members=members.filter(m=>m.id!==memberId);
  const p=parties.find(x=>x.id===partyId);
  if(p)p.members=p.members.filter(m=>m.id!==memberId);
  // 2. Delete linked raid_task (index.html + overview.html source)
  if(presetId&&charId){
    await sb.from('raid_tasks').delete().eq('character_id',charId).eq('preset_id',presetId);
  }
  toast('✅ 파티 탈퇴 완료');
  renderFilter();render();
}

function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2600);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
init();
</script>
</body>
</html>
