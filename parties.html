<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👥 파티 현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>

/* ══════════════════════════════════════════════════════
   MODERN DESIGN SYSTEM 2025
   - Refined dark theme with depth
   - Smooth transitions + micro-interactions
   - Glass morphism cards
   - Better typography hierarchy
   ══════════════════════════════════════════════════════ */

:root {
  /* Core palette */
  --bg: #080b12;
  --bg-grad: radial-gradient(ellipse at 20% 0%, #0d1220 0%, #080b12 60%);
  --surface-1: #0d1120;
  --surface-2: #111827;
  --surface-3: #1a2235;
  --surface-4: #1f2d42;
  --surface-glass: rgba(17,24,39,.75);

  /* Borders */
  --border: rgba(255,255,255,.07);
  --border-lit: rgba(255,255,255,.12);
  --border-focus: rgba(139,92,246,.5);

  /* Brand - Purple/Blue accent (더 세련된 팔레트) */
  --accent: #7c3aed;
  --accent-2: #6d28d9;
  --accent-glow: rgba(124,58,237,.25);

  /* Gold - 레이드 관련 (기존 유지하되 더 세련되게) */
  --gold: #f59e0b;
  --gold-bright: #fbbf24;
  --gold-dim: #78350f;
  --gold-glow: rgba(245,158,11,.2);
  --gold-text: #fcd34d;

  /* Semantic */
  --green: #10b981;
  --green-glow: rgba(16,185,129,.15);
  --red: #ef4444;
  --red-glow: rgba(239,68,68,.12);
  --blue: #3b82f6;
  --teal: #14b8a6;
  --orange: #f97316;
  --purple: #a78bfa;

  /* Text */
  --text: #f1f5f9;
  --text-2: #94a3b8;
  --text-3: #475569;
  --dim: #2d3748;

  /* Radius */
  --r: 8px;
  --r-sm: 5px;
  --r-lg: 12px;
  --r-xl: 16px;

  /* Shadow */
  --shadow-sm: 0 1px 3px rgba(0,0,0,.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,.5);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.6);
  --shadow-gold: 0 0 20px rgba(245,158,11,.15);

  /* Transition */
  --t: .18s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; }
body {
  background: var(--bg);
  background-image: var(--bg-grad);
  color: var(--text);
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
  font-size: 14px;
  line-height: 1.5;
}
input[type="text"],input:not([type]),textarea { ime-mode:active; }

/* ── Scrollbars ── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:10px; }
::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,.2); }

/* ── Page Nav ── */
.page-nav {
  background: rgba(8,11,18,.95);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  flex-shrink: 0;
  backdrop-filter: blur(12px);
  position: relative;
  z-index: 20;
}
.page-nav::after {
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(124,58,237,.4),var(--gold-dim),transparent);
}
.pnav-item {
  padding: 10px 22px;
  font-size: .81rem;
  font-weight: 500;
  color: var(--text-2);
  text-decoration: none;
  transition: all var(--t);
  display: flex;
  align-items: center;
  gap: 7px;
  border-right: 1px solid var(--border);
  position: relative;
  letter-spacing: .3px;
}
.pnav-item:hover { color: var(--text); background: rgba(255,255,255,.04); }
.pnav-item.active {
  color: var(--gold-text);
  background: rgba(245,158,11,.06);
}
.pnav-item.active::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

/* ── DnD ── */
[draggable="true"] { cursor:grab; user-select:none; }
.dnd-dragging { opacity:.3!important; }
.dnd-over-v { box-shadow:inset 0 -3px 0 var(--gold)!important; }
.dnd-over-h { box-shadow:inset -3px 0 0 var(--gold)!important; }
.dnd-handle {
  font-size:.7rem; color:var(--text-3); cursor:grab;
  flex-shrink:0; padding:0 4px; line-height:1; opacity:.5;
  transition:opacity var(--t);
}
.dnd-handle:hover { opacity:1; color:var(--text-2); }

/* ── Buttons ── */
.btn {
  padding: 8px 16px;
  border-radius: var(--r-sm);
  border: none;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: .82rem;
  font-weight: 500;
  transition: all var(--t);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  line-height: 1;
  white-space: nowrap;
}
.btn:active { transform:scale(.97); }
.btn-gold {
  background: linear-gradient(135deg, var(--gold), #d97706);
  color: #1a0a00;
  font-weight: 700;
  box-shadow: 0 2px 10px rgba(245,158,11,.3);
}
.btn-gold:hover { background:linear-gradient(135deg,var(--gold-bright),var(--gold)); box-shadow:0 4px 16px rgba(245,158,11,.4); }
.btn-sec {
  background: var(--surface-3);
  color: var(--text-2);
  border: 1px solid var(--border-lit);
}
.btn-sec:hover { border-color:rgba(245,158,11,.4); color:var(--gold-text); background:var(--surface-4); }
.btn-teal { background:rgba(20,184,166,.12); color:var(--teal); border:1px solid rgba(20,184,166,.3); }
.btn-teal:hover { background:rgba(20,184,166,.22); }
.btn-orange { background:rgba(249,115,22,.12); color:var(--orange); border:1px solid rgba(249,115,22,.3); }
.btn-orange:hover { background:rgba(249,115,22,.22); }
.btn-purple { background:rgba(167,139,250,.12); color:var(--purple); border:1px solid rgba(167,139,250,.3); }
.btn-purple:hover { background:rgba(167,139,250,.22); }
.btn-ghost { background:transparent; color:var(--text-3); padding:5px 8px; font-size:.77rem; border-radius:var(--r-sm); }
.btn-ghost:hover { color:var(--text); background:rgba(255,255,255,.06); }
.btn-danger { background:transparent; color:var(--red); padding:5px 8px; font-size:.77rem; border-radius:var(--r-sm); }
.btn-danger:hover { background:var(--red-glow); }
.btn-icon { background:transparent; color:var(--text-3); padding:5px 7px; font-size:.82rem; border-radius:var(--r-sm); }
.btn-icon:hover { color:var(--text); }
.btn-full { width:100%; justify-content:center; padding:10px; }
.btn-sm { padding:5px 10px; font-size:.75rem; }

/* ── Modals ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
  backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none;
  transition: opacity .22s;
}
.overlay.open { opacity:1; pointer-events:all; }
.modal {
  background: var(--surface-2);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: var(--r-lg);
  padding: 26px 28px;
  width: 100%;
  max-width: 460px;
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(124,58,237,.08);
  max-height: 88vh;
  overflow-y: auto;
  animation: modalIn .2s ease;
}
@keyframes modalIn { from{transform:translateY(8px) scale(.98);opacity:0;} to{transform:none;opacity:1;} }
.modal.modal-gold { border-color:rgba(245,158,11,.25); }
.modal-title {
  font-family: 'Cinzel', serif;
  color: var(--gold-text);
  font-size: .98rem;
  letter-spacing: 1px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: .72rem;
  color: var(--text-3);
  margin-bottom: 5px;
  letter-spacing: .5px;
  text-transform: uppercase;
  font-weight: 600;
}
.form-row { display:flex; gap:10px; }
.form-row>.form-group { flex:1; }
.form-input, .form-select {
  width: 100%;
  background: var(--surface-1);
  border: 1px solid var(--border-lit);
  color: var(--text);
  padding: 9px 12px;
  border-radius: var(--r-sm);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: .86rem;
  transition: border var(--t), box-shadow var(--t);
  outline: none;
  -webkit-appearance: none;
}
.form-input:focus, .form-select:focus {
  border-color: rgba(245,158,11,.5);
  box-shadow: 0 0 0 3px rgba(245,158,11,.1);
}
.form-select option { background: var(--surface-2); }
.form-textarea { resize:vertical; min-height:76px; line-height:1.6; }
.modal-footer {
  display: flex; gap: 8px; justify-content: flex-end;
  margin-top: 18px; padding-top: 14px;
  border-top: 1px solid var(--border);
}

/* ── States ── */
.loading-row {
  display: flex; align-items: center; gap: 10px;
  justify-content: center; padding: 40px;
  color: var(--text-3); font-size: .84rem;
}
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid var(--border-lit);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface-3);
  border: 1px solid rgba(255,255,255,.1);
  border-left: 3px solid var(--gold);
  color: var(--text);
  padding: 10px 18px;
  border-radius: var(--r);
  font-size: .84rem;
  box-shadow: var(--shadow-lg);
  z-index: 300;
  animation: toastIn .28s cubic-bezier(.34,1.56,.64,1), toastOut .25s ease 2.25s forwards;
  backdrop-filter: blur(8px);
}
@keyframes toastIn { from{opacity:0;transform:translateY(12px) scale(.95);} to{opacity:1;transform:none;} }
@keyframes toastOut { to{opacity:0;transform:translateY(6px);} }

/* ── Image Picker ── */
.pick-bc { cursor:pointer; color:var(--gold); font-size:.78rem; }
.pick-bc:hover { text-decoration:underline; }
.pick-folder {
  padding: 9px 12px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  cursor: pointer; font-size:.82rem;
  margin-bottom: 6px;
  transition: all var(--t);
  display: flex; align-items: center; gap: 8px;
}
.pick-folder:hover { border-color:var(--gold); background:var(--surface-4); }
.pick-imgs { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
.pick-img-wrap {
  width:72px; height:72px;
  border: 2px solid var(--border-lit);
  border-radius: var(--r);
  overflow:hidden; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition: all var(--t);
  background: var(--surface-3);
}
.pick-img-wrap:hover { border-color:var(--gold); box-shadow:var(--shadow-gold); transform:scale(1.05); }
.pick-img-wrap img { width:60px; height:60px; object-fit:contain; }
.pick-empty { font-size:.82rem; color:var(--text-3); padding:24px; text-align:center; }
.entity-icon { width:22px; height:22px; object-fit:contain; border-radius:4px; flex-shrink:0; }
.entity-icon-sm { width:18px; height:18px; object-fit:contain; border-radius:3px; flex-shrink:0; }
.icon-btn {
  padding:3px 8px; font-size:.7rem;
  border:1px solid var(--border-lit); border-radius:var(--r-sm);
  background:var(--surface-3); color:var(--text-3);
  cursor:pointer; transition:all var(--t);
}
.icon-btn:hover { border-color:var(--gold); color:var(--gold-text); }

/* ── Diff colors ── */
.diff-nightmare { color:#a78bfa; font-weight:600; }
.diff-hard { color:#f59e0b; font-weight:600; }
.diff-normal { color:#64748b; font-weight:600; }
.muted-gold { color:var(--text-3)!important; text-decoration:line-through; }

/* ══ parties.html specific ══ */
body { overflow:hidden; }
.header { background:rgba(13,17,32,.92); border-bottom:1px solid var(--border); padding:10px 22px; display:flex; align-items:center; gap:12px; flex-shrink:0; position:relative; }
.header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(245,158,11,.3),transparent); }
.header-title { font-family:'Cinzel',serif; font-size:1.05rem; color:var(--gold-text); letter-spacing:2px; }
.main { flex:1; overflow-y:auto; padding:18px 22px; }

/* Filter bar (reuse overview styles) */
.filter-bar { margin-bottom:16px; background:var(--surface-2); border:1px solid rgba(255,255,255,.08); border-radius:var(--r-lg); overflow:hidden; }
.filter-bar-hd { display:flex; align-items:center; gap:10px; padding:11px 16px; cursor:pointer; user-select:none; border-bottom:1px solid var(--border); transition:background var(--t); }
.filter-bar-hd:hover { background:rgba(255,255,255,.02); }
.fb-label { font-size:.72rem; color:var(--text-3); letter-spacing:.5px; text-transform:uppercase; flex:1; font-weight:700; }
.fb-count { font-size:.72rem; color:var(--text-3); }
.fb-toggle { font-size:.68rem; color:var(--text-3); }
.filter-bar-body { padding:12px 16px; display:flex; flex-direction:column; gap:9px; }
.fb-acc-row { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.fb-acc-btn { padding:4px 14px; border-radius:16px; border:1px solid rgba(255,255,255,.1); background:var(--surface-1); color:var(--text-3); cursor:pointer; font-size:.78rem; font-weight:700; font-family:'Noto Sans KR',sans-serif; transition:all var(--t); flex-shrink:0; }
.fb-acc-btn:hover { border-color:rgba(245,158,11,.4); color:var(--gold-text); }
.fb-acc-btn.all-on { border-color:rgba(245,158,11,.5); color:var(--gold-text); background:rgba(245,158,11,.1); }
.fb-acc-btn.partial { border-color:rgba(245,158,11,.25); color:rgba(245,158,11,.65); background:rgba(245,158,11,.05); }
.fb-acc-sep { width:1px; height:22px; background:var(--border); flex-shrink:0; margin:0 3px; }
.fb-char-btn { padding:4px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.07); background:var(--surface-3); color:var(--text-3); cursor:pointer; font-size:.78rem; font-family:'Noto Sans KR',sans-serif; transition:all var(--t); }
.fb-char-btn:hover { border-color:rgba(255,255,255,.15); color:var(--text); }
.fb-char-btn.on { border-color:rgba(245,158,11,.45); color:var(--gold-text); background:rgba(245,158,11,.08); }

/* Character sections */
.char-section { margin-bottom:22px; }
.char-section-header {
  display:flex; align-items:center; gap:10px;
  padding: 10px 14px;
  background:var(--surface-2);
  border:1px solid rgba(255,255,255,.07);
  border-radius:var(--r); margin-bottom:12px;
}
.cs-name { font-size:.9rem; font-weight:700; flex:1; }
.cs-class { font-size:.71rem; color:var(--text-3); }
.cs-ilvl { font-size:.71rem; color:var(--text-3); padding:2px 9px; background:var(--surface-3); border:1px solid rgba(255,255,255,.08); border-radius:10px; }
.cs-count { font-size:.75rem; color:var(--text-3); }

/* Party cards */
.party-cards { display:flex; flex-wrap:wrap; gap:12px; }
.party-card {
  background:var(--surface-2);
  border:1px solid rgba(255,255,255,.07);
  border-radius:var(--r-lg); overflow:hidden;
  min-width:220px; max-width:300px; flex:1;
  transition:all var(--t);
}
.party-card:hover { border-color:rgba(255,255,255,.14); box-shadow:var(--shadow-md); transform:translateY(-2px); }
.party-card.no-party { border-color:rgba(249,115,22,.22); background:rgba(249,115,22,.045); }
.party-card.no-party:hover { border-color:rgba(249,115,22,.34); }
.party-card.temp-party { border-color:rgba(200,168,75,.34); background:linear-gradient(180deg, rgba(200,168,75,.08), rgba(255,255,255,.02)); }
.temp-party-badge { font-size:.62rem; color:var(--gold-text); border:1px solid rgba(200,168,75,.36); border-radius:999px; padding:2px 7px; background:rgba(200,168,75,.10); }
.party-day-link { color:var(--gold); font-size:.68rem; cursor:pointer; border-radius:999px; padding:2px 6px; transition:all var(--t); }
.party-day-link:hover { background:rgba(255,184,77,.12); box-shadow:0 0 0 1px rgba(255,184,77,.26); color:var(--gold-bright); }
.no-party-msg { padding:14px; color:var(--orange); font-size:.8rem; line-height:1.6; }
.pc-header {
  padding: 11px 14px;
  background: rgba(255,255,255,.03);
  border-bottom: 1px solid rgba(255,255,255,.06);
  display:flex; align-items:flex-start; gap:8px;
}
.pc-raid-name { font-size:.9rem; font-weight:700; }
.pc-raid-name .diff-nightmare,.pc-raid-name .diff-hard,.pc-raid-name .diff-normal { font-size:inherit!important; }
.pc-party-name { font-size:.72rem; color:var(--text-3); margin-top:2px; }
.pc-body { padding:8px 12px; }
.slot-list { display:flex; flex-direction:column; gap:4px; }
.slot-row {
  display:flex; align-items:center; gap:7px;
  padding: 5px 7px; border-radius:5px;
  font-size:.78rem;
}
.slot-row.mine {
  background: rgba(245,158,11,.07);
  border: 1px solid rgba(245,158,11,.2);
}
.slot-num { font-size:.62rem; color:var(--text-3); width:14px; flex-shrink:0; }
.slot-char-name { font-size:.79rem; }
.slot-char-name.me { color:var(--gold-text); font-weight:700; }
.slot-char-class { font-size:.66rem; color:var(--text-3); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.slot-empty-txt { color:var(--text-3); font-size:.74rem; }
.pc-footer {
  padding: 8px 12px;
  border-top: 1px solid rgba(255,255,255,.06);
  display:flex; justify-content:flex-end; gap:6px; flex-wrap:wrap; align-items:center;
}
.leave-btn {
  padding: 5px 12px;
  border: 1px solid rgba(239,68,68,.3);
  border-radius: var(--r-sm);
  background: rgba(239,68,68,.06);
  color: #fca5a5;
  cursor:pointer; font-size:.76rem;
  font-family:'Noto Sans KR',sans-serif;
  transition:all var(--t);
  min-width:52px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  white-space:nowrap;
}
.leave-btn:hover { background:rgba(239,68,68,.15); border-color:var(--red); }
@media (max-width:720px){
  .pc-footer{justify-content:stretch;}
  .pc-footer .btn,.leave-btn{flex:1 1 auto;}
}
.empty-state { text-align:center; padding:48px 20px; color:var(--text-3); }
.empty-icon { font-size:3rem; margin-bottom:12px; }


/* ===== 2026 UI refresh / compatibility aliases ===== */
:root{
  --bg:#060b16;
  --bg-grad:
    radial-gradient(circle at 12% 0%, rgba(76, 109, 255, .22) 0%, rgba(76,109,255,0) 28%),
    radial-gradient(circle at 88% 12%, rgba(255, 184, 77, .12) 0%, rgba(255,184,77,0) 28%),
    linear-gradient(180deg, #0a1020 0%, #070b16 100%);
  --surface-1:#0d1526;
  --surface-2:#111b31;
  --surface-3:#17233e;
  --surface-4:#1d2d4f;
  --surface-glass:rgba(17,27,49,.82);
  --accent:#7c5cff;
  --accent-2:#6148ff;
  --accent-glow:rgba(124,92,255,.28);
  --gold:#ffb84d;
  --gold-bright:#ffd27d;
  --gold-dim:#9a6321;
  --gold-glow:rgba(255,184,77,.22);
  --gold-text:#ffd88f;
  --text:#edf4ff;
  --text-2:#aab8d1;
  --text-3:#6d7a96;
  --dim:#334155;
  --border:rgba(255,255,255,.08);
  --border-lit:rgba(255,255,255,.13);
  --shadow-sm:0 4px 14px rgba(0,0,0,.18);
  --shadow-md:0 10px 30px rgba(0,0,0,.26);
  --shadow-lg:0 24px 60px rgba(0,0,0,.36);
  --s1:var(--surface-1);
  --s2:var(--surface-2);
  --s3:var(--surface-3);
  --s4:var(--surface-4);
  --muted:var(--text-2);
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 18% 16%, rgba(124,92,255,.16), transparent 24%),
    radial-gradient(circle at 78% 10%, rgba(255,184,77,.08), transparent 18%);
  z-index:0;
}
body > *{ position:relative; z-index:1; }
button,input,select,textarea{ font:inherit; }
.form-input,.form-select,textarea,input[type="time"]{
  background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  border-radius:12px;
}
.modal{

<body>
<nav class="page-nav">
  <a href="index.html" class="pnav-item">⚔️ 숙제</a>
  <a href="core.html" class="pnav-item">🔮 코어현황</a>
  <a href="raid.html" class="pnav-item">🏰 레이드</a>
  <a href="overview.html" class="pnav-item">📊 레이드 현황</a>
  <a href="parties.html" class="pnav-item active">👥 파티 현황</a>
</nav>
<div class="header">
  <span>👥</span>
  <div class="header-title">파티 현황</div>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="btn btn-sec btn-sm" onclick="loadAll()">🔄 새로고침</button>
  </div>
</div>
<div class="main">
  <div id="loading" class="loading-full"><div class="spinner"></div> 불러오는 중...</div>
  <div id="content" style="display:none;">
    <div class="filter-bar" id="filter-bar">
      <div class="filter-bar-hd" onclick="toggleFilter()">
        <span class="fb-label">🔍 캐릭터 필터</span>
        <span class="fb-count" id="fb-count"></span>
        <button class="btn btn-sec btn-sm" onclick="event.stopPropagation();selectAll()">전체</button>
        <button class="btn btn-sec btn-sm" onclick="event.stopPropagation();deselectAll()">해제</button>
        <span class="fb-toggle" id="fb-toggle">▼</span>
      </div>
      <div class="filter-bar-body" id="fb-body"></div>
    </div>
    <div id="char-sections"></div>
  </div>
</div>
<script>
const{createClient}=supabase;
function getConfig(){const u=localStorage.getItem('la_url'),k=localStorage.getItem('la_key');return u&&k?{url:u,key:k}:null;}
function safeJson(key,fallback){try{const raw=localStorage.getItem(key);return raw?JSON.parse(raw):fallback;}catch(e){console.warn('localStorage JSON parse failed:',key,e);return fallback;}}

let sb,accounts=[],characters=[],raids=[],parties=[],members=[],raidTasks=[],schedules=[],scheduleOverrides=[],raidGroupSettings={},raidGroupSettingsAvailable=true;
let selectedChars=new Set();
let filterOpen=localStorage.getItem('la_pt_filter_open')==='1';
let partyOrderMode=localStorage.getItem('la_pt_order_mode')||'partyless_last';
function appNowMs(){const t=Number(localStorage.getItem('la_test_now')||0);return Number.isFinite(t)&&t>0?t:Date.now();}
function appNow(){return new Date(appNowMs());}
function getWeekStart(){const now=appNow(),kst=new Date(now.getTime()+9*3600000);let b=(kst.getUTCDay()-3+7)%7;if(b===0&&kst.getUTCHours()<6)b=7;const ws=new Date(kst);ws.setUTCDate(ws.getUTCDate()-b);ws.setUTCHours(6,0,0,0);return ws;}
function getWeekKey(){const ws=getWeekStart();return`${ws.getUTCFullYear()}-${String(ws.getUTCMonth()+1).padStart(2,'0')}-${String(ws.getUTCDate()).padStart(2,'0')}`;}
function charsInPartyScope(){
  const ids=new Set([...members.map(m=>m.character_id),...raidTasks.map(t=>t.character_id)].filter(Boolean));
  return filterVisibleChars(characters).filter(c=>ids.has(c.id));
}
function isFilterHiddenAccount(accountId){return accounts.some(a=>a.id===accountId&&a.hide_from_filters===true);}
function filterVisibleAccounts(list=accounts){return (list||[]).filter(a=>a.hide_from_filters!==true);}
function filterVisibleChars(list=characters){return (list||[]).filter(c=>!isFilterHiddenAccount(c.account_id));}

async function init(){
  const cfg=getConfig();if(!cfg){window.location.href='index.html';return;}
  sb=createClient(cfg.url,cfg.key);
  await loadAll();
}
async function loadAll(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('content').style.display='none';
  const results=await Promise.all([
    sb.from('accounts').select('*').order('sort_order').order('created_at'),
    sb.from('characters').select('*').order('sort_order').order('created_at'),
    sb.from('raid_presets').select('*').order('sort_order').order('created_at'),
    sb.from('raid_parties').select('*').order('sort_order').order('created_at'),
    sb.from('raid_party_members').select('*'),
    sb.from('raid_schedules').select('id,party_id,day_of_week'),
    sb.from('raid_tasks').select('*').order('sort_order').order('created_at')
  ]);
  const firstError=results.find(r=>r.error)?.error;
  if(firstError){toast('❗ 로딩 오류: '+firstError.message);console.error(firstError);return;}
  const[r1,r2,r3,r4,r5,r6,r7]=results;
  accounts=r1.data||[];characters=r2.data||[];raids=r3.data||[];parties=r4.data||[];members=r5.data||[];schedules=r6.data||[];raidTasks=r7.data||[];
  const[,{data:ovrData}]=await Promise.all([
    loadRaidGroupSettings(),
    sb.from('raid_schedule_overrides').select('*').eq('week_start_date',getWeekKey())
  ]);
  scheduleOverrides=ovrData||[];
  const DAYS_KO=['일','월','화','수','목','금','토'];
  const schMap={};schedules.forEach(s=>{if(!schMap[s.party_id])schMap[s.party_id]=[];schMap[s.party_id].push(s.day_of_week);});
  parties.forEach(p=>{
    p.members=members.filter(m=>m.party_id===p.id).sort((a,b)=>a.slot_index-b.slot_index);
    const days=schMap[p.id]||[];
    p._sched_days=days.map(d=>DAYS_KO[d]+'요일').join(', ');
  });
  // Init filter: all chars that are in any party or have raid homework
  const charsInParties=charsInPartyScope();
  const partyCharIds=new Set(charsInParties.map(c=>c.id));
  const savedIds=safeJson('la_pt_sel_chars',null);
  selectedChars=new Set(Array.isArray(savedIds)?savedIds.filter(id=>partyCharIds.has(id)):[...partyCharIds]);
  if(!selectedChars.size)selectedChars=new Set(partyCharIds);
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  renderFilter();render();
}

// ─── Filter ───
function saveFilter(){localStorage.setItem('la_pt_sel_chars',JSON.stringify([...selectedChars]));}
function toggleFilter(){filterOpen=!filterOpen;localStorage.setItem('la_pt_filter_open',filterOpen?'1':'0');applyFilterOpen();}
function applyFilterOpen(){document.getElementById('fb-body').style.display=filterOpen?'flex':'none';document.getElementById('fb-toggle').textContent=filterOpen?'▼':'▶';}
async function loadRaidGroupSettings(){
  raidGroupSettings={};raidGroupSettingsAvailable=true;
  const{data,error}=await sb.from('raid_group_settings').select('*');
  if(error){raidGroupSettingsAvailable=false;console.warn('raid_group_settings unavailable:',error.message);return;}
  (data||[]).forEach(r=>{raidGroupSettings[r.name]=r;});
}
function renderFilter(){
  const charsInParties=charsInPartyScope();
  let html='';
  const visibleAccs=filterVisibleAccounts(accounts);
  const mainAccs=visibleAccs.filter(a=>!a.parent_account_id);
  const renderRow=(label,chars,sub=false)=>{
    if(!chars.length)return'';
    const allOn=chars.every(c=>selectedChars.has(c.id)),anyOn=chars.some(c=>selectedChars.has(c.id));
    const ids=chars.map(c=>c.id);
    let row=`<div class="fb-acc-row" ${sub?'style="margin-left:14px;"':''}>`;
    row+=`<button class="fb-acc-btn ${allOn?'all-on':anyOn?'partial':''}" onclick="toggleGroup([${ids.map(id=>`'${id}'`).join(',')}])" ${sub?'style="font-size:.72rem;"':''}>${esc(label)}</button>`;
    row+=`<div class="fb-acc-sep"></div>`;
    chars.forEach(c=>{row+=`<button class="fb-char-btn ${selectedChars.has(c.id)?'on':''}" onclick="toggleCharFilter('${c.id}')">${esc(c.name)}${c.item_level?` <span style="font-size:.67rem;opacity:.6">Lv.${c.item_level}</span>`:''}</button>`;});
    row+=`</div>`;return row;
  };
  mainAccs.forEach(acc=>{
    const mainChars=charsInParties.filter(c=>c.account_id===acc.id);
    const subAccs=visibleAccs.filter(a=>a.parent_account_id===acc.id);
    const subChars=subAccs.flatMap(sa=>charsInParties.filter(c=>c.account_id===sa.id));
    html+=renderRow(acc.name,mainChars);
    html+=renderRow(acc.name+'-부계정',subChars,true);
  });
  visibleAccs.filter(a=>a.parent_account_id&&!visibleAccs.some(m=>m.id===a.parent_account_id)).forEach(acc=>{
    html+=renderRow(acc.name,charsInParties.filter(c=>c.account_id===acc.id));
  });
  document.getElementById('fb-body').innerHTML=html;
  const cnt=document.getElementById('fb-count');if(cnt)cnt.textContent=`${selectedChars.size}/${charsInParties.length}명`;
  applyFilterOpen();
}
function toggleGroup(ids){const allOn=ids.every(id=>selectedChars.has(id));ids.forEach(id=>{if(allOn)selectedChars.delete(id);else selectedChars.add(id);});saveFilter();renderFilter();render();}
function toggleCharFilter(id){if(selectedChars.has(id))selectedChars.delete(id);else selectedChars.add(id);saveFilter();renderFilter();render();}
function selectAll(){const ci=charsInPartyScope();selectedChars=new Set(ci.map(c=>c.id));saveFilter();renderFilter();render();}
function deselectAll(){selectedChars.clear();saveFilter();renderFilter();render();}
function togglePartyOrderMode(){partyOrderMode=partyOrderMode==='raid_order'?'partyless_last':'raid_order';localStorage.setItem('la_pt_order_mode',partyOrderMode);render();}
function raidSortKeyByPresetId(presetId){
  const preset=raids.find(r=>r.id===presetId);
  if(!preset)return 999999;
  const groupOrder=safeJson('la_raid_group_order',[]);
  const gi=groupOrder.includes(preset.name)?groupOrder.indexOf(preset.name):999;
  return gi*1000+(Number(preset.sort_order)||0);
}
function getTempPartiesForChar(charId){
  const out=[];
  scheduleOverrides.forEach(ovr=>{
    const sch=schedules.find(s=>s.id===ovr.schedule_id);
    const p=sch?parties.find(x=>x.id===sch.party_id):null;
    if(!p)return;
    const slots=ovr.slot_overrides||{};
    Object.keys(slots).forEach(k=>{if(slots[k]===charId&&!p.members.some(m=>m.character_id===charId))out.push({party:p,slotIndex:Number(k),override:ovr});});
  });
  return out;
}
function getTempRemovedPartiesForChar(charId){
  const out=[];
  scheduleOverrides.forEach(ovr=>{
    const removed=(ovr.temp_changes&&ovr.temp_changes.removed)||{};
    if(!removed[charId])return;
    const sch=schedules.find(s=>s.id===ovr.schedule_id);
    const p=sch?parties.find(x=>x.id===sch.party_id):null;
    if(p&&!out.some(x=>x.party.id===p.id))out.push({party:p,override:ovr});
  });
  return out;
}

// ─── Render ───
function render(){
  const el=document.getElementById('char-sections');
  const visChars=characters.filter(c=>selectedChars.has(c.id));
  if(!visChars.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">👥</div><div>캐릭터를 선택하세요</div></div>';return;}
  // Group by account
  let html='';
  accounts.forEach(acc=>{
    const chars=visChars.filter(c=>c.account_id===acc.id);
    if(!chars.length)return;
    chars.forEach(c=>{
      const removedParties=getTempRemovedPartiesForChar(c.id);
      const removedPartyIds=new Set(removedParties.map(x=>x.party.id));
      const removedPresetIds=new Set(removedParties.map(x=>x.party.preset_id));
      const removedTaskIds=new Set(removedParties.map(x=>{
        const removed=(x.override.temp_changes&&x.override.temp_changes.removed)||{};
        return removed[c.id]?.taskId||removed[c.id]?.task_id||null;
      }).filter(Boolean));
      const charMembers=members.filter(m=>m.character_id===c.id&&!removedPartyIds.has(m.party_id));
      const charRaidTasks=raidTasks.filter(t=>t.character_id===c.id);
      const charParties=charMembers.map(m=>{const p=parties.find(x=>x.id===m.party_id);return p?{party:p,member:m}:null;}).filter(Boolean);
      const tempParties=getTempPartiesForChar(c.id);
      const tempPresetIds=new Set(tempParties.map(x=>x.party.preset_id));
      if(!charMembers.length&&!charRaidTasks.length&&!tempParties.length&&!removedParties.length)return;
      const partylessTasks=charRaidTasks.filter(t=>!removedTaskIds.has(t.id)&&!removedPresetIds.has(t.preset_id)&&(!t.preset_id||(!charParties.some(({party:p})=>p.preset_id===t.preset_id)&&!tempPresetIds.has(t.preset_id))));
      const cards=[
        ...charParties.map(x=>({type:'party',key:raidSortKeyByPresetId(x.party.preset_id),html:partyCardHTML(x.party,c,x.member,false)})),
        ...tempParties.map(x=>({type:'temp',key:raidSortKeyByPresetId(x.party.preset_id),html:partyCardHTML(x.party,c,{slot_index:x.slotIndex,character_id:c.id,id:''},true)})),
        ...removedParties.map(x=>({type:'removed',key:raidSortKeyByPresetId(x.party.preset_id),html:partyCardHTML(x.party,c,{slot_index:-1,character_id:c.id,id:''},false,true)})),
        ...partylessTasks.map(t=>({type:'none',key:raidSortKeyByPresetId(t.preset_id),html:noPartyCardHTML(t,c)}))
      ];
      if(partyOrderMode==='raid_order')cards.sort((a,b)=>a.key-b.key||(a.type==='none')-(b.type==='none'));
      html+=`<div class="char-section">
        <div class="char-section-header">
          <div class="cs-name">${esc(c.name)}</div>
          ${c.class_name?`<div class="cs-class">${esc(c.class_name)}</div>`:''}
          ${c.item_level?`<div class="cs-ilvl">Lv.${c.item_level}</div>`:''}
          ${c.combat_power?`<div class="cs-ilvl">전투력 ${Number(c.combat_power).toLocaleString()}</div>`:''}
          <button class="btn btn-sec btn-sm" onclick="togglePartyOrderMode()" title="파티 없음 위치/레이드 순서 정렬">${partyOrderMode==='raid_order'?'레이드 순서':'파티 없음 뒤'}</button>
          <div class="cs-count">${charParties.length+tempParties.length}개 파티${tempParties.length?` · 임시 ${tempParties.length}`:''}${removedParties.length?` · 임시해제 ${removedParties.length}`:''}${partylessTasks.length?` · 파티 없음 ${partylessTasks.length}`:''}</div>
        </div>
        <div class="party-cards">${cards.map(x=>x.html).join('')}</div>
      </div>`;
    });
  });
  el.innerHTML=html||'<div class="empty-state"><div class="empty-icon">👥</div><div>참여 중인 파티가 없습니다</div></div>';
}

function noPartyCardHTML(t,myChar){
  const raidName=t.preset_id?(raids.find(r=>r.id===t.preset_id)?.name||t.name):t.name;
  const preset=raids.find(r=>r.id===t.preset_id);
  return`<div class="party-card no-party">
    <div class="pc-header">
      <div style="flex:1;min-width:0;">
        <div class="pc-raid-name" style="color:${getGroupColor(raidName||'')};display:flex;align-items:center;gap:5px;">${iconImg(getGroupIcon(raidName||''),'entity-icon-sm')}${esc(raidName||'?')}${(t.difficulty||preset?.difficulty)?` <span class="${diffClass(t.difficulty||preset?.difficulty)}" style="font-size:.72rem;">${esc(t.difficulty||preset?.difficulty)}</span>`:''}</div>
        <div class="pc-party-name">레이드 숙제 있음 · 파티 없음</div>
      </div>
    </div>
    <div class="no-party-msg">이 캐릭터는 레이드 숙제가 있지만 파티연동 파티에 배치되어 있지 않습니다.</div>
    <div class="pc-footer"><button class="btn btn-sec btn-sm" onclick="window.location.href='raid.html'" title="raid.html에서 파티 구성 확인">🗡️ 파티 구성</button></div>
  </div>`;
}

function partyCardHTML(p,myChar,myMember,isTemp=false,isRemoved=false){
  const preset=raids.find(x=>x.id===p.preset_id);
  const slots=[];for(let i=0;i<p.party_size;i++){const m=p.members.find(x=>x.slot_index===i);slots.push(m||{slot_index:i,character_id:null});}
  return`<div class="party-card ${(isTemp||isRemoved)?'temp-party':''}">
    <div class="pc-header">
      <div style="flex:1;min-width:0;">
        <div class="pc-raid-name" style="color:${getGroupColor(preset?.name||'')};display:flex;align-items:center;gap:5px;">${iconImg(getGroupIcon(preset?.name||''),'entity-icon-sm')}${esc(preset?.name||'?')}${preset?.difficulty?` <span class="${diffClass(preset.difficulty)}" style="font-size:.72rem;">${esc(preset.difficulty)}</span>`:''}</div>
        <div class="pc-party-name"><span style="color:${getPartyColor(p)};font-weight:600;">${esc(p.name||'파티')}</span> · ${p.party_size}인${isTemp?' · <span class="temp-party-badge">임시파티연동</span>':''}${isRemoved?' · <span class="temp-party-badge">임시파티해제</span>':''}${preset?.entry_level?` · 입장 ${preset.entry_level}`:''}${p._sched_days?` · <span class="party-day-link" onclick="event.stopPropagation();goToPartySchedule('${p.id}')">📅 ${p._sched_days}</span>`:''}</div>
      </div>
    </div>
    <div class="pc-body">
      <div class="slot-list">
        ${slots.map((slot,i)=>{
          const ch=characters.find(c=>c.id===slot.character_id);
          const isMe=slot.character_id===myChar.id;
          if(ch)return`<div class="slot-row ${isMe?'mine':''}">
            <span class="slot-num">${i+1}</span>
            ${ch.icon_url?`<img class="entity-icon-sm" src="${ch.icon_url}" onerror="this.style.display='none'">`:''}
            <span class="slot-char-name ${isMe?'me':''}">${esc(ch.name)}</span>
            <span class="slot-char-class">${esc(ch.class_name||'')}${ch.item_level?' Lv.'+ch.item_level:''}${ch.combat_power?' · 전투력 '+Number(ch.combat_power).toLocaleString():''}</span>
          </div>`;
          return`<div class="slot-row"><span class="slot-num">${i+1}</span><span class="slot-empty-txt">빈 슬롯</span></div>`;
        }).join('')}
      </div>
    </div>
    <div class="pc-footer">
      <button class="btn btn-sec btn-sm" onclick="goToParty('${p.id}')" title="raid.html에서 이 파티 열기">🗡️ 파티로 이동</button>
      <button class="btn btn-sec btn-sm" onclick="goToPartySchedule('${p.id}')" title="raid.html 주간 일정에서 보기">📅 일정</button>
      ${(isTemp||isRemoved)?'':`<button class="leave-btn" onclick="leaveParty('${p.id}','${myChar.id}','${myMember.id}','${preset?.id||''}','${esc(preset?.name||'')}')">탈퇴</button>`}
    </div>
  </div>`;
}

// ─── Leave party ───
function goToParty(partyId){
  localStorage.setItem('la_open_party_id',partyId);
  window.location.href='raid.html';
}
function goToPartySchedule(partyId){
  localStorage.setItem('la_open_party_id',partyId);
  localStorage.setItem('la_open_party_tab','schedule');
  window.location.href='raid.html';
}
async function leaveParty(partyId,charId,memberId,presetId,presetName){
  if(!confirm(`"${presetName}" 파티에서 탈퇴합니다.\n레이드 숙제는 삭제하지 않습니다. 계속?`))return;
  // 1. Remove from party slot
  await sb.from('raid_party_members').delete().eq('id',memberId);
  members=members.filter(m=>m.id!==memberId);
  const p=parties.find(x=>x.id===partyId);
  if(p)p.members=p.members.filter(m=>m.id!==memberId);
  toast('✅ 파티 탈퇴 완료');
  renderFilter();render();
}

function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2600);}

// ─── Image Picker (shared) ───
const ICON_REPO=localStorage.getItem('la_icon_repo')||'ghk71/LoAHomeworkCheck';
const ICON_RAW=`https://raw.githubusercontent.com/${ICON_REPO}/main/`;
const ICON_API=`https://api.github.com/repos/${ICON_REPO}/contents/`;
let _pickerCb=null;
function iconImg(url,cls='entity-icon'){return url?`<img class="${cls}" src="${url}" onerror="this.style.display='none'">`:'';} 

async function openImagePicker(cb,path='images/'){
  _pickerCb=cb;
  document.getElementById('picker-content').innerHTML='<div class="pick-empty"><div class="spinner"></div></div>';
  openModal('modal-img-picker');
  await loadPickerDir(path);
}
async function loadPickerDir(path){
  const cKey='la_ic_'+path;
  let items;
  try{const c=sessionStorage.getItem(cKey);if(c)items=JSON.parse(c);}catch{}
  if(!items){
    const r=await fetch(ICON_API+path);
    if(!r.ok){document.getElementById('picker-content').innerHTML='<div class="pick-empty">폴더를 불러올 수 없습니다<br><small>images/ 폴더가 repo에 있는지 확인하세요</small></div>';return;}
    items=await r.json();
    try{sessionStorage.setItem(cKey,JSON.stringify(items));}catch{}
  }
  const dirs=items.filter(x=>x.type==='dir');
  const imgs=items.filter(x=>x.type==='file'&&/\.(png|jpg|jpeg|gif|webp|svg)$/i.test(x.name));
  // Breadcrumb
  const parts=path.replace(/^\/images\//,'').replace(/^images\//,'').split('/').filter(Boolean);
  let bc=`<span class="pick-bc" onclick="loadPickerDir('images/')">images</span>`;
  let cum='images/';parts.forEach(p=>{cum+=p+'/';bc+=` / <span class="pick-bc" onclick="loadPickerDir('${cum}')">${p}</span>`;});
  document.getElementById('picker-breadcrumb').innerHTML=bc;
  // Content
  let html='';
  if(dirs.length){html+=dirs.map(d=>`<div class="pick-folder" onclick="loadPickerDir('${path}${d.name}/')">📁 ${d.name}</div>`).join('');}
  if(imgs.length){html+=`<div class="pick-imgs">${imgs.map(f=>{const url=ICON_RAW+f.path;return`<div class="pick-img-wrap" title="${f.name}" onclick="selectPickerImg('${url}')"><img src="${url}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`;}).join('')}</div>`;}
  if(!dirs.length&&!imgs.length)html='<div class="pick-empty">이미지가 없습니다</div>';
  document.getElementById('picker-content').innerHTML=html;
}
function selectPickerImg(url){if(_pickerCb)_pickerCb(url);closeModal('modal-img-picker');}
function pickerRemoveIcon(){if(_pickerCb)_pickerCb(null);closeModal('modal-img-picker');}

function getGroupColor(name){return raidGroupSettings[name]?.color||(!raidGroupSettingsAvailable?localStorage.getItem('la_gc_'+name):null)||'#4caf50';}
function getGroupIcon(name){return raidGroupSettings[name]?.icon_url||(!raidGroupSettingsAvailable?localStorage.getItem('la_gicon_'+name):null)||'';}
function getPartyColor(p){return(p&&p.color)||'#e0ddd5';}
function diffClass(d){if(!d)return'';const dl=d.toLowerCase();if(dl.includes('나이트메어')||dl.includes('3단계'))return'diff-nightmare';if(dl.includes('하드')||dl.includes('2단계'))return'diff-hard';if(dl.includes('노말')||dl.includes('1단계'))return'diff-normal';return'';}

function openModal(id){document.getElementById(id)?.classList.add('open');}
function closeModal(id){document.getElementById(id)?.classList.remove('open');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
init();
</script>

<!-- Image Picker Modal -->
<div class="overlay" id="modal-img-picker"><div class="modal" style="max-width:520px;height:70vh;display:flex;flex-direction:column;">
  <div class="modal-title">🖼️ 아이콘 선택</div>
  <div id="picker-breadcrumb" style="font-size:.78rem;padding:2px 0 8px;color:var(--muted);flex-shrink:0;border-bottom:1px solid var(--border);margin-bottom:8px;"></div>
  <div id="picker-content" style="flex:1;overflow-y:auto;"></div>
  <div class="modal-footer" style="margin-top:8px;">
    <button class="btn btn-danger btn-sm" style="margin-right:auto;" onclick="pickerRemoveIcon()">🗑 아이콘 제거</button>
    <button class="btn btn-sec" onclick="closeModal('modal-img-picker')">취소</button>
  </div>
</div></div>
