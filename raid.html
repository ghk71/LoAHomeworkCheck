<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏰 레이드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#07090f;--s1:#0d1120;--s2:#131928;--s3:#1a2235;--border:#243050;--border-lit:#3a4d7a;--gold:#c8a84b;--gold-bright:#e8c86a;--gold-dim:#8a6e2a;--gold-glow:rgba(200,168,75,.25);--text:#ddd5c0;--muted:#6a7485;--dim:#3a4050;--green:#3cba78;--red:#c84040;--blue:#4a8fd4;--purple:#a060d8;--teal:#2ab8a0;--orange:#e07840;--r:4px;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column;}

.page-nav{background:#060910;border-bottom:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;}
.pnav-item{padding:8px 20px;font-size:.82rem;color:var(--muted);text-decoration:none;transition:all .15s;display:flex;align-items:center;gap:6px;border-right:1px solid var(--border);}
.pnav-item:hover{color:var(--text);background:rgba(255,255,255,.03);}
.pnav-item.active{color:var(--gold);background:rgba(200,168,75,.06);border-bottom:2px solid var(--gold);}

.header{background:var(--s1);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);}
.header-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);letter-spacing:2px;}

#viewer-banner{display:none;background:rgba(200,168,75,.1);border-bottom:1px solid rgba(200,168,75,.3);padding:6px 20px;font-size:.78rem;color:var(--gold);text-align:center;flex-shrink:0;}
#viewer-banner.show{display:block;}

.tab-bar{background:var(--s2);border-bottom:1px solid var(--border);display:flex;flex-shrink:0;}
.raid-tab{padding:10px 22px;font-size:.84rem;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);transition:all .15s;display:flex;align-items:center;gap:6px;}
.raid-tab:hover{color:var(--text);background:rgba(255,255,255,.02);}
.raid-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

.app-body{flex:1;overflow:hidden;display:flex;}

#view-party{display:flex;flex:1;overflow:hidden;}
.panel{padding:20px;overflow-y:auto;}
.panel-left{border-right:1px solid var(--border);width:340px;flex-shrink:0;}
.panel-right{flex:1;}

#view-schedule{display:none;flex-direction:column;flex:1;overflow:hidden;}
.sch-top{flex:1;min-height:0;overflow-y:auto;padding:18px 20px 10px;}
.sch-detail-panel{flex-shrink:0;background:var(--s1);border-top:2px solid var(--gold-dim);overflow-y:auto;transition:all .25s;max-height:45%;}
.sch-detail-panel.hidden{max-height:0;border-top-width:0;overflow:hidden;}

.section-hd{font-family:'Cinzel',serif;font-size:.9rem;color:var(--gold);letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-hd::after{content:'';flex:1;height:1px;background:var(--gold-dim);}

.party-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;transition:border-color .15s;cursor:pointer;}
.party-card:hover{border-color:var(--border-lit);}
.party-card.selected{border-color:var(--gold);}
.party-card-hd{padding:11px 14px;display:flex;align-items:center;gap:8px;background:var(--s1);}
.party-card-name{font-size:.9rem;font-weight:600;flex:1;}
.party-card-meta{font-size:.73rem;color:var(--muted);}
.party-card-actions{display:flex;gap:4px;opacity:0;transition:opacity .2s;}
.party-card:hover .party-card-actions{opacity:1;}

.slots-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 14px 12px;}
.slots-grid.s8{grid-template-columns:repeat(4,1fr);}
.slot{min-height:40px;border:1px dashed var(--border);border-radius:var(--r);display:flex;align-items:center;padding:6px 9px;gap:7px;transition:all .15s;background:var(--s1);}
.slot.clickable{cursor:pointer;}
.slot.clickable:hover{border-color:var(--gold);background:var(--s3);}
.slot.filled{border-style:solid;border-color:rgba(42,184,160,.4);background:rgba(42,184,160,.06);}
.slot.filled.clickable:hover{border-color:var(--teal);background:rgba(42,184,160,.12);}
.slot.overridden{border-style:solid;border-color:rgba(200,168,75,.5);background:rgba(200,168,75,.05);}
.slot-num{font-size:.66rem;color:var(--dim);width:14px;flex-shrink:0;}
.slot-char{font-size:.8rem;font-weight:500;flex:1;}
.slot-meta{font-size:.68rem;color:var(--muted);}
.slot-empty{font-size:.78rem;color:var(--dim);flex:1;}
.slot-remove{font-size:.68rem;color:var(--red);opacity:0;transition:opacity .15s;background:none;border:none;cursor:pointer;padding:2px 4px;flex-shrink:0;}
.slot:hover .slot-remove{opacity:1;}

.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.week-label{font-size:.85rem;font-weight:600;flex:1;text-align:center;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;}
.day-col{background:var(--s2);border:1px solid var(--border);border-radius:6px;}
.day-col.today-col{border-color:rgba(200,168,75,.35);}
.day-header{padding:7px 9px;border-bottom:1px solid var(--border);background:var(--s1);border-radius:6px 6px 0 0;}
.day-name{font-size:.78rem;font-weight:600;}
.day-name.today{color:var(--gold);}
.day-date{font-size:.67rem;color:var(--muted);}
.day-entries{padding:5px;display:flex;flex-direction:column;gap:4px;min-height:80px;}
.sch-entry{padding:6px 8px;border-radius:var(--r);border:1px solid var(--border);background:var(--s3);font-size:.74rem;cursor:pointer;transition:all .15s;position:relative;}
.sch-entry:hover{border-color:var(--border-lit);}
.sch-entry.sel{border-color:var(--gold);background:rgba(200,168,75,.08);box-shadow:0 0 0 1px rgba(200,168,75,.2);}
.sch-entry.fixed{border-color:rgba(200,168,75,.3);background:rgba(200,168,75,.04);}
.sch-entry-name{font-weight:600;margin-bottom:2px;}
.sch-entry-meta{color:var(--muted);font-size:.68rem;}
.sch-entry-edit-btn{position:absolute;top:3px;right:3px;font-size:.62rem;background:none;border:none;cursor:pointer;color:var(--dim);opacity:0;padding:2px 3px;transition:opacity .15s;border-radius:2px;}
.sch-entry:hover .sch-entry-edit-btn{opacity:1;}
.sch-entry-edit-btn:hover{background:rgba(255,255,255,.08);color:var(--muted);}
.add-day-btn{width:100%;padding:4px;border:1px dashed var(--border);border-radius:var(--r);background:none;color:var(--dim);cursor:pointer;font-size:.72rem;font-family:'Noto Sans KR',sans-serif;transition:all .15s;margin-top:2px;}
.add-day-btn:hover{border-color:var(--gold);color:var(--gold);}

.sdp-inner{padding:14px 20px 16px;}
.sdp-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.sdp-title{font-family:'Cinzel',serif;font-size:.95rem;color:var(--gold);}
.sdp-badge{font-size:.72rem;padding:2px 8px;border:1px solid rgba(200,168,75,.3);border-radius:8px;color:var(--gold);}

.char-pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:260px;overflow-y:auto;}
.char-pick-item{padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .15s;}
.char-pick-item:hover{border-color:var(--teal);background:rgba(42,184,160,.06);}
.char-pick-name{font-size:.84rem;font-weight:500;}
.char-pick-meta{font-size:.7rem;color:var(--muted);}
.char-pick-item.no-char{grid-column:1/-1;border-style:dashed;color:var(--red);text-align:center;padding:8px;}
.char-pick-item.no-char:hover{border-color:var(--red);background:rgba(200,64,64,.06);}

.share-link-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:.74rem;word-break:break-all;color:var(--blue);cursor:pointer;line-height:1.5;}
.share-link-box:hover{border-color:var(--blue);}

.btn{padding:7px 14px;border-radius:var(--r);border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.82rem;transition:all .15s;display:inline-flex;align-items:center;gap:5px;line-height:1;}
.btn-gold{background:var(--gold);color:#1a0f00;font-weight:700;}
.btn-gold:hover{background:var(--gold-bright);}
.btn-teal{background:rgba(42,184,160,.18);color:var(--teal);border:1px solid rgba(42,184,160,.4);}
.btn-teal:hover{background:rgba(42,184,160,.3);}
.btn-sec{background:var(--s3);color:var(--text);border:1px solid var(--border-lit);}
.btn-sec:hover{border-color:var(--gold);color:var(--gold-bright);}
.btn-ghost{background:transparent;color:var(--muted);padding:4px 7px;font-size:.74rem;border-radius:3px;}
.btn-ghost:hover{color:var(--text);background:rgba(255,255,255,.05);}
.btn-danger{background:transparent;color:var(--red);padding:4px 7px;font-size:.74rem;border-radius:3px;}
.btn-danger:hover{background:rgba(200,64,64,.12);}
.btn-full{width:100%;justify-content:center;padding:9px;}
.btn-sm{padding:4px 9px;font-size:.76rem;}
.btn-icon{background:transparent;color:var(--muted);padding:4px 6px;font-size:.8rem;border-radius:3px;}
.btn-icon:hover{color:var(--text);}
.btn-outline{background:transparent;border:1px dashed var(--border);color:var(--muted);padding:6px 12px;border-radius:var(--r);font-size:.79rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;width:100%;text-align:center;display:block;}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}

.form-group{margin-bottom:12px;}
.form-label{display:block;font-size:.74rem;color:var(--muted);margin-bottom:4px;letter-spacing:.5px;}
.form-row{display:flex;gap:10px;}
.form-row>.form-group{flex:1;}
.form-input,.form-select{width:100%;background:var(--s1);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:var(--r);font-family:'Noto Sans KR',sans-serif;font-size:.87rem;transition:border .15s;outline:none;-webkit-appearance:none;}
.form-input:focus,.form-select:focus{border-color:var(--gold);}
.form-select option{background:var(--s2);}
.radio-group{display:flex;gap:8px;}
.radio-opt{flex:1;padding:7px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;text-align:center;font-size:.82rem;color:var(--muted);transition:all .15s;user-select:none;}
.radio-opt:hover{border-color:var(--border-lit);color:var(--text);}
.radio-opt.active{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,.08);}
.toggle-row{display:flex;align-items:center;gap:10px;padding:8px 11px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;user-select:none;}
.toggle-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--gold);}
.toggle-label{font-size:.84rem;flex:1;}
.toggle-sub{font-size:.72rem;color:var(--muted);}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--s2);border:1px solid var(--gold-dim);border-radius:8px;padding:24px 26px;width:100%;max-width:460px;box-shadow:0 0 60px var(--gold-glow),0 20px 60px rgba(0,0,0,.5);max-height:88vh;overflow-y:auto;}
.modal-wide{max-width:520px;}
.modal-title{font-family:'Cinzel',serif;color:var(--gold);font-size:1.02rem;letter-spacing:1px;margin-bottom:18px;}
.modal-footer{display:flex;gap:7px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);}

.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:10px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--s1);}
::-webkit-scrollbar-thumb{background:var(--border-lit);border-radius:3px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--s3);border:1px solid var(--gold-dim);color:var(--text);padding:9px 16px;border-radius:var(--r);font-size:.84rem;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:300;animation:toastIn .25s ease,toastOut .25s ease 2.25s forwards;}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes toastOut{to{opacity:0;transform:translateY(8px);}}
</style>
</head>
<body>

<nav class="page-nav">
  <a href="index.html" class="pnav-item">⚔️ 숙제</a>
  <a href="core.html" class="pnav-item">🔮 코어정수</a>
  <a href="raid.html" class="pnav-item active">🏰 레이드</a>
</nav>

<div id="viewer-banner">👁 뷰어 모드 — 읽기 전용으로 접속 중입니다</div>

<div class="header">
  <span style="font-size:1.1rem">🏰</span>
  <div class="header-title">레이드</div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
    <span id="header-week" style="font-size:.74rem;color:var(--muted);padding:4px 8px;background:var(--s3);border:1px solid var(--border);border-radius:4px;"></span>
    <button class="btn btn-sec btn-sm edit-only" onclick="openShareModal()">🔗 공유</button>
  </div>
</div>

<div class="tab-bar">
  <div class="raid-tab active" id="tab-party" onclick="switchTab('party')">🗡️ 파티 구성</div>
  <div class="raid-tab" id="tab-schedule" onclick="switchTab('schedule')">📅 주간 일정</div>
</div>

<div class="app-body">
  <!-- Party Tab -->
  <div id="view-party">
    <div class="panel panel-left">
      <div class="section-hd">파티 목록</div>
      <div id="party-list"></div>
      <button class="btn-outline edit-only" style="margin-top:4px;" onclick="openAddParty()">＋ 파티 추가</button>
    </div>
    <div class="panel panel-right" id="party-detail">
      <div class="empty-state"><div class="empty-icon">🗡️</div><div>왼쪽에서 파티를 선택하거나 새로 만드세요</div></div>
    </div>
  </div>

  <!-- Schedule Tab -->
  <div id="view-schedule">
    <div class="sch-top">
      <div class="week-nav">
        <button class="btn btn-sec btn-sm" onclick="moveWeek(-1)">◀ 이전</button>
        <span class="week-label" id="week-label"></span>
        <button class="btn btn-sec btn-sm" onclick="moveWeek(1)">다음 ▶</button>
        <button class="btn btn-ghost btn-sm" onclick="goToCurrentWeek()">오늘</button>
      </div>
      <div class="week-grid" id="week-grid"></div>
    </div>
    <!-- Detail panel -->
    <div class="sch-detail-panel hidden" id="sch-detail-panel">
      <div class="sdp-inner" id="sdp-inner"></div>
    </div>
  </div>
</div>

<!-- Modals -->
<div class="overlay" id="modal-party"><div class="modal">
  <div class="modal-title" id="party-modal-title">파티 추가</div>
  <div class="form-group"><label class="form-label">레이드 이름</label><input class="form-input" id="party-name" lang="ko" inputmode="text" placeholder="에키드나 하드, 카멘 노말..." maxlength="40"></div>
  <div class="form-group"><label class="form-label">난이도</label><input class="form-input" id="party-difficulty" lang="ko" inputmode="text" placeholder="노말, 하드, 싱글..."></div>
  <div class="form-group"><label class="form-label">파티 인원</label>
    <div class="radio-group">
      <div class="radio-opt active" id="size-4" onclick="selectSize(4)">4인</div>
      <div class="radio-opt" id="size-8" onclick="selectSize(8)">8인</div>
    </div>
  </div>
  <input type="hidden" id="party-edit-id">
  <div class="modal-footer"><button class="btn btn-sec" onclick="closeModal('modal-party')">취소</button><button class="btn btn-gold" id="party-submit-btn" onclick="submitParty()">추가</button></div>
</div></div>

<div class="overlay" id="modal-char-pick"><div class="modal">
  <div class="modal-title">캐릭터 선택</div>
  <div style="font-size:.8rem;color:var(--muted);margin-bottom:10px;" id="char-pick-info"></div>
  <div class="char-pick-grid" id="char-pick-grid"></div>
  <div class="modal-footer"><button class="btn btn-sec" onclick="closeModal('modal-char-pick')">취소</button></div>
</div></div>

<div class="overlay" id="modal-schedule"><div class="modal">
  <div class="modal-title" id="sch-modal-title">일정 추가</div>
  <div class="form-group"><label class="form-label">파티 선택</label><select class="form-select" id="sch-party-select"></select></div>
  <div class="form-group"><label class="form-label">요일</label><select class="form-select" id="sch-day-select"></select></div>
  <div class="form-group"><label class="form-label">시간</label><input class="form-input" id="sch-time" type="time"></div>
  <div class="form-group">
    <div class="toggle-row" onclick="toggleFixed()">
      <input type="checkbox" id="sch-fixed" tabindex="-1">
      <div><div class="toggle-label">고정 일정</div><div class="toggle-sub">매주 자동 유지. 비고정은 매주 초기화.</div></div>
    </div>
  </div>
  <input type="hidden" id="sch-edit-id">
  <div class="modal-footer">
    <button class="btn btn-danger" id="sch-delete-btn" style="margin-right:auto;display:none;" onclick="deleteScheduleFromModal()">삭제</button>
    <button class="btn btn-sec" onclick="closeModal('modal-schedule')">취소</button>
    <button class="btn btn-gold" id="sch-submit-btn" onclick="submitSchedule()">추가</button>
  </div>
</div></div>

<div class="overlay" id="modal-share"><div class="modal modal-wide">
  <div class="modal-title">🔗 일정 공유 링크</div>
  <p style="font-size:.84rem;color:var(--muted);margin-bottom:14px;line-height:1.7;">이 링크로 접속한 사람은 <b style="color:var(--text);">레이드 일정과 파티 구성을 실시간으로 볼 수 있습니다.</b> 편집은 불가능합니다.</p>
  <div class="form-group"><label class="form-label">공유 링크 (클릭하여 복사)</label><div class="share-link-box" id="share-link-text" onclick="copyShareLink()"></div></div>
  <p style="font-size:.74rem;color:var(--muted);margin-top:6px;">⚠️ 링크에 DB 접근 키가 포함됩니다. 신뢰하는 사람에게만 공유하세요.</p>
  <div class="modal-footer"><button class="btn btn-teal" onclick="copyShareLink()">📋 링크 복사</button><button class="btn btn-sec" onclick="closeModal('modal-share')">닫기</button></div>
</div></div>

<script>
const{createClient}=supabase;

// ─── Viewer mode ───
function parseViewerParam(){try{const p=new URLSearchParams(location.search).get('viewer');if(!p)return null;return JSON.parse(atob(p));}catch(e){return null;}}
const viewerCreds=parseViewerParam();
const isViewer=!!viewerCreds;
if(isViewer)document.getElementById('viewer-banner').classList.add('show');

function getConfig(){if(isViewer)return viewerCreds;const u=localStorage.getItem('la_url'),k=localStorage.getItem('la_key');return u&&k?{url:u,key:k}:null;}
function applyViewerMode(){if(!isViewer)return;document.querySelectorAll('.edit-only').forEach(el=>{el.style.display='none';el.disabled=true;});}

// ─── State ───
let sb=null,allChars=[],parties=[],schedules=[],scheduleOverrides={};
let selPartyId=null,selScheduleId=null,weekOffset=0,partySize=4;
let pickCtx={isOverride:false,partyId:null,slotIndex:null};
const WEEK_DAY_NUMS=[3,4,5,6,0,1,2];
const DKO=['일','월','화','수','목','금','토'];

async function init(){
  const cfg=getConfig();
  if(!cfg){window.location.href='index.html';return;}
  sb=createClient(cfg.url,cfg.key);
  const[{data:chars},{data:pts},{data:schs},{data:ovrs}]=await Promise.all([
    sb.from('characters').select('*').order('sort_order').order('created_at'),
    sb.from('raid_parties').select('*').order('sort_order').order('created_at'),
    sb.from('raid_schedules').select('*'),
    sb.from('raid_schedule_overrides').select('*').catch(()=>({data:[]}))
  ]);
  allChars=chars||[];parties=pts||[];schedules=schs||[];
  (ovrs||[]).forEach(o=>{scheduleOverrides[o.schedule_id+'_'+o.week_start_date]={id:o.id,slot_overrides:o.slot_overrides||{}};});
  await autoResetNonFixed();
  updateWeekLabel();renderPartyList();renderSchedule();
  applyViewerMode();
}

// ─── Week ───
function getWeekStart(offset=0){const now=new Date(),kst=new Date(now.getTime()+9*3600000);let b=(kst.getUTCDay()-3+7)%7;if(b===0&&kst.getUTCHours()<6)b=7;const ws=new Date(kst);ws.setUTCDate(ws.getUTCDate()-b+offset*7);ws.setUTCHours(6,0,0,0);return ws;}
function getWeekKey(offset=0){const ws=getWeekStart(offset);return`${ws.getUTCFullYear()}-${String(ws.getUTCMonth()+1).padStart(2,'0')}-${String(ws.getUTCDate()).padStart(2,'0')}`;}
function getWeekDays(offset=0){const s=getWeekStart(offset);return WEEK_DAY_NUMS.map((_,i)=>{const d=new Date(s);d.setUTCDate(d.getUTCDate()+i);return d;});}
function updateWeekLabel(){const d=getWeekDays(weekOffset),f=x=>`${x.getUTCMonth()+1}/${x.getUTCDate()}`,l=`${f(d[0])} (수) ~ ${f(d[6])} (화)`;document.getElementById('week-label').textContent=l;document.getElementById('header-week').textContent=l;}
function moveWeek(n){weekOffset+=n;selScheduleId=null;updateWeekLabel();renderSchedule();hideDetailPanel();}
function goToCurrentWeek(){weekOffset=0;selScheduleId=null;updateWeekLabel();renderSchedule();hideDetailPanel();}
async function autoResetNonFixed(){const ws=getWeekStart(0),del=schedules.filter(s=>!s.is_fixed&&new Date(s.created_at)<new Date(ws.getTime()-7*86400000));if(!del.length)return;await sb.from('raid_schedules').delete().in('id',del.map(s=>s.id));schedules=schedules.filter(s=>!del.some(d=>d.id===s.id));}

// ─── Party list ───

async function loadPartyMembers(id){const{data}=await sb.from('raid_party_members').select('*').eq('party_id',id);const p=parties.find(x=>x.id===id);if(p)p.members=data||[];return data||[];}

// ─── Party member (permanent) ───
function openCharPickerParty(partyId,slotIndex){pickCtx={isOverride:false,partyId,slotIndex};document.getElementById('char-pick-info').textContent=`슬롯 ${slotIndex+1} — 캐릭터 배치`;renderCharPickGrid();openModal('modal-char-pick');}
function renderCharPickGrid(){document.getElementById('char-pick-grid').innerHTML=`<div class="char-pick-item no-char" onclick="assignChar(null)">✕ 비우기</div>`+allChars.map(c=>`<div class="char-pick-item" onclick="assignChar('${c.id}')"><div class="char-pick-name">${esc(c.name)}</div><div class="char-pick-meta">${esc(c.class_name||'')}${c.item_level?` · Lv.${c.item_level}`:''}</div></div>`).join('');}
async function assignChar(charId){if(pickCtx.isOverride){await assignOverrideChar(charId);return;}const{partyId,slotIndex}=pickCtx;const p=parties.find(x=>x.id===partyId);if(!p)return;if(!p.members)p.members=[];const ex=p.members.find(m=>m.slot_index===slotIndex);if(charId===null){if(ex){await sb.from('raid_party_members').delete().eq('id',ex.id);p.members=p.members.filter(m=>m.slot_index!==slotIndex);}}else if(ex){await sb.from('raid_party_members').update({character_id:charId}).eq('id',ex.id);ex.character_id=charId;}else{const{data}=await sb.from('raid_party_members').insert({party_id:partyId,slot_index:slotIndex,character_id:charId}).select().single();if(data)p.members.push(data);}closeModal('modal-char-pick');renderPartyDetail();toast('✅ 배치됨');}
async function removePartyMember(partyId,slotIndex,memberId){const p=parties.find(x=>x.id===partyId);if(!p)return;const m=memberId?p.members?.find(x=>x.id===memberId):p.members?.find(x=>x.slot_index===slotIndex);if(m)await sb.from('raid_party_members').delete().eq('id',m.id);if(p.members)p.members=p.members.filter(x=>x.slot_index!==slotIndex);renderPartyDetail();}

// ─── Party CRUD ───
function openAddParty(){partySize=4;document.getElementById('party-modal-title').textContent='파티 추가';document.getElementById('party-submit-btn').textContent='추가';document.getElementById('party-name').value='';document.getElementById('party-difficulty').value='';selectSize(4);document.getElementById('party-edit-id').value='';openModal('modal-party');setTimeout(()=>document.getElementById('party-name').focus(),80);}
function openEditParty(id){const p=parties.find(x=>x.id===id);if(!p)return;partySize=p.party_size;document.getElementById('party-modal-title').textContent='파티 수정';document.getElementById('party-submit-btn').textContent='저장';document.getElementById('party-name').value=p.name;document.getElementById('party-difficulty').value=p.difficulty||'';selectSize(p.party_size);document.getElementById('party-edit-id').value=id;openModal('modal-party');}
function selectSize(n){partySize=n;['4','8'].forEach(s=>document.getElementById('size-'+s).classList.toggle('active',String(n)===s));}
async function submitParty(){const name=document.getElementById('party-name').value.trim();if(!name){toast('❗ 이름 입력');return;}const difficulty=document.getElementById('party-difficulty').value.trim(),editId=document.getElementById('party-edit-id').value;if(editId){await sb.from('raid_parties').update({name,difficulty,party_size:partySize}).eq('id',editId);const p=parties.find(x=>x.id===editId);if(p){p.name=name;p.difficulty=difficulty;p.party_size=partySize;}toast('✅ 수정됨');}else{const{data,error}=await sb.from('raid_parties').insert({name,difficulty,party_size:partySize,sort_order:parties.length}).select().single();if(error){toast('❗ '+error.message);return;}data.members=[];parties.push(data);toast('✅ 파티 추가됨');}closeModal('modal-party');renderPartyList();renderPartyDetail();renderSchedule();}
async function deleteParty(id){if(!confirm('파티와 관련 데이터를 삭제합니다. 계속?'))return;await sb.from('raid_parties').delete().eq('id',id);parties=parties.filter(p=>p.id!==id);schedules=schedules.filter(s=>s.party_id!==id);if(selPartyId===id){selPartyId=null;document.getElementById('party-detail').innerHTML='<div class="empty-state"><div class="empty-icon">🗡️</div><div>파티를 선택하세요</div></div>';}renderPartyList();renderSchedule();toast('🗑️ 삭제됨');}

// ─── Schedule render ───
function renderSchedule(){
  populateDaySelect();
  const el=document.getElementById('week-grid');if(!el)return;
  const days=getWeekDays(weekOffset),todayKST=new Date(Date.now()+9*3600000).getUTCDay();
  el.innerHTML=days.map((date,i)=>{
    const dn=WEEK_DAY_NUMS[i],daySchs=schedules.filter(s=>s.day_of_week===dn),isToday=dn===todayKST&&weekOffset===0;
    const wk=getWeekKey(weekOffset);
    return`<div class="day-col ${isToday?'today-col':''}">
      <div class="day-header">
        <div class="day-name ${isToday?'today':''}">${DKO[dn]} ${isToday?'<span style="font-size:.6rem;color:var(--gold);">(오늘)</span>':''}</div>
        <div class="day-date">${date.getUTCMonth()+1}/${date.getUTCDate()}</div>
      </div>
      <div class="day-entries">
        ${daySchs.map(s=>{
          const p=parties.find(x=>x.id===s.party_id);
          const ovrKey=s.id+'_'+wk,ovr=scheduleOverrides[ovrKey];
          const hasOvr=ovr&&Object.keys(ovr.slot_overrides||{}).length>0;
          return`<div class="sch-entry ${s.is_fixed?'fixed':''} ${s.id===selScheduleId?'sel':''}" onclick="toggleScheduleDetail('${s.id}')">
            ${!isViewer?`<button class="sch-entry-edit-btn edit-only" onclick="event.stopPropagation();openEditSchedule('${s.id}')">✏️</button>`:''}
            <div class="sch-entry-name">${esc(p?.name||'?')} ${hasOvr?'<span style="font-size:.6rem;color:var(--gold);padding:1px 4px;border:1px solid rgba(200,168,75,.3);border-radius:4px;">변경</span>':''}</div>
            <div class="sch-entry-meta">${s.time_str?`🕐 ${s.time_str} · `:''} ${s.is_fixed?'📌 고정':''} ${p?.party_size?`${p.party_size}인`:''}</div>
          </div>`;
        }).join('')}
        ${!isViewer?`<button class="add-day-btn edit-only" onclick="openAddSchForDay(${dn})">＋</button>`:''}
      </div>
    </div>`;
  }).join('');
  applyViewerMode();
}

// ─── Schedule detail panel ───
async function toggleScheduleDetail(schId){
  selScheduleId=selScheduleId===schId?null:schId;
  renderSchedule();
  if(!selScheduleId){hideDetailPanel();return;}
  await renderDetailPanel();
}
function hideDetailPanel(){document.getElementById('sch-detail-panel').classList.add('hidden');}
async function renderDetailPanel(){
  const panel=document.getElementById('sch-detail-panel'),inner=document.getElementById('sdp-inner');
  if(!selScheduleId){panel.classList.add('hidden');return;}
  const s=schedules.find(x=>x.id===selScheduleId),p=s?parties.find(x=>x.id===s.party_id):null;
  if(!s||!p){panel.classList.add('hidden');return;}
  if(!p.members)await loadPartyMembers(p.id);
  panel.classList.remove('hidden');
  const wk=getWeekKey(weekOffset),ovrKey=selScheduleId+'_'+wk;
  const ovr=scheduleOverrides[ovrKey]||{id:null,slot_overrides:{}};
  const hasOvr=Object.keys(ovr.slot_overrides||{}).length>0;
  const slots=getMembersForParty(p);
  const gc=p.party_size===8?'slots-grid s8':'slots-grid';
  const effectiveSlots=slots.map((slot,i)=>{
    const si=String(i);
    if(si in (ovr.slot_overrides||{})){return{...slot,character_id:ovr.slot_overrides[si],isOvr:true};}
    return{...slot,isOvr:false};
  });
  inner.innerHTML=`
    <div class="sdp-header">
      <div><div class="sdp-title">${esc(p.name)} <span style="font-size:.76rem;font-family:'Noto Sans KR';font-weight:400;color:var(--muted);">${esc(p.difficulty||'')} · ${DKO[s.day_of_week]}요일${s.time_str?' '+s.time_str:''}</span></div></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-left:auto;">
        <span class="sdp-badge">📅 ${wk}</span>
        ${!isViewer&&hasOvr?`<button class="btn btn-sec btn-sm edit-only" onclick="resetOverrides()">↩ 원본으로</button>`:''}
        <button class="btn btn-icon" onclick="selScheduleId=null;hideDetailPanel();renderSchedule();">✕</button>
      </div>
    </div>
    ${!isViewer?`<p style="font-size:.73rem;color:var(--muted);margin-bottom:10px;">슬롯을 클릭하면 <b style="color:var(--text)">이번 주에만 임시 변경</b>됩니다. 원본 파티 구성은 바뀌지 않습니다.</p>`:''}
    <div class="${gc}">
      ${effectiveSlots.map((slot,i)=>{
        const ch=allChars.find(c=>c.id===slot.character_id);
        const clickFn=!isViewer?`openCharPickerOverride(${i})`:'';
        if(ch)return`<div class="slot filled ${slot.isOvr?'overridden':''} ${!isViewer?'clickable':''}" onclick="${clickFn}">
          <span class="slot-num">${i+1}</span>
          <div style="flex:1;min-width:0;"><div class="slot-char">${esc(ch.name)}${slot.isOvr?'<span style="font-size:.59rem;color:var(--gold);margin-left:4px;padding:0 3px;border:1px solid rgba(200,168,75,.4);border-radius:3px;">임시</span>':''}</div><div class="slot-meta">${esc(ch.class_name||'')}${ch.item_level?` Lv.${ch.item_level}`:''}</div></div>
          <button class="slot-remove edit-only" onclick="event.stopPropagation();overrideSlot(${i},null)">✕</button>
        </div>`;
        return`<div class="slot ${slot.isOvr?'overridden':''} ${!isViewer?'clickable':''}" onclick="${clickFn}">
          <span class="slot-num">${i+1}</span><span class="slot-empty">${slot.isOvr?'비움 (임시)':'+ 임시 배치'}</span>
        </div>`;
      }).join('')}
    </div>`;
  applyViewerMode();
}

function openCharPickerOverride(slotIndex){
  pickCtx={isOverride:true,partyId:null,slotIndex};
  document.getElementById('char-pick-info').textContent=`슬롯 ${slotIndex+1} — 이번 주 임시 변경`;
  renderCharPickGrid();openModal('modal-char-pick');
}
async function assignOverrideChar(charId){await overrideSlot(pickCtx.slotIndex,charId);closeModal('modal-char-pick');}
async function overrideSlot(slotIndex,charId){
  const wk=getWeekKey(weekOffset),ovrKey=selScheduleId+'_'+wk;
  if(!scheduleOverrides[ovrKey])scheduleOverrides[ovrKey]={id:null,slot_overrides:{}};
  const ovr=scheduleOverrides[ovrKey];
  if(charId===null)delete ovr.slot_overrides[String(slotIndex)];else ovr.slot_overrides[String(slotIndex)]=charId;
  if(ovr.id){await sb.from('raid_schedule_overrides').update({slot_overrides:ovr.slot_overrides}).eq('id',ovr.id);}
  else{const{data}=await sb.from('raid_schedule_overrides').insert({schedule_id:selScheduleId,week_start_date:wk,slot_overrides:ovr.slot_overrides}).select().single();if(data)ovr.id=data.id;}
  renderSchedule();await renderDetailPanel();toast('✅ 임시 변경 저장됨');
}
async function resetOverrides(){
  if(!confirm('이번 주 임시 변경을 모두 되돌리겠습니까?'))return;
  const wk=getWeekKey(weekOffset),ovrKey=selScheduleId+'_'+wk,ovr=scheduleOverrides[ovrKey];
  if(ovr?.id)await sb.from('raid_schedule_overrides').delete().eq('id',ovr.id);
  delete scheduleOverrides[ovrKey];
  renderSchedule();await renderDetailPanel();toast('↩ 원본으로 초기화됨');
}

function openAddSchForDay(dn){resetSchModal();document.getElementById('sch-modal-title').textContent='일정 추가';document.getElementById('sch-submit-btn').textContent='추가';populatePartySelect('');document.getElementById('sch-day-select').value=String(dn);openModal('modal-schedule');}
function openEditSchedule(id){const s=schedules.find(x=>x.id===id);if(!s)return;resetSchModal();document.getElementById('sch-modal-title').textContent='일정 수정';document.getElementById('sch-submit-btn').textContent='저장';document.getElementById('sch-delete-btn').style.display='flex';document.getElementById('sch-edit-id').value=id;document.getElementById('sch-fixed').checked=s.is_fixed;document.getElementById('sch-time').value=s.time_str||'';populatePartySelect(s.party_id);document.getElementById('sch-day-select').value=String(s.day_of_week);openModal('modal-schedule');}

function populatePartySelect(selId=''){document.getElementById('sch-party-select').innerHTML=parties.map(p=>`<option value="${p.id}" ${p.id===selId?'selected':''}>${esc(p.name)} (${p.party_size}인${p.difficulty?' · '+p.difficulty:''})</option>`).join('');}
function populateDaySelect(){document.getElementById('sch-day-select').innerHTML=WEEK_DAY_NUMS.map(n=>`<option value="${n}">${DKO[n]}요일</option>`).join('');}
async function submitSchedule(){
  const partyId=document.getElementById('sch-party-select').value,dayOfWeek=parseInt(document.getElementById('sch-day-select').value),timeStr=document.getElementById('sch-time').value,isFixed=document.getElementById('sch-fixed').checked,editId=document.getElementById('sch-edit-id').value;

async function deleteScheduleFromModal(){const id=document.getElementById('sch-edit-id').value;if(!id)return;await deleteScheduleById(id);closeModal('modal-schedule');}
async function deleteScheduleById(id){if(!confirm('일정을 삭제하시겠습니까?'))return;await sb.from('raid_schedules').delete().eq('id',id);schedules=schedules.filter(s=>s.id!==id);if(selScheduleId===id){selScheduleId=null;hideDetailPanel();}renderSchedule();if(selPartyId)renderPartyDetail();toast('🗑️ 삭제됨');}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('open');}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'));});
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2600);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
init();
</script>
