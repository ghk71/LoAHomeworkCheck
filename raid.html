<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏰 레이드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#0a0a0f;--s1:#111118;--s2:#16161f;--s3:#1e1e2a;--s4:#252535;--border:#2a2a3d;--border-lit:#3d3d5c;--gold:#c8a84b;--gold-bright:#e8c86a;--gold-dim:#8a6e2a;--gold-glow:rgba(200,168,75,.2);--text:#e0ddd5;--muted:#5a5f72;--dim:#2e3045;--green:#2ecc71;--red:#e74c3c;--blue:#4a8fd4;--purple:#9b59b6;--teal:#1abc9c;--orange:#e67e22;--r:5px;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column;}
/* Nav */
.page-nav{background:#060910;border-bottom:1px solid var(--border);display:flex;flex-shrink:0;}
.pnav-item{padding:8px 20px;font-size:.82rem;color:var(--muted);text-decoration:none;transition:all .15s;display:flex;align-items:center;gap:6px;border-right:1px solid var(--border);}
.pnav-item:hover{color:var(--text);background:rgba(255,255,255,.03);}
.pnav-item.active{color:var(--gold);background:rgba(200,168,75,.06);border-bottom:2px solid var(--gold);}
/* Header */
.header{background:var(--s1);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);}
.header-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);letter-spacing:2px;}
/* Viewer banner */
#viewer-banner{display:none;background:rgba(200,168,75,.1);border-bottom:1px solid rgba(200,168,75,.3);padding:6px 20px;font-size:.78rem;color:var(--gold);text-align:center;flex-shrink:0;}
#viewer-banner.show{display:block;}
/* Tab bar */
.tab-bar{background:var(--s2);border-bottom:1px solid var(--border);display:flex;flex-shrink:0;}
.raid-tab{padding:10px 22px;font-size:.84rem;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);transition:all .15s;}
.raid-tab:hover{color:var(--text);background:rgba(255,255,255,.02);}
.raid-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
/* Body */
.app-body{flex:1;overflow:hidden;display:flex;}
/* ── PARTY TAB ── */
#view-party{display:flex;flex:1;overflow:hidden;}
.preset-panel{width:320px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:16px;}
.party-detail-panel{flex:1;overflow-y:auto;padding:20px;}
/* Preset accordion */
.preset-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;}
.preset-header{padding:11px 14px;background:var(--s1);display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;transition:background .12s;}
.preset-header:hover{background:rgba(255,255,255,.03);}
.preset-toggle{font-size:.68rem;color:var(--muted);width:12px;flex-shrink:0;}
.preset-name{font-size:.9rem;font-weight:700;flex:1;color:var(--gold-bright);}
.preset-info{font-size:.69rem;color:var(--muted);}
.preset-actions{display:flex;gap:3px;opacity:0;transition:opacity .15s;}
.preset-card:hover .preset-actions{opacity:1;}
.preset-body{padding:8px 12px 10px;}
.party-mini{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--r);cursor:pointer;transition:all .12s;border:1px solid transparent;}
.party-mini:hover{background:var(--s3);border-color:var(--border);}
.party-mini.selected{background:rgba(200,168,75,.08);border-color:rgba(200,168,75,.4);}
.party-mini-name{font-size:.82rem;font-weight:600;flex:1;}
.party-mini-fill{font-size:.7rem;color:var(--muted);}
.preset-gold{font-size:.74rem;color:#f0c040;margin-top:4px;padding:4px 10px;background:rgba(240,192,64,.07);border-radius:4px;display:inline-flex;align-items:center;gap:4px;}
/* Party detail right panel */
.pdp-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.pdp-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);}
.pdp-sub{font-size:.75rem;color:var(--muted);margin-top:2px;}
.slots-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.slots-grid.s8{grid-template-columns:repeat(4,1fr);}
.slot{min-height:44px;border:1px dashed var(--border);border-radius:var(--r);display:flex;align-items:center;padding:7px 10px;gap:7px;transition:all .15s;background:var(--s1);}
.slot.clickable{cursor:pointer;}
.slot.clickable:hover{border-color:var(--gold);background:var(--s3);}
.slot.filled{border-style:solid;border-color:rgba(42,184,160,.4);background:rgba(42,184,160,.06);}
.slot.filled.clickable:hover{border-color:var(--teal);background:rgba(42,184,160,.12);}
.slot-num{font-size:.65rem;color:var(--dim);width:14px;flex-shrink:0;}
.slot-char{font-size:.8rem;font-weight:500;flex:1;}
.slot-class{font-size:.67rem;color:var(--muted);}
.slot-empty{font-size:.78rem;color:var(--dim);flex:1;}
.slot-remove{font-size:.65rem;color:var(--red);opacity:0;background:none;border:none;cursor:pointer;padding:2px 4px;flex-shrink:0;}
.slot:hover .slot-remove{opacity:1;}
/* ── SCHEDULE TAB ── */
#view-schedule{display:none;flex-direction:column;flex:1;overflow:hidden;}
.sch-notice-bar{padding:12px 18px;background:rgba(200,168,75,.07);border-bottom:2px solid rgba(200,168,75,.2);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.notice-icon{font-size:1.1rem;flex-shrink:0;}
.notice-text-wrap{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0;}
.notice-week-label{font-size:.67rem;color:var(--gold);font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.notice-input{background:transparent;border:none;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.92rem;outline:none;width:100%;}
.notice-input::placeholder{color:rgba(200,168,75,.3);}
.notice-save-hint{font-size:.7rem;color:var(--muted);flex-shrink:0;}
.week-nav{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border);background:var(--s1);flex-shrink:0;}
.week-label{font-size:.85rem;font-weight:600;flex:1;text-align:center;}
.sch-body{flex:1;overflow-y:auto;}
/* Day rows */
.day-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border);min-height:120px;}
.day-row.today-row{background:rgba(200,168,75,.03);}
.day-label-col{width:80px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 8px;border-right:1px solid var(--border);background:var(--s1);}
.day-label-name{font-size:.88rem;font-weight:700;}
.day-label-name.today{color:var(--gold);}
.day-label-date{font-size:.7rem;color:var(--muted);margin-top:3px;}
.day-label-today-badge{font-size:.6rem;color:var(--gold);border:1px solid rgba(200,168,75,.4);border-radius:8px;padding:1px 5px;margin-top:4px;}
.day-parties-scroll{flex:1;display:flex;align-items:flex-start;gap:8px;padding:10px 12px;overflow-x:auto;min-width:0;}
.day-parties-scroll::-webkit-scrollbar{height:3px;}
.day-add-btn{flex-shrink:0;width:40px;height:40px;border:1px dashed var(--border);border-radius:var(--r);background:none;color:var(--dim);cursor:pointer;font-size:1.1rem;align-self:center;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.day-add-btn:hover{border-color:var(--gold);color:var(--gold);}
/* Party card in schedule */
.sched-card{flex-shrink:0;width:180px;background:var(--s2);border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:border-color .15s;}
.sched-card:hover{border-color:var(--border-lit);}
.sched-card.completed{border-color:rgba(60,186,120,.4);background:rgba(60,186,120,.04);}
.sched-card.has-ovr{border-color:rgba(200,168,75,.3);}
.sc-header{padding:7px 9px;background:var(--s1);border-bottom:1px solid var(--border);}
.sc-raid-name{font-size:.78rem;font-weight:700;color:var(--gold-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-party-name{font-size:.68rem;color:var(--muted);margin-top:1px;}
.sc-meta{font-size:.65rem;color:var(--dim);margin-top:2px;display:flex;align-items:center;gap:5px;}
.sc-members{padding:6px 9px;display:flex;flex-direction:column;gap:3px;min-height:40px;}
.sc-member{font-size:.72rem;display:flex;align-items:center;gap:5px;}
.sc-member-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-member-class{color:var(--muted);font-size:.65rem;flex-shrink:0;}
.sc-member.temp{color:var(--gold);}
.sc-empty-slot{font-size:.68rem;color:var(--dim);}
.sc-footer{display:flex;gap:4px;padding:6px 8px;border-top:1px solid var(--border);background:var(--s1);}
.sc-complete-btn{flex:1;padding:4px 6px;border:none;border-radius:3px;cursor:pointer;font-size:.73rem;font-family:'Noto Sans KR',sans-serif;font-weight:600;transition:all .15s;background:rgba(60,186,120,.15);color:var(--green);border:1px solid rgba(60,186,120,.3);}
.sc-complete-btn:hover{background:rgba(60,186,120,.3);}
.sched-card.completed .sc-complete-btn{background:var(--green);color:#fff;border-color:var(--green);}
.sc-complete-btn.viewer-disabled{opacity:.4;cursor:not-allowed;pointer-events:none;}
.sc-edit-btn{padding:4px 6px;border-radius:3px;background:var(--s3);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:.72rem;transition:all .15s;}
.sc-edit-btn:hover{border-color:var(--border-lit);color:var(--text);}
/* Char picker with account groups */
.acc-group-header{padding:5px 10px 3px;font-size:.7rem;font-weight:700;color:var(--gold);letter-spacing:.5px;text-transform:uppercase;background:var(--s1);border-radius:3px;margin-bottom:4px;margin-top:6px;}
.acc-group-header:first-child{margin-top:0;}
.char-pick-grid{max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;}
.char-pick-item{padding:7px 11px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;}
.char-pick-item:hover{border-color:var(--teal);background:rgba(42,184,160,.06);}
.char-pick-name{font-size:.84rem;font-weight:500;flex:1;}
.char-pick-meta{font-size:.7rem;color:var(--muted);}
.char-pick-item.no-char{border-style:dashed;color:var(--red);justify-content:center;}
.char-pick-item.no-char:hover{border-color:var(--red);background:rgba(200,64,64,.06);}
/* Section header */
.section-hd{font-family:'Cinzel',serif;font-size:.88rem;color:var(--gold);letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-hd::after{content:'';flex:1;height:1px;background:var(--gold-dim);}
/* Buttons */
.btn{padding:7px 14px;border-radius:var(--r);border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.82rem;transition:all .15s;display:inline-flex;align-items:center;gap:5px;line-height:1;}
.btn-gold{background:var(--gold);color:#1a0f00;font-weight:700;}
.btn-gold:hover{background:var(--gold-bright);}
.btn-sec{background:var(--s3);color:var(--text);border:1px solid var(--border-lit);}
.btn-sec:hover{border-color:var(--gold);color:var(--gold-bright);}
.btn-ghost{background:transparent;color:var(--muted);padding:4px 7px;font-size:.74rem;border-radius:3px;}
.btn-ghost:hover{color:var(--text);background:rgba(255,255,255,.05);}
.btn-danger{background:transparent;color:var(--red);padding:4px 7px;font-size:.74rem;border-radius:3px;}
.btn-danger:hover{background:rgba(200,64,64,.12);}
.btn-teal{background:rgba(42,184,160,.18);color:var(--teal);border:1px solid rgba(42,184,160,.4);}
.btn-teal:hover{background:rgba(42,184,160,.3);}
.btn-sm{padding:4px 9px;font-size:.76rem;}
.btn-icon{background:transparent;color:var(--muted);padding:3px 5px;font-size:.78rem;border-radius:3px;}
.btn-icon:hover{color:var(--text);}
.btn-full{width:100%;justify-content:center;padding:9px;}
.btn-outline{background:transparent;border:1px dashed var(--border);color:var(--muted);padding:6px 12px;border-radius:var(--r);font-size:.79rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;display:block;text-align:center;width:100%;}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
/* Forms */
.form-group{margin-bottom:11px;}
.form-label{display:block;font-size:.74rem;color:var(--muted);margin-bottom:4px;letter-spacing:.5px;}
.form-row{display:flex;gap:10px;}
.form-row>.form-group{flex:1;}
.form-input,.form-select{width:100%;background:var(--s1);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:var(--r);font-family:'Noto Sans KR',sans-serif;font-size:.87rem;transition:border .15s;outline:none;-webkit-appearance:none;}
.form-input:focus,.form-select:focus{border-color:var(--gold);}
.form-select option{background:var(--s2);}
.toggle-row{display:flex;align-items:center;gap:10px;padding:8px 11px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;user-select:none;}
.toggle-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--gold);}
.toggle-label{font-size:.84rem;flex:1;}
.toggle-sub{font-size:.72rem;color:var(--muted);}
.radio-group{display:flex;gap:8px;}
.radio-opt{flex:1;padding:7px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;text-align:center;font-size:.82rem;color:var(--muted);transition:all .15s;user-select:none;}
.radio-opt:hover{border-color:var(--border-lit);color:var(--text);}
.radio-opt.active{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,.08);}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--s2);border:1px solid var(--gold-dim);border-radius:8px;padding:24px 26px;width:100%;max-width:460px;box-shadow:0 0 60px var(--gold-glow),0 20px 60px rgba(0,0,0,.5);max-height:90vh;overflow-y:auto;}
.modal-wide{max-width:520px;}
.modal-title{font-family:'Cinzel',serif;color:var(--gold);font-size:1.02rem;letter-spacing:1px;margin-bottom:18px;}
.modal-footer{display:flex;gap:7px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);}
/* Misc */
.share-link-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:.74rem;word-break:break-all;color:var(--blue);cursor:pointer;}
.share-link-box:hover{border-color:var(--blue);}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
/* DnD */
[draggable="true"]{cursor:grab;user-select:none;}
.r-drag{opacity:.3!important;}
.r-dnd-v{box-shadow:inset 0 -3px 0 var(--gold)!important;background:rgba(200,168,75,.07)!important;}
.r-dnd-h{box-shadow:inset -3px 0 0 var(--gold)!important;background:rgba(200,168,75,.07)!important;}
.rdnd-handle{font-size:.7rem;color:var(--dim);cursor:grab;padding:0 4px;flex-shrink:0;line-height:1;}
.rdnd-handle:hover{color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:10px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--s1);}
::-webkit-scrollbar-thumb{background:var(--border-lit);border-radius:3px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--s3);border:1px solid var(--gold-dim);color:var(--text);padding:9px 16px;border-radius:var(--r);font-size:.84rem;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:300;animation:toastIn .25s ease,toastOut .25s ease 2.25s forwards;}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes toastOut{to{opacity:0;transform:translateY(8px);}}
</style>
</head>
<body>
<nav class="page-nav">
  <a href="index.html" class="pnav-item" id="nav-homework">⚔️ 숙제</a>
  <a href="core.html" class="pnav-item" id="nav-core">🔮 코어현황</a>
  <a href="raid.html" class="pnav-item active" id="nav-raid">🏰 레이드</a>
</nav>
<div id="viewer-banner">👁 뷰어 모드 — 읽기 전용</div>
<div class="header">
  <span>🏰</span>
  <div class="header-title">레이드</div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
    <span id="header-week" style="font-size:.74rem;color:var(--muted);padding:4px 8px;background:var(--s3);border:1px solid var(--border);border-radius:4px;"></span>
    <button class="btn btn-sec btn-sm edit-only" onclick="openShareModal()">🔗 공유</button>
  </div>
</div>
<div class="tab-bar">
  <div class="raid-tab active" id="tab-party" onclick="switchTab('party')">🗡️ 파티 구성</div>
  <div class="raid-tab" id="tab-schedule" onclick="switchTab('schedule')">📅 주간 일정</div>
</div>
<div class="app-body">
  <!-- ── PARTY TAB ── -->
  <div id="view-party">
    <div class="preset-panel">
      <div class="section-hd">레이드 목록</div>
      <div id="preset-list"></div>
      <button class="btn-outline edit-only" style="margin-top:6px;" onclick="openAddPreset()">＋ 레이드 추가</button>
    </div>
    <div class="party-detail-panel" id="party-detail">
      <div class="empty-state"><div class="empty-icon">🗡️</div><div>왼쪽에서 파티를 선택하세요</div></div>
    </div>
  </div>
  <!-- ── SCHEDULE TAB ── -->
  <div id="view-schedule">
    <div class="sch-notice-bar">
      <span class="notice-icon">📢</span>
      <div class="notice-text-wrap">
        <span class="notice-week-label" id="notice-week-label">이번 주 공지</span>
        <input class="notice-input edit-only" id="notice-input" placeholder="공지사항을 입력하세요..." onblur="saveNotice()" onkeydown="if(event.key==='Enter')this.blur()">
      </div>
      <span class="notice-save-hint" id="notice-hint"></span>
      <button class="btn btn-sec btn-sm edit-only" style="flex-shrink:0;" onclick="openAdvanceNotice()">📅 미리 쓰기</button>
    </div>
    <div class="week-nav">
      <button class="btn btn-sec btn-sm" onclick="moveWeek(-1)">◀ 이전</button>
      <span class="week-label" id="week-label"></span>
      <button class="btn btn-sec btn-sm" onclick="moveWeek(1)">다음 ▶</button>
      <button class="btn btn-ghost btn-sm" onclick="goToCurrentWeek()">오늘</button>
    </div>
    <div class="sch-body" id="sch-body"></div>
  </div>
</div>

<!-- ── MODALS ── -->
<!-- Party modal -->
<div class="overlay" id="modal-party"><div class="modal">
  <div class="modal-title" id="party-modal-title">파티 추가</div>
  <div class="form-group"><label class="form-label">파티 이름</label><input class="form-input" id="party-name" lang="ko" inputmode="text" placeholder="1파, 길드전용, 주말파..." maxlength="20"></div>
  <div class="form-group"><label class="form-label">파티 인원</label>
    <div class="radio-group"><div class="radio-opt active" id="size-4" onclick="selectSize(4)">4인</div><div class="radio-opt" id="size-8" onclick="selectSize(8)">8인</div></div>
  </div>
  <input type="hidden" id="party-edit-id"><input type="hidden" id="party-preset-id">
  <div class="modal-footer"><button class="btn btn-sec" onclick="closeModal('modal-party')">취소</button><button class="btn btn-gold" id="party-submit-btn" onclick="submitParty()">추가</button></div>
</div></div>

<!-- Schedule modal -->
<div class="overlay" id="modal-schedule"><div class="modal">
  <div class="modal-title" id="sch-modal-title">일정 추가</div>
  <div class="form-group"><label class="form-label">레이드 / 파티 선택</label>
    <select class="form-select" id="sch-party-select"></select>
  </div>
  <div class="form-group"><label class="form-label">요일</label><select class="form-select" id="sch-day-select"></select></div>
  <div class="form-group"><label class="form-label">시간</label><input class="form-input" id="sch-time" type="time"></div>

<script>
const{createClient}=supabase;
// ─── Viewer ───
function parseViewer(){try{const p=new URLSearchParams(location.search).get('viewer');return p?JSON.parse(atob(p)):null;}catch{return null;}}
const viewerCreds=parseViewer(),isViewer=!!viewerCreds;
if(isViewer)document.getElementById('viewer-banner').classList.add('show');
function getConfig(){if(isViewer)return viewerCreds;const u=localStorage.getItem('la_url'),k=localStorage.getItem('la_key');return u&&k?{url:u,key:k}:null;}
function applyViewer(){
  if(!isViewer)return;
  // 뷰어 모드: 파티 구성 탭 숨김 (일정만 표시)
  const partyTab=document.getElementById('tab-party');
  if(partyTab){partyTab.style.display='none';}
  // 숙제/코어 nav 비활성화
  ['nav-homework','nav-core'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.removeAttribute('href');el.style.opacity='.35';el.style.cursor='not-allowed';el.title='뷰어 모드에서는 접근할 수 없습니다';}
  });
  // 레이드 nav: viewer param 유지
  const navRaid=document.getElementById('nav-raid');
  if(navRaid){navRaid.href='raid.html?viewer='+btoa(JSON.stringify(viewerCreds));}
  document.querySelectorAll('.edit-only').forEach(el=>{el.style.display='none';if(el.tagName==='INPUT')el.readOnly=true;});
}

// ─── State ───
let sb,accounts=[],allChars=[],raids=[],parties=[],schedules=[],overrides={},notices={},raidTasksAll={};
let selPartyId=null,selGroupName=null,weekOffset=0,partySize=4,selPresetId=null;
let pickCtx={mode:'party',partyId:null,slotIndex:null,scheduleId:null};
let ovrEditSchId=null;
const WEEK_DAY_NUMS=[3,4,5,6,0,1,2];
const DKO=['일','월','화','수','목','금','토'];

// ─── Init ───
async function init(){
  const cfg=getConfig();if(!cfg){window.location.href='index.html';return;}
  sb=createClient(cfg.url,cfg.key);
  let raidTasksData=[];
  try{
    const[r1,r2,r3,r4,r5,r6,r7,r8,r9]=await Promise.all([
      sb.from('accounts').select('*').order('sort_order').order('created_at'),
      sb.from('characters').select('*').order('sort_order').order('created_at'),
      sb.from('raid_presets').select('*').order('sort_order').order('created_at'),
      sb.from('raid_parties').select('*').order('sort_order').order('created_at'),
      sb.from('raid_party_members').select('*'),
      sb.from('raid_schedules').select('*'),
      sb.from('raid_schedule_overrides').select('*'),
      sb.from('raid_notices').select('*'),
      sb.from('raid_tasks').select('*')
    ]);
    accounts=r1.data||[];allChars=r2.data||[];raids=r3.data||[];parties=r4.data||[];
    const members=r5.data||[];parties.forEach(p=>{p.members=members.filter(m=>m.party_id===p.id);});
    schedules=r6.data||[];
    (r7.data||[]).forEach(o=>{overrides[o.schedule_id+'_'+o.week_start_date]=o;});
    (r8.data||[]).forEach(n=>{notices[n.week_start_date]=n;});
    raidTasksData=r9.data||[];
    raidTasksData.forEach(t=>{if(!raidTasksAll[t.character_id])raidTasksAll[t.character_id]=[];raidTasksAll[t.character_id].push(t);});
  }catch(err){toast('❗ 로딩 오류: '+err.message);return;}
  await autoResetNonFixed();
  updateWeekLabel();renderPresetList();renderSchedule();loadNotice();
  applyViewer();
  // ★ 뷰어 모드: 주간 일정 탭을 기본으로 표시
  if(isViewer)switchTab('schedule');
}

// ─── Week helpers ───
function getWeekStart(off=0){const now=new Date(),kst=new Date(now.getTime()+9*3600000);let b=(kst.getUTCDay()-3+7)%7;if(b===0&&kst.getUTCHours()<6)b=7;const ws=new Date(kst);ws.setUTCDate(ws.getUTCDate()-b+off*7);ws.setUTCHours(6,0,0,0);return ws;}
function getWeekKey(off=0){const ws=getWeekStart(off);return`${ws.getUTCFullYear()}-${String(ws.getUTCMonth()+1).padStart(2,'0')}-${String(ws.getUTCDate()).padStart(2,'0')}`;}
function getWeekDays(off=0){const s=getWeekStart(off);return WEEK_DAY_NUMS.map((_,i)=>{const d=new Date(s);d.setUTCDate(d.getUTCDate()+i);return d;});}
function updateWeekLabel(){const d=getWeekDays(weekOffset),f=x=>`${x.getUTCMonth()+1}/${x.getUTCDate()}`,l=`${f(d[0])} (수) ~ ${f(d[6])} (화)`;document.getElementById('week-label').textContent=l;document.getElementById('header-week').textContent=l;}
function moveWeek(n){weekOffset+=n;updateWeekLabel();renderSchedule();loadNotice();}
function goToCurrentWeek(){weekOffset=0;updateWeekLabel();renderSchedule();loadNotice();}
async function autoResetNonFixed(){const ws=getWeekStart(0),del=schedules.filter(s=>!s.is_fixed&&new Date(s.created_at)<new Date(ws.getTime()-7*86400000));if(!del.length)return;await sb.from('raid_schedules').delete().in('id',del.map(s=>s.id));schedules=schedules.filter(s=>!del.some(d=>d.id===s.id));}

// ─── Raid DnD ───
const _rd={type:null,src:null};
function rdStart(e,type,idx){
  if(isViewer){e.preventDefault();return;} // ★ 뷰어 모드: DnD 완전 차단
  e.stopPropagation();
  _rd.type=type;_rd.src=idx;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text','');setTimeout(()=>e.target.classList.add('r-drag'),0);
}
function rdEnd(e){e.target.classList.remove('r-drag');document.querySelectorAll('.r-dnd-v,.r-dnd-h').forEach(x=>x.classList.remove('r-dnd-v','r-dnd-h'));}
function rdOver(e,type,horiz){e.preventDefault();e.stopPropagation();if(_rd.type!==type)return;const cls=horiz?'r-dnd-h':'r-dnd-v';document.querySelectorAll('.'+cls).forEach(x=>x.classList.remove(cls));e.currentTarget.classList.add(cls);}
function rdLeave(e,horiz){e.currentTarget.classList.remove(horiz?'r-dnd-h':'r-dnd-v');}
function rdClean(){document.querySelectorAll('.r-drag,.r-dnd-v,.r-dnd-h').forEach(x=>x.classList.remove('r-drag','r-dnd-v','r-dnd-h'));}

function getAllGroupNames(){
  const dbNames=[...new Set(raids.map(r=>r.name))];
  const extras=JSON.parse(localStorage.getItem('la_raid_groups')||'[]').filter(n=>!dbNames.includes(n));
  const all=[...dbNames,...extras];
  const saved=JSON.parse(localStorage.getItem('la_raid_group_order')||'[]');
  if(!saved.length)return all;
  return[...saved.filter(n=>all.includes(n)),...all.filter(n=>!saved.includes(n))];
}
function getDaySchs(dn,wsMs,weMs){
  return schedules.filter(s=>{
    if(s.day_of_week!==dn)return false;
    if(s.is_fixed)return true;
    const t=new Date(s.created_at).getTime();return t>=wsMs&&t<weMs;
  }).sort((a,b)=>(a.sort_order??0)-(b.sort_order??0));
}
async function rdDropGroup(e,destIdx){
  e.preventDefault();e.stopPropagation();rdClean();
  if(_rd.type!=='group'||_rd.src===destIdx){_rd.type=null;return;}
  const src=_rd.src;_rd.type=null;
  const names=getAllGroupNames();const[m]=names.splice(src,1);names.splice(destIdx,0,m);
  localStorage.setItem('la_raid_group_order',JSON.stringify(names));renderPresetList();
}
async function rdDropDiff(e,gname,destIdx){
  e.preventDefault();e.stopPropagation();rdClean();
  const t='diff_'+gname;if(_rd.type!==t||_rd.src===destIdx){_rd.type=null;return;}
  const src=_rd.src;_rd.type=null;
  const list=raids.filter(r=>r.name===gname).sort((a,b)=>a.sort_order-b.sort_order);
  const[m]=list.splice(src,1);list.splice(destIdx,0,m);list.forEach((r,i)=>{r.sort_order=i;});
  renderPresetList();
  Promise.all(list.map((r,i)=>sb.from('raid_presets').update({sort_order:i}).eq('id',r.id)));
}
async function rdDropParty(e,presetId,destIdx){
  e.preventDefault();e.stopPropagation();rdClean();
  const t='party_'+presetId;if(_rd.type!==t||_rd.src===destIdx){_rd.type=null;return;}
  const src=_rd.src;_rd.type=null;
  const list=parties.filter(p=>p.preset_id===presetId).sort((a,b)=>a.sort_order-b.sort_order);
  const[m]=list.splice(src,1);list.splice(destIdx,0,m);list.forEach((p,i)=>{p.sort_order=i;});
  renderPresetList();
  Promise.all(list.map((p,i)=>sb.from('raid_parties').update({sort_order:i}).eq('id',p.id)));
}
async function rdDropSch(e,dn,destIdx){
  e.preventDefault();e.stopPropagation();rdClean();
  const t='sch_'+dn;if(_rd.type!==t||_rd.src===destIdx){_rd.type=null;return;}
  const src=_rd.src;_rd.type=null;
  const wsMs=getWeekStart(weekOffset).getTime()-9*3600000,weMs=wsMs+7*24*3600000;
  const list=getDaySchs(dn,wsMs,weMs);
  const[m]=list.splice(src,1);list.splice(destIdx,0,m);list.forEach((s,i)=>{s.sort_order=i;});
  renderSchedule();
  Promise.all(list.map((s,i)=>sb.from('raid_schedules').update({sort_order:i}).eq('id',s.id)));
}

// ─── Preset / Party list ───
function renderPresetList(){
  const el=document.getElementById('preset-list');
  const allNames=getAllGroupNames();
  if(!allNames.length){el.innerHTML='<div style="text-align:center;padding:20px;font-size:.82rem;color:var(--muted);">레이드를 추가하세요</div>';return;}
  el.innerHTML=allNames.map((gname,gi)=>{
    const gPresets=raids.filter(r=>r.name===gname).sort((a,b)=>a.sort_order-b.sort_order);
    const isGOpen=selGroupName===gname||gPresets.some(r=>selPresetId===r.id||parties.find(p=>p.preset_id===r.id&&p.id===selPartyId));
    return`<div class="preset-card"
      draggable="${!isViewer}"
      ondragstart="rdStart(event,'group',${gi})"
      ondragend="rdEnd(event)"
      ondragover="rdOver(event,'group',false)"
      ondragleave="rdLeave(event,false)"
      ondrop="rdDropGroup(event,${gi})">
      <div class="preset-header" onclick="toggleGroup('${esc(gname)}')">
        ${!isViewer?`<span class="rdnd-handle" onclick="event.stopPropagation()">⠿</span>`:''}
        <span class="preset-toggle">${isGOpen?'▼':'▶'}</span>
        <div class="preset-name" style="flex:1;">${esc(gname)}</div>
        <div class="preset-actions">
          ${!isViewer?`<button class="btn btn-icon edit-only" style="font-size:.7rem;padding:3px 7px;" onclick="event.stopPropagation();openAddDifficulty('${esc(gname)}')">+난이도</button>
          <button class="btn btn-icon edit-only" onclick="event.stopPropagation();openEditRaidGroup('${esc(gname)}')">✏️</button>
          <button class="btn-danger btn-icon" style="padding:3px 5px;font-size:.74rem;" onclick="event.stopPropagation();deleteGroup('${esc(gname)}')">🗑</button>`:''}
        </div>
      </div>
      ${isGOpen?`<div style="padding:6px 10px 8px;">
        ${gPresets.length===0?'<div style="font-size:.78rem;color:var(--muted);padding:3px 0 6px;">난이도를 추가하세요</div>':''}
        ${gPresets.map((r,di)=>{
          const rParties=parties.filter(p=>p.preset_id===r.id).sort((a,b)=>a.sort_order-b.sort_order);
          const isPOpen=selPresetId===r.id||rParties.some(p=>p.id===selPartyId);
          const cg=Number(r.clear_gold)||0,bg=Number(r.bound_gold)||0,bo=Number(r.bonus_gold)||0,tr=cg-bg;
          const diffType='diff_'+gname;
          return`<div style="margin-bottom:6px;background:var(--s1);border:1px solid ${isPOpen?'rgba(200,168,75,.3)':'var(--border)'};border-radius:5px;overflow:hidden;"
            draggable="${!isViewer}"
            ondragstart="rdStart(event,'${diffType}',${di})"
            ondragend="rdEnd(event)"
            ondragover="rdOver(event,'${diffType}',false)"
            ondragleave="rdLeave(event,false)"
            ondrop="rdDropDiff(event,'${esc(gname)}',${di})">
            <div style="padding:7px 10px;display:flex;align-items:center;gap:6px;cursor:pointer;" onclick="togglePreset('${r.id}')">
              ${!isViewer?`<span class="rdnd-handle" onclick="event.stopPropagation()">⠿</span>`:''}
              <span style="font-size:.66rem;color:var(--muted);width:10px;">${isPOpen?'▼':'▶'}</span>
              <div style="flex:1;min-width:0;">
                <div style="font-size:.83rem;font-weight:600;color:var(--text);">${esc(r.difficulty||'기본')}</div>
                <div style="font-size:.67rem;color:var(--muted);margin-top:1px;">
                  ${r.entry_level?`입장 ${r.entry_level} `:''}
                  ${cg?`💰 유통 ${tr.toLocaleString()}G `:''}
                  ${bg?`귀속 ${bg.toLocaleString()}G `:''}
                  ${bo?`더보기 ${bo.toLocaleString()}G`:''}
                </div>
              </div>
              ${!isViewer?`<button class="btn btn-icon edit-only" onclick="event.stopPropagation();openEditDifficulty('${r.id}')">✏️</button>
              <button class="btn-danger btn-icon" style="padding:3px 5px;font-size:.72rem;" onclick="event.stopPropagation();deletePreset('${r.id}')">🗑</button>`:''}
            </div>
            ${isPOpen?`<div style="padding:4px 10px 8px;border-top:1px solid var(--border);">
              ${rParties.map((p,pi)=>{
                const filled=p.members.filter(m=>m.character_id).length;
                const partyType='party_'+r.id;
                return`<div class="party-mini ${p.id===selPartyId?'selected':''}"
                  draggable="${!isViewer}"
                  ondragstart="rdStart(event,'${partyType}',${pi})"
                  ondragend="rdEnd(event)"
                  ondragover="rdOver(event,'${partyType}',false)"
                  ondragleave="rdLeave(event,false)"
                  ondrop="rdDropParty(event,'${r.id}',${pi})"
                  onclick="selectParty('${p.id}')">
                  ${!isViewer?`<span class="rdnd-handle" onclick="event.stopPropagation()">⠿</span>`:''}
                  <div style="flex:1;min-width:0;"><div class="party-mini-name">${esc(p.name||'파티')}</div><div class="party-mini-fill">${p.party_size}인 · ${filled}/${p.party_size}명</div></div>
                  ${!isViewer?`<button class="btn btn-icon edit-only" onclick="event.stopPropagation();openEditParty('${p.id}')">✏️</button>
                  <button class="btn-danger btn-icon" style="padding:3px 5px;font-size:.72rem;" onclick="event.stopPropagation();deleteParty('${p.id}')">🗑</button>`:''}
                </div>`;
              }).join('')}
              ${!isViewer?`<button class="btn-outline edit-only" style="font-size:.74rem;padding:5px;margin-top:3px;" onclick="openAddParty('${r.id}')">＋ 파티 추가</button>`:''}
            </div>`:''}
          </div>`;
        }).join('')}
      </div>`:''}
    </div>`;
  }).join('');
  applyViewer();
}
function toggleGroup(name){
  // isGOpen과 동일한 로직으로 "실제로 열려있는지" 판단
  const gPresets=raids.filter(r=>r.name===name);
  const alreadyOpen=selGroupName===name||gPresets.some(r=>selPresetId===r.id||parties.find(p=>p.preset_id===r.id&&p.id===selPartyId));
  selGroupName=alreadyOpen?null:name;
  selPresetId=null;
  if(alreadyOpen){
    selPartyId=null;
    document.getElementById('party-detail').innerHTML='<div class="empty-state"><div class="empty-icon">🗡️</div><div>왼쪽에서 파티를 선택하세요</div></div>';
  }
  renderPresetList();
}
function togglePreset(id){selPresetId=selPresetId===id?null:id;renderPresetList();}
function selectParty(id){selPartyId=id;renderPresetList();renderPartyDetail();}

function getMembersForParty(p){const r=[];for(let i=0;i<p.party_size;i++){const m=p.members.find(x=>x.slot_index===i);r.push(m||{slot_index:i,character_id:null,id:null});}return r;}

async function renderPartyDetail(){

      ${slots.map((slot,i)=>{
        const ch=allChars.find(c=>c.id===slot.character_id);

          <span class="slot-num">${i+1}</span>
          <div style="flex:1;min-width:0;"><div class="slot-char">${esc(ch.name)}</div><div class="slot-class">${esc(ch.class_name||'')}${ch.item_level?' Lv.'+ch.item_level:''}</div></div>
          <button class="slot-remove edit-only" onclick="event.stopPropagation();removePartyMember('${p.id}',${i},'${slot.id||''}')">✕</button>

// ─── Char picker (account-grouped, entry level filtered) ───
function openCharPickerParty(partyId,slotIndex){
  pickCtx={mode:'party',partyId,slotIndex,scheduleId:null};
  const p=parties.find(x=>x.id===partyId),preset=p?raids.find(x=>x.id===p.preset_id):null;
  const minIlvl=Number(preset?.entry_level)||0;
  document.getElementById('char-pick-info').textContent=`슬롯 ${slotIndex+1} — 캐릭터 배치${minIlvl?` (입장 ${minIlvl} 이상)`:'' }`;
  buildCharPickGrid(minIlvl);openModal('modal-char-pick');
}
function openCharPickerOverride(schId,slotIndex){
  pickCtx={mode:'override',partyId:null,slotIndex,scheduleId:schId};
  document.getElementById('char-pick-info').textContent=`슬롯 ${slotIndex+1} — 이번 주 임시 변경`;
  buildCharPickGrid(0);openModal('modal-char-pick');
}
function buildCharPickGrid(minIlvl=0){
  const el=document.getElementById('char-pick-grid');
  let html=`<div class="char-pick-item no-char" onclick="assignChar(null)">✕ 비우기</div>`;
  accounts.forEach(acc=>{
    // 입장 레벨 조건 만족 캐릭터만
    const chars=allChars.filter(c=>c.account_id===acc.id&&(!minIlvl||Number(c.item_level||0)>=minIlvl));
    if(!chars.length)return;
    html+=`<div class="acc-group-header">${esc(acc.name)}</div>`;
    chars.forEach(c=>{
      html+=`<div class="char-pick-item" onclick="assignChar('${c.id}')">
        <div class="char-pick-name">${esc(c.name)}</div>
        <div class="char-pick-meta">${esc(c.class_name||'')}${c.item_level?' · Lv.'+c.item_level:''}</div>
      </div>`;
    });
  });
  // 계정 없는 캐릭터
  const noAccChars=allChars.filter(c=>!accounts.some(a=>a.id===c.account_id)&&(!minIlvl||Number(c.item_level||0)>=minIlvl));
  if(noAccChars.length){html+=`<div class="acc-group-header">기타</div>`;noAccChars.forEach(c=>{html+=`<div class="char-pick-item" onclick="assignChar('${c.id}')"><div class="char-pick-name">${esc(c.name)}</div><div class="char-pick-meta">${esc(c.class_name||'')}${c.item_level?' · Lv.'+c.item_level:''}</div></div>`;});}
  el.innerHTML=html;
}
async function assignChar(charId){
  if(pickCtx.mode==='override'){await assignOverrideChar(charId);return;}
  const{partyId,slotIndex}=pickCtx;const p=parties.find(x=>x.id===partyId);if(!p)return;
  const ex=p.members.find(m=>m.slot_index===slotIndex);
  if(charId===null){if(ex){await sb.from('raid_party_members').delete().eq('id',ex.id);p.members=p.members.filter(m=>m.slot_index!==slotIndex);}}
  else if(ex){await sb.from('raid_party_members').update({character_id:charId}).eq('id',ex.id);ex.character_id=charId;}
  else{const{data}=await sb.from('raid_party_members').insert({party_id:partyId,slot_index:slotIndex,character_id:charId}).select().single();if(data)p.members.push(data);}
  // ★ Sync raid_task on homework side
  if(charId)await syncRaidTask(charId,partyId);
  closeModal('modal-char-pick');renderPresetList();renderPartyDetail();toast('✅ 배치됨');
}

// ★ 레이드 숙제 연동: 캐릭터가 파티에 들어갈 때 raid_tasks 생성/연동
async function syncRaidTask(charId,partyId){
  const p=parties.find(x=>x.id===partyId),preset=p?raids.find(x=>x.id===p.preset_id):null;
  if(!preset||!charId)return;
  // 같은 preset_id로 이미 있는지 확인
  const{data:byPreset}=await sb.from('raid_tasks').select('*').eq('character_id',charId).eq('preset_id',preset.id);
  if(byPreset&&byPreset.length>0)return; // 이미 연동됨
  // 이름으로 기존 숙제 찾기 (대소문자 무관)
  const{data:allTasks}=await sb.from('raid_tasks').select('*').eq('character_id',charId);
  const presetNameLower=preset.name.toLowerCase();
  const existing=(allTasks||[]).find(t=>t.name&&t.name.toLowerCase().includes(presetNameLower));
  if(existing){
    // 기존 숙제에 preset_id 연동
    await sb.from('raid_tasks').update({preset_id:preset.id}).eq('id',existing.id);
    toast(`🔗 기존 레이드 숙제와 연동됨`);
  } else {
    // 새 숙제 생성
    const taskName=preset.name+(preset.difficulty?' '+preset.difficulty:'');
    const{error}=await sb.from('raid_tasks').insert({character_id:charId,preset_id:preset.id,name:taskName,difficulty:preset.difficulty||'',entry_level:preset.entry_level||0,clear_gold:preset.clear_gold||0,bound_gold:preset.bound_gold||0,reset_day:3,sort_order:99});
    if(!error)toast(`✅ 레이드 숙제 자동 추가됨`);
  }
}
async function removePartyMember(partyId,slotIndex,memberId){
  const p=parties.find(x=>x.id===partyId);if(!p)return;
  const m=memberId?p.members.find(x=>x.id===memberId):p.members.find(x=>x.slot_index===slotIndex);
  const charId=m?.character_id;
  const preset=raids.find(x=>x.id===p.preset_id);
  if(m)await sb.from('raid_party_members').delete().eq('id',m.id);
  p.members=p.members.filter(x=>x.slot_index!==slotIndex);
  // 연동된 레이드 숙제 삭제 여부 묻기
  if(charId&&preset){
    const{data:linked}=await sb.from('raid_tasks').select('id,name').eq('character_id',charId).eq('preset_id',preset.id);
    if(linked?.length){
      if(confirm(`"${linked[0].name}" 레이드 숙제도 함께 삭제하시겠습니까?\n(취소하면 숙제는 유지됩니다)`)){
        await sb.from('raid_tasks').delete().in('id',linked.map(t=>t.id));
        toast('🗑️ 연동 레이드 숙제 삭제됨');
      } else {
        // 연동만 해제
        await sb.from('raid_tasks').update({preset_id:null}).in('id',linked.map(t=>t.id));
        toast('🔗 연동 해제됨 (숙제는 유지)');
      }
    }
  }
  renderPresetList();renderPartyDetail();
}

function openEditRaidGroup(groupName){
  document.getElementById('raid-name-modal-title').textContent='레이드 이름 수정';
  document.getElementById('rn-submit-btn').textContent='저장';
  document.getElementById('rn-name').value=groupName;document.getElementById('rn-old-name').value=groupName;
  openModal('modal-raid-name');
}
async function submitRaidName(){
  const name=document.getElementById('rn-name').value.trim();if(!name){toast('❗ 이름 입력');return;}
  const oldName=document.getElementById('rn-old-name').value;
  if(oldName){
    // 수정: 해당 이름의 모든 presets 이름 변경
    await sb.from('raid_presets').update({name}).eq('name',oldName);
    raids.filter(r=>r.name===oldName).forEach(r=>{r.name=name;});
    // localStorage 그룹 이름도 업데이트
    const extras=JSON.parse(localStorage.getItem('la_raid_groups')||'[]');
    const idx=extras.indexOf(oldName);if(idx>=0)extras[idx]=name;localStorage.setItem('la_raid_groups',JSON.stringify(extras));
    if(selGroupName===oldName)selGroupName=name;
    toast('✅ 이름 변경됨');
  } else {
    // 추가: localStorage에만 저장 (프리셋 없는 빈 그룹)
    const extras=JSON.parse(localStorage.getItem('la_raid_groups')||'[]');
    if(!extras.includes(name)&&!raids.some(r=>r.name===name))extras.push(name);
    localStorage.setItem('la_raid_groups',JSON.stringify(extras));
    selGroupName=name;toast('✅ 레이드 추가됨');
  }
  closeModal('modal-raid-name');renderPresetList();
}
async function deleteGroup(groupName){
  if(!confirm(`"${groupName}" 레이드와 모든 난이도/파티/일정을 삭제합니다. 계속?`))return;
  const gPresets=raids.filter(r=>r.name===groupName);
  for(const r of gPresets)await sb.from('raid_presets').delete().eq('id',r.id);
  parties=parties.filter(p=>!gPresets.some(r=>r.id===p.preset_id));
  schedules=schedules.filter(s=>!parties.some(p=>p.id===s.party_id));
  raids=raids.filter(r=>r.name!==groupName);
  // localStorage extras도 제거
  const extras=JSON.parse(localStorage.getItem('la_raid_groups')||'[]').filter(n=>n!==groupName);
  localStorage.setItem('la_raid_groups',JSON.stringify(extras));
  if(selGroupName===groupName)selGroupName=null;
  selPresetId=null;selPartyId=null;
  document.getElementById('party-detail').innerHTML='<div class="empty-state"><div class="empty-icon">🗡️</div><div>왼쪽에서 파티를 선택하세요</div></div>';
  renderPresetList();renderSchedule();toast('🗑️ 삭제됨');
}

function renderSchedule(){

  populateDaySelect();populatePartySelect('');

  el.innerHTML=days.map((date,i)=>{
    const dn=WEEK_DAY_NUMS[i],isToday=dn===todayKST&&weekOffset===0;

    return`<div class="day-row ${isToday?'today-row':''}">

        ${isToday?'<div class="day-label-today-badge">오늘</div>':''}
      </div>
      <div class="day-parties-scroll">
        ${daySchs.map((s,si)=>`<div
          draggable="${!isViewer}"
          ondragstart="rdStart(event,'${schType}',${si})"
          ondragend="rdEnd(event)"
          ondragover="rdOver(event,'${schType}',true)"
          ondragleave="rdLeave(event,true)"

function getEffectiveMembers(schId,partyId,wk){
  const p=parties.find(x=>x.id===partyId);if(!p)return[];
  const ovr=overrides[schId+'_'+wk];
  const slots=getMembersForParty(p);
  return slots.map((slot,i)=>{
    if(ovr&&String(i) in (ovr.slot_overrides||{})){const cid=ovr.slot_overrides[String(i)];return{...slot,character_id:cid,isOvr:cid!==slot.character_id};}
    return{...slot,isOvr:false};
  });
}

function schedCardHTML(s,wk){
  const p=parties.find(x=>x.id===s.party_id),preset=p?raids.find(x=>x.id===p.preset_id):null;
  const ovr=overrides[s.id+'_'+wk];
  const isCompleted=!!(ovr?.is_completed);
  const hasOvr=ovr&&Object.keys(ovr.slot_overrides||{}).length>0;
  const eff=getEffectiveMembers(s.id,s.party_id,wk);
  return`<div class="sched-card ${isCompleted?'completed':''} ${hasOvr?'has-ovr':''}" id="sc-${s.id}">
    <div class="sc-header">
      <div class="sc-raid-name">${esc(preset?.name||'?')} <span style="font-size:.65rem;color:var(--muted);font-weight:400;">${esc(preset?.difficulty||'')}</span></div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:2px;">
        <span class="sc-party-name">${esc(p?.name||'?')} · ${p?.party_size||'?'}인</span>
        ${s.time_str?`<span style="font-size:.72rem;font-weight:700;color:var(--gold-bright);background:rgba(200,168,75,.12);padding:1px 6px;border-radius:4px;border:1px solid rgba(200,168,75,.3);">🕐 ${s.time_str}</span>`:''}
        ${s.is_fixed?'<span style="font-size:.62rem;color:var(--gold);">📌</span>':''}
        ${hasOvr?'<span style="font-size:.62rem;color:var(--gold);">편집</span>':''}
      </div>
    </div>
    <div class="sc-members">
      ${eff.map(slot=>{
        const ch=allChars.find(c=>c.id===slot.character_id);
        if(ch)return`<div class="sc-member ${slot.isOvr?'temp':''}"><span class="sc-member-name">${esc(ch.name)}</span><span class="sc-member-class">${esc(ch.class_name||'')}</span></div>`;
        return`<div class="sc-empty-slot">—</div>`;
      }).join('')}
    </div>
    <div class="sc-footer">
      <button class="sc-complete-btn ${isViewer?'viewer-disabled':''}" onclick="${isViewer?'':` toggleCompletion('${s.id}','${wk}')`}">${isCompleted?'✓ 완료':'○ 완료'}</button>
      ${!isViewer?`<button class="sc-edit-btn edit-only" onclick="openSchEdit('${s.id}','${wk}')">✏️</button>`:''}
    </div>
  </div>`;
}

// ─── Schedule completion ───
function toggleCompletion(schId,wk){
  const ovrKey=schId+'_'+wk;
  if(!overrides[ovrKey])overrides[ovrKey]={id:null,slot_overrides:{}};
  const ovr=overrides[ovrKey];
  const nowDone=!ovr.is_completed;
  ovr.is_completed=nowDone;
  const ts=nowDone?new Date().toISOString():null;
  ovr.completed_at=ts;
  // DOM update immediately - update just this card
  const cardEl=document.getElementById('sc-'+schId);
  if(cardEl){
    cardEl.classList.toggle('completed',nowDone);
    const btn=cardEl.querySelector('.sc-complete-btn');
    if(btn)btn.textContent=nowDone?'✓ 완료':'○ 완료';
  }
  toast(nowDone?'✅ 완료 처리됨':'↩ 완료 취소됨');
  // Fire-and-forget DB save
  (async()=>{
    if(ovr.id){sb.from('raid_schedule_overrides').update({is_completed:nowDone,completed_at:ts}).eq('id',ovr.id);}
    else{const{data}=await sb.from('raid_schedule_overrides').insert({schedule_id:schId,week_start_date:wk,slot_overrides:{},is_completed:nowDone,completed_at:ts}).select().single();if(data)ovr.id=data.id;}
    // Sync raid_tasks in background
    const s=schedules.find(x=>x.id===schId);
    if(s){
      const p=parties.find(x=>x.id===s.party_id),preset=p?raids.find(x=>x.id===p.preset_id):null;
      if(preset){
        const eff=getEffectiveMembers(schId,s.party_id,wk);
        const charIds=eff.filter(sl=>sl.character_id).map(sl=>sl.character_id);
        if(charIds.length){
          const{data:tasks}=await sb.from('raid_tasks').select('id').in('character_id',charIds).eq('preset_id',preset.id);
          if(tasks?.length)sb.from('raid_tasks').update({is_completed:nowDone,last_completed_at:ts}).in('id',tasks.map(t=>t.id));
        }
      }
    }
  })();
}

// ─── Schedule edit (override modal) ───
async function openSchEdit(schId,wk){
  ovrEditSchId=schId;
  const s=schedules.find(x=>x.id===schId),p=s?parties.find(x=>x.id===s.party_id):null,preset=p?raids.find(x=>x.id===p.preset_id):null;
  if(!s||!p){toast('❗ 데이터 오류');return;}
  const ovr=overrides[schId+'_'+wk];
  const hasOvr=ovr&&Object.keys(ovr.slot_overrides||{}).length>0;
  document.getElementById('ovr-modal-title').textContent=`${esc(preset?.name||'?')} — ${esc(p.name||'파티')} 편집`;
  document.getElementById('ovr-reset-btn').style.display=hasOvr?'flex':'none';
  const eff=getEffectiveMembers(schId,s.party_id,wk);
  const gc=p.party_size===8?'slots-grid s8':'slots-grid';
  document.getElementById('ovr-slot-section').innerHTML=`
    <p style="font-size:.74rem;color:var(--muted);margin-bottom:10px;">슬롯을 클릭하면 이번 주에만 임시 변경됩니다. 원본 파티는 바뀌지 않습니다.</p>
    <div class="${gc}">
      ${eff.map((slot,i)=>{
        const ch=allChars.find(c=>c.id===slot.character_id);
        if(ch)return`<div class="slot filled clickable" onclick="openCharPickerOverride('${schId}',${i})">
          <span class="slot-num">${i+1}</span>
          <div style="flex:1;min-width:0;"><div class="slot-char">${esc(ch.name)}${slot.isOvr?'<span style="font-size:.58rem;color:var(--gold);margin-left:4px;padding:0 3px;border:1px solid rgba(200,168,75,.4);border-radius:2px;">임시</span>':''}</div><div class="slot-class">${esc(ch.class_name||'')}${ch.item_level?' Lv.'+ch.item_level:''}</div></div>
          <button class="slot-remove" onclick="event.stopPropagation();overrideSlot('${schId}',${i},null,'${wk}')">✕</button>
        </div>`;
        return`<div class="slot clickable" onclick="openCharPickerOverride('${schId}',${i})">
          <span class="slot-num">${i+1}</span><span class="slot-empty">${slot.isOvr?'비움 (임시)':'＋ 임시 배치'}</span>
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;gap:8px;">
      <button class="btn btn-sec btn-sm" onclick="openEditScheduleById('${schId}')">⚙️ 일정 설정 수정</button>
      <button class="btn btn-danger btn-sm" onclick="deleteScheduleFromOvrModal('${schId}')">🗑 일정 삭제</button>
    </div>`;
  openModal('modal-sch-edit');
}
async function assignOverrideChar(charId){
  const s=schedules.find(x=>x.id===pickCtx.scheduleId);if(!s)return;
  const wk=getWeekKey(weekOffset);
  await overrideSlot(pickCtx.scheduleId,pickCtx.slotIndex,charId,wk);
  closeModal('modal-char-pick');
  // Refresh the edit modal
  await openSchEdit(pickCtx.scheduleId,wk);
}
async function overrideSlot(schId,slotIndex,charId,wk){
  const ovrKey=schId+'_'+wk;
  if(!overrides[ovrKey])overrides[ovrKey]={id:null,slot_overrides:{}};
  const ovr=overrides[ovrKey];
  if(charId===null)delete ovr.slot_overrides[String(slotIndex)];else ovr.slot_overrides[String(slotIndex)]=charId;
  scheduleRenderSchedule();toast('✅ 임시 변경됨');
  // Fire-and-forget
  if(ovr.id){sb.from('raid_schedule_overrides').update({slot_overrides:ovr.slot_overrides}).eq('id',ovr.id);}
  else{const{data}=await sb.from('raid_schedule_overrides').insert({schedule_id:schId,week_start_date:wk,slot_overrides:ovr.slot_overrides,is_completed:false}).select().single();if(data)ovr.id=data.id;}
}
async function resetOverrides(){
  const wk=getWeekKey(weekOffset),ovrKey=ovrEditSchId+'_'+wk,ovr=overrides[ovrKey];
  if(ovr?.id){await sb.from('raid_schedule_overrides').update({slot_overrides:{}}).eq('id',ovr.id);ovr.slot_overrides={};}
  else delete overrides[ovrKey];
  closeModal('modal-sch-edit');renderSchedule();toast('↩ 원본으로 초기화됨');
}

// ─── Schedule CRUD ───
function openAddSchForParty(partyId){resetSchModal();document.getElementById('sch-modal-title').textContent='일정 추가';document.getElementById('sch-submit-btn').textContent='추가';populatePartySelect(partyId);document.getElementById('sch-day-select').value=String(new Date(Date.now()+9*3600000).getUTCDay());openModal('modal-schedule');}
function openAddSchForDay(dn){resetSchModal();document.getElementById('sch-modal-title').textContent='일정 추가';document.getElementById('sch-submit-btn').textContent='추가';populatePartySelect('');document.getElementById('sch-day-select').value=String(dn);openModal('modal-schedule');}
function openEditScheduleById(id){const s=schedules.find(x=>x.id===id);if(!s)return;resetSchModal();document.getElementById('sch-modal-title').textContent='일정 수정';document.getElementById('sch-submit-btn').textContent='저장';document.getElementById('sch-delete-btn').style.display='flex';document.getElementById('sch-edit-id').value=id;document.getElementById('sch-fixed').checked=s.is_fixed;document.getElementById('sch-time').value=s.time_str||'';populatePartySelect(s.party_id);document.getElementById('sch-day-select').value=String(s.day_of_week);closeModal('modal-sch-edit');openModal('modal-schedule');}
function resetSchModal(){document.getElementById('sch-delete-btn').style.display='none';document.getElementById('sch-edit-id').value='';document.getElementById('sch-fixed').checked=false;document.getElementById('sch-time').value='';}
function toggleFixed(){const cb=document.getElementById('sch-fixed');cb.checked=!cb.checked;}
function populatePartySelect(selId=''){document.getElementById('sch-party-select').innerHTML=raids.map(r=>`<optgroup label="${esc(r.name)}">${parties.filter(p=>p.preset_id===r.id).map(p=>`<option value="${p.id}" ${p.id===selId?'selected':''}>${esc(p.name||'파티')} (${p.party_size}인)</option>`).join('')}</optgroup>`).join('');}
function populateDaySelect(){document.getElementById('sch-day-select').innerHTML=WEEK_DAY_NUMS.map(n=>`<option value="${n}">${DKO[n]}요일</option>`).join('');}
async function submitSchedule(){
  const partyId=document.getElementById('sch-party-select').value,dayOfWeek=parseInt(document.getElementById('sch-day-select').value),timeStr=document.getElementById('sch-time').value,isFixed=document.getElementById('sch-fixed').checked,editId=document.getElementById('sch-edit-id').value;
  if(!partyId){toast('❗ 파티를 선택하세요');return;}
  if(editId){const{error}=await sb.from('raid_schedules').update({party_id:partyId,day_of_week:dayOfWeek,time_str:timeStr,is_fixed:isFixed}).eq('id',editId);if(error){toast('❗ '+error.message);return;}const s=schedules.find(x=>x.id===editId);if(s)Object.assign(s,{party_id:partyId,day_of_week:dayOfWeek,time_str:timeStr,is_fixed:isFixed});toast('✅ 수정됨');}
  else{const{data,error}=await sb.from('raid_schedules').insert({party_id:partyId,day_of_week:dayOfWeek,time_str:timeStr,is_fixed:isFixed}).select().single();if(error){toast('❗ '+error.message);return;}schedules.push(data);toast('✅ 일정 추가됨');}
  closeModal('modal-schedule');renderSchedule();
}
async function deleteScheduleFromModal(){const id=document.getElementById('sch-edit-id').value;if(!id||!confirm('일정을 삭제하시겠습니까?'))return;await sb.from('raid_schedules').delete().eq('id',id);schedules=schedules.filter(s=>s.id!==id);closeModal('modal-schedule');renderSchedule();toast('🗑️ 삭제됨');}
async function deleteScheduleFromOvrModal(id){if(!confirm('일정을 삭제하시겠습니까?'))return;await sb.from('raid_schedules').delete().eq('id',id);schedules=schedules.filter(s=>s.id!==id);closeModal('modal-sch-edit');renderSchedule();toast('🗑️ 삭제됨');}

// ─── Notice ───
async function loadNotice(){
  const wk=getWeekKey(weekOffset),n=notices[wk];
  const inp=document.getElementById('notice-input');
  if(inp)inp.value=n?.content||'';
  const lbl=document.getElementById('notice-week-label');
  if(lbl){const days=getWeekDays(weekOffset);const f=d=>`${d.getUTCMonth()+1}/${d.getUTCDate()}`;lbl.textContent=weekOffset===0?'이번 주 공지':`${f(days[0])}(수) ~ ${f(days[6])}(화) 공지`;}
  document.getElementById('notice-hint').textContent='';
}
async function saveNotice(){
  const wk=getWeekKey(weekOffset),content=document.getElementById('notice-input').value;
  const n=notices[wk];
  if(n?.id){await sb.from('raid_notices').update({content,updated_at:new Date().toISOString()}).eq('id',n.id);n.content=content;}
  else if(content.trim()){const{data}=await sb.from('raid_notices').insert({week_start_date:wk,content}).select().single();if(data)notices[wk]=data;}
  const hint=document.getElementById('notice-hint');if(hint){hint.textContent='저장됨';setTimeout(()=>{const h=document.getElementById('notice-hint');if(h)h.textContent='';},1500);}
}
function openAdvanceNotice(){
  const sel=document.getElementById('advance-week-select');
  sel.innerHTML='';
  for(let i=0;i<=8;i++){
    const days=getWeekDays(i),f=d=>`${d.getUTCMonth()+1}/${d.getUTCDate()}`,wk=getWeekKey(i);
    const label=i===0?`이번 주 (${f(days[0])}~${f(days[6])})`:i===1?`다음 주 (${f(days[0])}~${f(days[6])})`:`${i}주 후 (${f(days[0])}~${f(days[6])})`;
    const opt=document.createElement('option');opt.value=i;opt.textContent=label;
    if(notices[wk]?.content)opt.textContent+=' 📌';
    sel.appendChild(opt);
  }
  sel.value='0';
  // 현재 주 내용 불러오기
  loadAdvanceNoticeContent();
  sel.onchange=loadAdvanceNoticeContent;
  openModal('modal-advance-notice');
}
function loadAdvanceNoticeContent(){
  const off=parseInt(document.getElementById('advance-week-select').value);
  const wk=getWeekKey(off);
  document.getElementById('advance-notice-content').value=notices[wk]?.content||'';
}
async function saveAdvanceNotice(){
  const off=parseInt(document.getElementById('advance-week-select').value);
  const wk=getWeekKey(off),content=document.getElementById('advance-notice-content').value;
  const n=notices[wk];
  if(n?.id){await sb.from('raid_notices').update({content,updated_at:new Date().toISOString()}).eq('id',n.id);n.content=content;}
  else if(content.trim()){const{data}=await sb.from('raid_notices').insert({week_start_date:wk,content}).select().single();if(data)notices[wk]=data;}
  closeModal('modal-advance-notice');toast('✅ 공지 저장됨');
  // 현재 주 뷰이면 notice bar 업데이트
  if(off===weekOffset)loadNotice();
}

// ─── Share ───
function openShareModal(){const cfg=getConfig();if(!cfg)return;const pl=btoa(JSON.stringify({url:cfg.url,key:cfg.key}));const url=location.origin+location.pathname+'?viewer='+pl;document.getElementById('share-link-text').textContent=url;openModal('modal-share');}
function copyShareLink(){navigator.clipboard.writeText(document.getElementById('share-link-text').textContent).then(()=>toast('📋 링크 복사됨!'));}

// ─── Tabs ───
function switchTab(tab){
  document.getElementById('tab-party').classList.toggle('active',tab==='party');
  document.getElementById('tab-schedule').classList.toggle('active',tab==='schedule');
  document.getElementById('view-party').style.display=tab==='party'?'flex':'none';
  const vs=document.getElementById('view-schedule');
  vs.style.display=tab==='schedule'?'flex':'none';
  if(tab==='schedule'){vs.style.flexDirection='column';renderSchedule();loadNotice();}
}

// ─── Modals ───
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('open');}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'));});
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2600);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
init();
</script>
