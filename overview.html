<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 레이드 현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>

/* ══════════════════════════════════════════════════════
   MODERN DESIGN SYSTEM 2025
   - Refined dark theme with depth
   - Smooth transitions + micro-interactions
   - Glass morphism cards
   - Better typography hierarchy
   ══════════════════════════════════════════════════════ */

:root {
  /* Core palette */
  --bg: #080b12;
  --bg-grad: radial-gradient(ellipse at 20% 0%, #0d1220 0%, #080b12 60%);
  --surface-1: #0d1120;
  --surface-2: #111827;
  --surface-3: #1a2235;
  --surface-4: #1f2d42;
  --surface-glass: rgba(17,24,39,.75);

  /* Borders */
  --border: rgba(255,255,255,.07);
  --border-lit: rgba(255,255,255,.12);
  --border-focus: rgba(139,92,246,.5);

  /* Brand - Purple/Blue accent (더 세련된 팔레트) */
  --accent: #7c3aed;
  --accent-2: #6d28d9;
  --accent-glow: rgba(124,58,237,.25);

  /* Gold - 레이드 관련 (기존 유지하되 더 세련되게) */
  --gold: #f59e0b;
  --gold-bright: #fbbf24;
  --gold-dim: #78350f;
  --gold-glow: rgba(245,158,11,.2);
  --gold-text: #fcd34d;

  /* Semantic */
  --green: #10b981;
  --green-glow: rgba(16,185,129,.15);
  --red: #ef4444;
  --red-glow: rgba(239,68,68,.12);
  --blue: #3b82f6;
  --teal: #14b8a6;
  --orange: #f97316;
  --purple: #a78bfa;

  /* Text */
  --text: #f1f5f9;
  --text-2: #94a3b8;
  --text-3: #475569;
  --dim: #2d3748;

  /* Radius */
  --r: 8px;
  --r-sm: 5px;
  --r-lg: 12px;
  --r-xl: 16px;

  /* Shadow */
  --shadow-sm: 0 1px 3px rgba(0,0,0,.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,.5);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.6);
  --shadow-gold: 0 0 20px rgba(245,158,11,.15);

  /* Transition */
  --t: .18s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; }
body {
  background: var(--bg);
  background-image: var(--bg-grad);
  color: var(--text);
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
  font-size: 14px;
  line-height: 1.5;
}
input[type="text"],input:not([type]),textarea { ime-mode:active; }

/* ── Scrollbars ── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:10px; }
::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,.2); }

/* ── Page Nav ── */
.page-nav {
  background: rgba(8,11,18,.95);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  flex-shrink: 0;
  backdrop-filter: blur(12px);
  position: relative;
  z-index: 20;
}
.page-nav::after {
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(124,58,237,.4),var(--gold-dim),transparent);
}
.pnav-item {
  padding: 10px 22px;
  font-size: .81rem;
  font-weight: 500;
  color: var(--text-2);
  text-decoration: none;
  transition: all var(--t);
  display: flex;
  align-items: center;
  gap: 7px;
  border-right: 1px solid var(--border);
  position: relative;
  letter-spacing: .3px;
}
.pnav-item:hover { color: var(--text); background: rgba(255,255,255,.04); }
.pnav-item.active {
  color: var(--gold-text);
  background: rgba(245,158,11,.06);
}
.pnav-item.active::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

/* ── DnD ── */
[draggable="true"] { cursor:grab; user-select:none; }
.dnd-dragging { opacity:.3!important; }
.dnd-over-v { box-shadow:inset 0 -3px 0 var(--gold)!important; }
.dnd-over-h { box-shadow:inset -3px 0 0 var(--gold)!important; }
.dnd-handle {
  font-size:.7rem; color:var(--text-3); cursor:grab;
  flex-shrink:0; padding:0 4px; line-height:1; opacity:.5;
  transition:opacity var(--t);
}
.dnd-handle:hover { opacity:1; color:var(--text-2); }

/* ── Buttons ── */
.btn {
  padding: 8px 16px;
  border-radius: var(--r-sm);
  border: none;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: .82rem;
  font-weight: 500;
  transition: all var(--t);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  line-height: 1;
  white-space: nowrap;
}
.btn:active { transform:scale(.97); }
.btn-gold {
  background: linear-gradient(135deg, var(--gold), #d97706);
  color: #1a0a00;
  font-weight: 700;
  box-shadow: 0 2px 10px rgba(245,158,11,.3);
}
.btn-gold:hover { background:linear-gradient(135deg,var(--gold-bright),var(--gold)); box-shadow:0 4px 16px rgba(245,158,11,.4); }
.btn-sec {
  background: var(--surface-3);
  color: var(--text-2);
  border: 1px solid var(--border-lit);
}
.btn-sec:hover { border-color:rgba(245,158,11,.4); color:var(--gold-text); background:var(--surface-4); }
.btn-teal { background:rgba(20,184,166,.12); color:var(--teal); border:1px solid rgba(20,184,166,.3); }
.btn-teal:hover { background:rgba(20,184,166,.22); }
.btn-orange { background:rgba(249,115,22,.12); color:var(--orange); border:1px solid rgba(249,115,22,.3); }
.btn-orange:hover { background:rgba(249,115,22,.22); }
.btn-purple { background:rgba(167,139,250,.12); color:var(--purple); border:1px solid rgba(167,139,250,.3); }
.btn-purple:hover { background:rgba(167,139,250,.22); }
.btn-ghost { background:transparent; color:var(--text-3); padding:5px 8px; font-size:.77rem; border-radius:var(--r-sm); }
.btn-ghost:hover { color:var(--text); background:rgba(255,255,255,.06); }
.btn-danger { background:transparent; color:var(--red); padding:5px 8px; font-size:.77rem; border-radius:var(--r-sm); }
.btn-danger:hover { background:var(--red-glow); }
.btn-icon { background:transparent; color:var(--text-3); padding:5px 7px; font-size:.82rem; border-radius:var(--r-sm); }
.btn-icon:hover { color:var(--text); }
.btn-full { width:100%; justify-content:center; padding:10px; }
.btn-sm { padding:5px 10px; font-size:.75rem; }

/* ── Modals ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
  backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none;
  transition: opacity .22s;
}
.overlay.open { opacity:1; pointer-events:all; }
.modal {
  background: var(--surface-2);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: var(--r-lg);
  padding: 26px 28px;
  width: 100%;
  max-width: 460px;
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(124,58,237,.08);
  max-height: 88vh;
  overflow-y: auto;
  animation: modalIn .2s ease;
}
@keyframes modalIn { from{transform:translateY(8px) scale(.98);opacity:0;} to{transform:none;opacity:1;} }
.modal.modal-gold { border-color:rgba(245,158,11,.25); }
.modal-title {
  font-family: 'Cinzel', serif;
  color: var(--gold-text);
  font-size: .98rem;
  letter-spacing: 1px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: .72rem;
  color: var(--text-3);
  margin-bottom: 5px;
  letter-spacing: .5px;
  text-transform: uppercase;
  font-weight: 600;
}
.form-row { display:flex; gap:10px; }
.form-row>.form-group { flex:1; }
.form-input, .form-select {
  width: 100%;
  background: var(--surface-1);
  border: 1px solid var(--border-lit);
  color: var(--text);
  padding: 9px 12px;
  border-radius: var(--r-sm);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: .86rem;
  transition: border var(--t), box-shadow var(--t);
  outline: none;
  -webkit-appearance: none;
}
.form-input:focus, .form-select:focus {
  border-color: rgba(245,158,11,.5);
  box-shadow: 0 0 0 3px rgba(245,158,11,.1);
}
.form-select option { background: var(--surface-2); }
.form-textarea { resize:vertical; min-height:76px; line-height:1.6; }
.modal-footer {
  display: flex; gap: 8px; justify-content: flex-end;
  margin-top: 18px; padding-top: 14px;
  border-top: 1px solid var(--border);
}

/* ── States ── */
.loading-row {
  display: flex; align-items: center; gap: 10px;
  justify-content: center; padding: 40px;
  color: var(--text-3); font-size: .84rem;
}
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid var(--border-lit);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface-3);
  border: 1px solid rgba(255,255,255,.1);
  border-left: 3px solid var(--gold);
  color: var(--text);
  padding: 10px 18px;
  border-radius: var(--r);
  font-size: .84rem;
  box-shadow: var(--shadow-lg);
  z-index: 300;
  animation: toastIn .28s cubic-bezier(.34,1.56,.64,1), toastOut .25s ease 2.25s forwards;
  backdrop-filter: blur(8px);
}
@keyframes toastIn { from{opacity:0;transform:translateY(12px) scale(.95);} to{opacity:1;transform:none;} }
@keyframes toastOut { to{opacity:0;transform:translateY(6px);} }

/* ── Image Picker ── */
.pick-bc { cursor:pointer; color:var(--gold); font-size:.78rem; }
.pick-bc:hover { text-decoration:underline; }
.pick-folder {
  padding: 9px 12px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  cursor: pointer; font-size:.82rem;
  margin-bottom: 6px;
  transition: all var(--t);
  display: flex; align-items: center; gap: 8px;
}
.pick-folder:hover { border-color:var(--gold); background:var(--surface-4); }
.pick-imgs { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
.pick-img-wrap {
  width:72px; height:72px;
  border: 2px solid var(--border-lit);
  border-radius: var(--r);
  overflow:hidden; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition: all var(--t);
  background: var(--surface-3);
}
.pick-img-wrap:hover { border-color:var(--gold); box-shadow:var(--shadow-gold); transform:scale(1.05); }
.pick-img-wrap img { width:60px; height:60px; object-fit:contain; }
.pick-empty { font-size:.82rem; color:var(--text-3); padding:24px; text-align:center; }
.entity-icon { width:22px; height:22px; object-fit:contain; border-radius:4px; flex-shrink:0; }
.entity-icon-sm { width:18px; height:18px; object-fit:contain; border-radius:3px; flex-shrink:0; }
.icon-btn {
  padding:3px 8px; font-size:.7rem;
  border:1px solid var(--border-lit); border-radius:var(--r-sm);
  background:var(--surface-3); color:var(--text-3);
  cursor:pointer; transition:all var(--t);
}
.icon-btn:hover { border-color:var(--gold); color:var(--gold-text); }

/* ── Diff colors ── */
.diff-nightmare { color:#a78bfa; font-weight:600; }
.diff-hard { color:#f59e0b; font-weight:600; }
.diff-normal { color:#64748b; font-weight:600; }
.muted-gold { color:var(--text-3)!important; text-decoration:line-through; }

/* ══ overview.html specific ══ */
body { overflow:hidden; }
.page-nav + .header { background:rgba(13,17,32,.92); border-bottom:1px solid var(--border); padding:10px 22px; display:flex; align-items:center; gap:12px; flex-shrink:0; position:relative; }
.header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(245,158,11,.3),transparent); }
.header-title { font-family:'Cinzel',serif; font-size:1.05rem; color:var(--gold-text); letter-spacing:2px; }
.main { flex:1; overflow-y:auto; padding:18px 22px; }

/* Filter bar */
.char-filter-bar {
  margin-bottom:16px;
  background: var(--surface-2);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: var(--r-lg);
  overflow:hidden;
}
.cfb-hd {
  display:flex; align-items:center; gap:10px;
  padding: 11px 16px; cursor:pointer; user-select:none;
  border-bottom:1px solid var(--border);
  transition:background var(--t);
}
.cfb-hd:hover { background:rgba(255,255,255,.02); }
.cfb-label { font-size:.72rem; color:var(--text-3); letter-spacing:.5px; text-transform:uppercase; flex:1; font-weight:700; }
.cfb-count { font-size:.72rem; color:var(--text-3); }
.cfb-toggle { font-size:.68rem; color:var(--text-3); }
.cfb-body { padding:12px 16px; display:flex; flex-direction:column; gap:9px; }
.cfb-acc-row { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.cf-acc-btn {
  padding: 4px 14px; border-radius:16px;
  border: 1px solid rgba(255,255,255,.1);
  background: var(--surface-1); color:var(--text-3);
  cursor:pointer; font-size:.78rem; font-weight:700;
  font-family:'Noto Sans KR',sans-serif; transition:all var(--t); flex-shrink:0;
}
.cf-acc-btn:hover { border-color:rgba(245,158,11,.4); color:var(--gold-text); }
.cf-acc-btn.all-on { border-color:rgba(245,158,11,.5); color:var(--gold-text); background:rgba(245,158,11,.1); }
.cf-acc-btn.partial { border-color:rgba(245,158,11,.25); color:rgba(245,158,11,.65); background:rgba(245,158,11,.05); }
.cf-acc-sep { width:1px; height:22px; background:var(--border); flex-shrink:0; margin:0 3px; }
.cf-btn {
  padding: 4px 12px; border-radius:14px;
  border: 1px solid rgba(255,255,255,.07);
  background: var(--surface-3); color:var(--text-3);
  cursor:pointer; font-size:.78rem;
  font-family:'Noto Sans KR',sans-serif; transition:all var(--t);
}
.cf-btn:hover { border-color:rgba(255,255,255,.15); color:var(--text); }
.cf-btn.on { border-color:rgba(245,158,11,.45); color:var(--gold-text); background:rgba(245,158,11,.08); }

/* Summary bar */
.summary-bar {
  display:grid; grid-template-columns:auto minmax(160px,1fr); gap:10px 16px;
  margin-bottom:18px; padding:12px 18px;
  background: var(--surface-2);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: var(--r-lg);
  align-items:center;
}
.sum-item { font-size:.8rem; color:var(--text-3); }
.sum-item b { color:var(--text); }
.sum-item.gold b { color:var(--gold-text); }
.sum-item.done b { color:var(--green); }
.sum-prog { height:5px; flex:1; min-width:120px; background:rgba(255,255,255,.07); border-radius:4px; overflow:hidden; }
.sum-prog-bar { height:100%; background:linear-gradient(90deg,var(--green),#34d399); border-radius:4px; transition:width .4s; }
.gold-split { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:7px; width:100%; grid-column:1/-1; min-width:0; }
.acc-gold-split { grid-column:auto; flex:1 1 360px; min-width:260px; }
.gold-mini { display:grid; grid-template-columns:auto max-content minmax(110px,1fr); align-items:center; gap:8px; font-size:.72rem; color:var(--text-2); padding:5px 8px; border:1px solid rgba(255,255,255,.07); border-radius:8px; background:rgba(255,255,255,.025); min-width:0; }
.gold-mini b { white-space:nowrap; text-align:right; }
.gold-mini b { color:var(--text); }
.gold-mini.flow b { color:var(--gold-text); }
.gold-mini.bound b { color:var(--orange); }
.gold-mini.bonus b { color:#c4b5fd; }
.gold-mini-bar { width:100%; min-width:110px; height:4px; border-radius:4px; overflow:hidden; background:rgba(255,255,255,.08); }
.gold-mini-fill { height:100%; border-radius:4px; transition:width .3s; }

/* Account sections */
.acc-section { margin-bottom:20px; }
.acc-header {
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  margin-bottom:12px; cursor:pointer; user-select:none;
  padding: 10px 14px;
  background: var(--surface-2);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: var(--r);
  transition: all var(--t);
}
.acc-header:hover { background:var(--surface-3); border-color:rgba(255,255,255,.12); }
.acc-toggle { font-size:.66rem; color:var(--text-3); }
.acc-name { font-family:'Cinzel',serif; font-size:.9rem; color:var(--gold-text); flex:1; }
.acc-stat { font-size:.75rem; color:var(--text-3); }
.acc-allclear {
  font-size:.72rem; color:var(--green); font-weight:700;
  padding:1px 8px; background:rgba(16,185,129,.1);
  border:1px solid rgba(16,185,129,.2); border-radius:10px;
}
.acc-prog-wrap { flex:1; min-width:60px; max-width:160px; height:4px; background:rgba(255,255,255,.07); border-radius:3px; overflow:hidden; }
.acc-prog-bar { height:100%; border-radius:3px; transition:width .3s; }

/* Character cards */
.char-grid { display:flex; flex-wrap:wrap; gap:12px; }
.char-card {
  background: var(--surface-2);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: var(--r-lg);
  overflow:hidden; min-width:220px; max-width:290px;
  flex:1; transition:all var(--t);
}
.char-card:hover { border-color:rgba(255,255,255,.14); box-shadow:var(--shadow-md); transform:translateY(-2px); }
.char-card.all-done { border-color:rgba(16,185,129,.3); box-shadow:0 0 16px rgba(16,185,129,.08); }
.cc-header {
  padding: 10px 14px;
  background: rgba(255,255,255,.03);
  border-bottom: 1px solid rgba(255,255,255,.06);
  display:flex; align-items:center; gap:8px;
}
.cc-name { font-size:.88rem; font-weight:700; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cc-name.done { color:var(--green); }
.cc-meta { font-size:.68rem; color:var(--text-3); flex-shrink:0; }
.cc-prog {
  font-size:.68rem; padding:2px 8px;
  border-radius:10px;
  border: 1px solid rgba(255,255,255,.1);
  background: var(--surface-3); flex-shrink:0;
}
.cc-prog.done { color:var(--green); border-color:rgba(16,185,129,.3); background:rgba(16,185,129,.08); }
.cc-body { padding:6px 10px; }

/* Raid task rows */
.rt-row {
  display:flex; align-items:center; gap:8px;
  padding: 7px 6px;
  border-bottom: 1px solid rgba(255,255,255,.04);
  cursor:pointer; border-radius:4px;
  transition:all var(--t);
}
.rt-row:last-child { border-bottom:none; }
.rt-row:hover { background:rgba(255,255,255,.04); }
.rt-row.done .rt-name { color:var(--text-3); text-decoration:line-through; }
.rt-check {
  width:18px; height:18px;
  border: 2px solid rgba(255,255,255,.15);
  border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all var(--t);
}
.rt-row:hover .rt-check { border-color:rgba(245,158,11,.5); }
.rt-row.done .rt-check { background:linear-gradient(135deg,var(--green),#059669); border-color:var(--green); }
.rt-check-icon { color:#fff; font-size:10px; opacity:0; font-weight:700; }
.rt-row.done .rt-check-icon { opacity:1; }
.rt-info { flex:1; min-width:0; }
.rt-name { font-size:.8rem; font-weight:500; }
.ov-party-chip{font-size:.63rem;color:var(--teal);padding:2px 6px;border:1px solid rgba(42,184,160,.3);border-radius:6px;cursor:pointer;background:rgba(42,184,160,.06);}
.ov-party-chip.temp{color:var(--gold-text);border-color:rgba(200,168,75,.38);background:rgba(200,168,75,.10);}
.ov-gold-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
.ov-gold-chip{font-size:.63rem;padding:2px 6px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);color:var(--text-2);white-space:nowrap;}
.ov-gold-chip.flow{color:var(--gold-text);border-color:rgba(255,184,77,.24);}
.ov-gold-chip.bound{color:var(--orange);border-color:rgba(249,115,22,.24);}
.ov-gold-chip.bonus{color:#c4b5fd;border-color:rgba(196,181,253,.24);}

<body>
<nav class="page-nav">
  <a href="index.html" class="pnav-item">⚔️ 숙제</a>
  <a href="core.html" class="pnav-item">🔮 코어현황</a>
  <a href="raid.html" class="pnav-item">🏰 레이드</a>
  <a href="overview.html" class="pnav-item active">📊 레이드 현황</a>
  <a href="parties.html" class="pnav-item">👥 파티 현황</a>
</nav>
<div class="header">
  <span>📊</span>
  <div class="header-title">레이드 현황</div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
    <span id="hdr-week" style="font-size:.74rem;color:var(--muted);padding:4px 8px;background:var(--s3);border:1px solid var(--border);border-radius:4px;"></span>
    <button class="btn btn-sec btn-sm" onclick="loadAll()">🔄 새로고침</button>
  </div>
</div>
<div class="main">
  <div id="loading" class="loading-full"><div class="spinner"></div> 불러오는 중...</div>
  <div id="content" style="display:none;">
    <div class="week-nav-bar">
      <button class="btn btn-sec btn-sm" onclick="moveWeek(-1)">◀ 이전</button>
      <span class="week-nav-label" id="week-label"></span>
      <button class="btn btn-sec btn-sm" onclick="moveWeek(1)">다음 ▶</button>
      <button class="btn btn-ghost btn-sm" onclick="goCurrentWeek()">이번 주</button>
    </div>
    <div class="char-filter-bar" id="char-filter-bar">
      <div class="cfb-hd" onclick="toggleFilterBar()">
        <span class="cfb-label">🔍 캐릭터 필터</span>
        <span class="cfb-count" id="cfb-count"></span>
        <button class="btn btn-sec btn-sm" onclick="event.stopPropagation();selectAllChars()">전체</button>
        <button class="btn btn-sec btn-sm" onclick="event.stopPropagation();deselectAllChars()">해제</button>
        <span class="cfb-toggle" id="cfb-toggle">▼</span>
      </div>
      <div class="cfb-body" id="cfb-body"></div>
    </div>
    <div id="summary-bar" class="summary-bar"></div>
    <div id="account-sections"></div>
  </div>
</div>
<script>
const{createClient}=supabase;
function getConfig(){const u=localStorage.getItem('la_url'),k=localStorage.getItem('la_key');return u&&k?{url:u,key:k}:null;}

let sb,accounts=[],characters=[],raidTasks=[],tempRaidTaskIds=new Set(),tempRemovedRaidTaskIds=new Set(),tempRemovedPresetByTask={},raidGroupSettings={},raidGroupSettingsAvailable=true;
let weekOffset=0;
let collapsedAccs=new Set(JSON.parse(localStorage.getItem('la_ov_collapsed')||'[]'));
let selectedChars=new Set(); // selected character ids for filter
let filterOpen=localStorage.getItem('la_ov_filter_open')==='1';

const DAYS=['일','월','화','수','목','금','토'];

// ─── Init ───
async function init(){
  const cfg=getConfig();if(!cfg){window.location.href='index.html';return;}
  sb=createClient(cfg.url,cfg.key);
  await loadAll();
}
async function loadAll(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('content').style.display='none';
  const results=await Promise.all([
    sb.from('accounts').select('*').order('sort_order').order('created_at'),
    sb.from('characters').select('*').order('sort_order').order('created_at'),
    sb.from('raid_tasks').select('*').order('sort_order').order('created_at'),
    sb.from('raid_presets').select('id,name,difficulty')
  ]);
  const firstError=results.find(r=>r.error)?.error;
  if(firstError){toast('❗ 로딩 오류: '+firstError.message);console.error(firstError);return;}
  const[r1,r2,r3,r4]=results;
  accounts=r1.data||[];characters=r2.data||[];raidTasks=r3.data||[];
  await loadRaidGroupSettings();
  await loadTempRaidTaskIds();
  const presetsMap={};(r4.data||[]).forEach(p=>{presetsMap[p.id]=p;});
  raidTasks.forEach(t=>{
    const removedPreset=tempRemovedPresetByTask[t.id];
    if(removedPreset){
      t.preset_name=removedPreset.name;
      t.difficulty=t.difficulty||removedPreset.difficulty||'';
      t.preset_icon=getGroupIcon(t.preset_name);
    } else if(t.preset_id&&presetsMap[t.preset_id]){
      t.preset_name=presetsMap[t.preset_id].name;
      t.preset_icon=getGroupIcon(t.preset_name);
    }
  });
  await markPartyLinkedRaidTasks();
  // Init filter: all chars with raids selected by default
  const charsWithRaids=characters.filter(c=>raidTasks.some(t=>t.character_id===c.id));
  const saved=localStorage.getItem('la_ov_sel_chars');
  if(saved){try{const ids=JSON.parse(saved);selectedChars=new Set(ids.filter(id=>charsWithRaids.some(c=>c.id===id)));}catch{selectedChars=new Set(charsWithRaids.map(c=>c.id));}}
  else{selectedChars=new Set(charsWithRaids.map(c=>c.id));}
  await autoReset();
  updateWeekLabel();
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  renderFilterBar();
  render();
}

// ─── Week ───
function getWeekStart(off=0){
  const now=appNow(),kst=new Date(now.getTime()+9*3600000);
  let b=(kst.getUTCDay()-3+7)%7;if(b===0&&kst.getUTCHours()<6)b=7;
  const ws=new Date(kst);ws.setUTCDate(ws.getUTCDate()-b+off*7);ws.setUTCHours(6,0,0,0);return ws;
}
function getLastReset(){return getWeekStart(weekOffset);}
function getWeekKey(off=0){const ws=getWeekStart(off);return`${ws.getUTCFullYear()}-${String(ws.getUTCMonth()+1).padStart(2,'0')}-${String(ws.getUTCDate()).padStart(2,'0')}`;}
function isEffDone(t){
  if(!t.is_completed||!t.last_completed_at)return false;
  return new Date(t.last_completed_at)>getWeekStart(0); // always compare against current week reset
}
function nextResetLabel(){
  const next=new Date(getWeekStart(0));next.setUTCDate(next.getUTCDate()+7);
  const diff=next-appNowMs();if(diff<=0)return'곧';
  const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
  return h>0?`${h}시간 후`:`${m}분 후`;
}
function updateWeekLabel(){
  const s=getWeekStart(weekOffset),e=new Date(s);e.setUTCDate(e.getUTCDate()+6);
  const f=x=>`${x.getUTCMonth()+1}/${x.getUTCDate()}`;
  const label=weekOffset===0?`이번 주 (${f(s)} ~ ${f(e)})`:`${f(s)} (수) ~ ${f(e)} (화)`;
  document.getElementById('week-label').textContent=label;
  document.getElementById('hdr-week').textContent=`${f(s)} ~ ${f(e)}`;
}
function moveWeek(n){weekOffset+=n;updateWeekLabel();render();}
function goCurrentWeek(){weekOffset=0;updateWeekLabel();render();}
async function autoReset(){
  const lr=getWeekStart(0);
  const toReset=raidTasks.filter(t=>t.is_completed&&t.last_completed_at&&new Date(t.last_completed_at)<=lr);
  if(!toReset.length)return;
  await sb.from('raid_tasks').update({is_completed:false,last_completed_at:null}).in('id',toReset.map(t=>t.id));
  toReset.forEach(t=>{t.is_completed=false;t.last_completed_at=null;});
}
async function loadTempRaidTaskIds(){
  const{data,error}=await sb.from('raid_schedule_overrides').select('schedule_id,temp_changes').eq('week_start_date',getWeekKey(0));
  if(error){tempRaidTaskIds=new Set();tempRemovedRaidTaskIds=new Set();tempRemovedPresetByTask={};return;}
  const ids=[],removedIds=[];
  const removedBySchedule=[];
  (data||[]).forEach(o=>{
    const added=(o.temp_changes&&o.temp_changes.added)||{};
    const removed=(o.temp_changes&&o.temp_changes.removed)||{};
    Object.values(added).forEach(v=>{if(v&&v.taskId)ids.push(v.taskId);});
    Object.values(removed).forEach(v=>{if(v&&v.taskId){removedIds.push(v.taskId);removedBySchedule.push({taskId:v.taskId,scheduleId:o.schedule_id});}});
  });
  tempRaidTaskIds=new Set(ids);
  tempRemovedRaidTaskIds=new Set(removedIds);
  tempRemovedPresetByTask={};
  const scheduleIds=[...new Set(removedBySchedule.map(x=>x.scheduleId).filter(Boolean))];
  if(scheduleIds.length){
    const{data:schRows}=await sb.from('raid_schedules').select('id,party_id').in('id',scheduleIds);
    const partyIds=[...new Set((schRows||[]).map(s=>s.party_id).filter(Boolean))];
    if(partyIds.length){
      const{data:partyRows}=await sb.from('raid_parties').select('id,preset_id').in('id',partyIds);
      const presetIds=[...new Set((partyRows||[]).map(p=>p.preset_id).filter(Boolean))];
      const{data:presetRows}=presetIds.length?await sb.from('raid_presets').select('id,name,difficulty').in('id',presetIds):{data:[]};
      const partyPreset={};(partyRows||[]).forEach(p=>{partyPreset[p.id]=p.preset_id;});
      const presetMap={};(presetRows||[]).forEach(p=>{presetMap[p.id]=p;});
      const schedulePreset={};(schRows||[]).forEach(s=>{schedulePreset[s.id]=presetMap[partyPreset[s.party_id]];});
      removedBySchedule.forEach(x=>{if(schedulePreset[x.scheduleId])tempRemovedPresetByTask[x.taskId]=schedulePreset[x.scheduleId];});
    }
  }
}
async function loadRaidGroupSettings(){
  raidGroupSettings={};raidGroupSettingsAvailable=true;
  const{data,error}=await sb.from('raid_group_settings').select('*');
  if(error){raidGroupSettingsAvailable=false;console.warn('raid_group_settings unavailable:',error.message);return;}
  (data||[]).forEach(r=>{raidGroupSettings[r.name]=r;});
}
async function markPartyLinkedRaidTasks(){
  const pids=[...new Set(raidTasks.filter(t=>t.preset_id).map(t=>t.preset_id))];
  if(!pids.length){raidTasks.forEach(t=>t.has_party_link=false);return;}
  const{data:partyRows}=await sb.from('raid_parties').select('id,preset_id').in('preset_id',pids);
  const partyPreset={};(partyRows||[]).forEach(p=>{partyPreset[p.id]=p.preset_id;});
  const partyIds=Object.keys(partyPreset);
  const linked=new Set();
  if(partyIds.length){
    const{data:memberRows}=await sb.from('raid_party_members').select('party_id,character_id').in('party_id',partyIds);
    (memberRows||[]).forEach(m=>{const pid=partyPreset[m.party_id];if(pid&&m.character_id)linked.add(m.character_id+'_'+pid);});
  }
  raidTasks.forEach(t=>{t.has_party_link=!!(t.preset_id&&linked.has(t.character_id+'_'+t.preset_id));});
}

// ─── Filter ───
function saveFilter(){localStorage.setItem('la_ov_sel_chars',JSON.stringify([...selectedChars]));}
function toggleFilterBar(){filterOpen=!filterOpen;localStorage.setItem('la_ov_filter_open',filterOpen?'1':'0');applyFilterOpenState();}
function applyFilterOpenState(){document.getElementById('cfb-body').style.display=filterOpen?'flex':'none';document.getElementById('cfb-toggle').textContent=filterOpen?'▼':'▶';}
function renderFilterBar(){
  const charsWithRaids=characters.filter(c=>raidTasks.some(t=>t.character_id===c.id));
  let html='';
  const mainAccs=accounts.filter(a=>!a.parent_account_id);
  const renderRow=(label,chars,sub=false)=>{
    if(!chars.length)return'';
    const allOn=chars.every(c=>selectedChars.has(c.id)),anyOn=chars.some(c=>selectedChars.has(c.id));
    const ids=chars.map(c=>c.id);
    let row=`<div class="cfb-acc-row" ${sub?'style="margin-left:14px;"':''}>`;
    row+=`<button class="cf-acc-btn ${allOn?'all-on':anyOn?'partial':''}" onclick="toggleCharGroup([${ids.map(id=>`'${id}'`).join(',')}])" ${sub?'style="font-size:.72rem;"':''}>${esc(label)}</button>`;
    row+=`<div class="cf-acc-sep"></div>`;
    chars.forEach(c=>{row+=`<button class="cf-btn ${selectedChars.has(c.id)?'on':''}" onclick="toggleChar('${c.id}')">${esc(c.name)}${c.item_level?` <span style="font-size:.67rem;opacity:.6">Lv.${c.item_level}</span>`:''}</button>`;});
    row+=`</div>`;return row;
  };
  mainAccs.forEach(acc=>{
    const mainChars=charsWithRaids.filter(c=>c.account_id===acc.id);
    const subAccs=accounts.filter(a=>a.parent_account_id===acc.id);
    const subChars=subAccs.flatMap(sa=>charsWithRaids.filter(c=>c.account_id===sa.id));
    html+=renderRow(acc.name,mainChars);
    html+=renderRow(acc.name+'-부계정',subChars,true);
  });
  accounts.filter(a=>a.parent_account_id&&!accounts.some(m=>m.id===a.parent_account_id)).forEach(acc=>{
    const chars=charsWithRaids.filter(c=>c.account_id===acc.id);
    html+=renderRow(acc.name,chars);
  });
  document.getElementById('cfb-body').innerHTML=html;
  const cnt=document.getElementById('cfb-count');
  if(cnt)cnt.textContent=`${selectedChars.size}/${charsWithRaids.length}명`;
  applyFilterOpenState();
}
function toggleCharGroup(ids){const allOn=ids.every(id=>selectedChars.has(id));ids.forEach(id=>{if(allOn)selectedChars.delete(id);else selectedChars.add(id);});saveFilter();renderFilterBar();render();}
function toggleChar(id){if(selectedChars.has(id))selectedChars.delete(id);else selectedChars.add(id);saveFilter();renderFilterBar();render();}
function selectAllChars(){const ci=characters.filter(c=>raidTasks.some(t=>t.character_id===c.id));selectedChars=new Set(ci.map(c=>c.id));saveFilter();renderFilterBar();render();}
function deselectAllChars(){selectedChars.clear();saveFilter();renderFilterBar();render();}

// ─── Render ───
function goldBreakdownFor(charsOrIds){
  const ids=charsOrIds.map(x=>typeof x==='string'?x:x.id);
  const out={flow:0,bound:0,bonus:0,earnedFlow:0,earnedBound:0,earnedBonus:0};
  ids.forEach(cid=>raidTasks.filter(t=>t.character_id===cid).forEach(t=>{
    const flow=Math.max(0,(Number(t.clear_gold)||0)-(Number(t.bound_gold)||0));
    const bound=Number(t.bound_gold)||0;
    const bonus=Number(t.bonus_gold)||0;
    if(t.receive_gold!==false){out.flow+=flow;if(isEffDone(t))out.earnedFlow+=flow;}
    if(t.receive_bound!==false){out.bound+=bound;if(isEffDone(t))out.earnedBound+=bound;}
    if(t.receive_bonus!==false){out.bonus+=bonus;if(isEffDone(t))out.earnedBonus+=bonus;}
  }));
  return out;
}
function goldMiniHTML(label,earned,total,cls){
  if(!total)return'';
  const pct=Math.max(0,Math.min(100,Math.round(earned/total*100)));
  const color=cls==='flow'?'var(--gold)':cls==='bound'?'var(--orange)':'#a78bfa';
  return`<span class="gold-mini ${cls}">${label} <b>${earned.toLocaleString()} / ${total.toLocaleString()}G</b><span class="gold-mini-bar"><span class="gold-mini-fill" style="width:${pct}%;background:${color};"></span></span></span>`;
}
function render(){
  // Summary - only selected chars
  let totalRaids=0,doneRaids=0;
  [...selectedChars].forEach(cid=>{
    raidTasks.filter(t=>t.character_id===cid).forEach(t=>{
      totalRaids++;
      if(isEffDone(t))doneRaids++;
    });
  });
  const gsum=goldBreakdownFor([...selectedChars]);
  const pct=totalRaids?Math.round(doneRaids/totalRaids*100):0;
  document.getElementById('summary-bar').innerHTML=`
    <div class="sum-item done">레이드 완료 <b>${doneRaids}/${totalRaids}</b></div>
    <div class="sum-prog"><div class="sum-prog-bar" style="width:${pct}%"></div></div>
    <div class="gold-split">${goldMiniHTML('유통 골드',gsum.earnedFlow,gsum.flow,'flow')}${goldMiniHTML('귀속 골드',gsum.earnedBound,gsum.bound,'bound')}${goldMiniHTML('더보기 골드',gsum.earnedBonus,gsum.bonus,'bonus')}</div>
    ${weekOffset===0?`<div class="sum-item" style="margin-left:auto;font-size:.72rem;color:var(--dim);">초기화 ${nextResetLabel()}</div>`:''}`;

  // Account sections - filtered (부계정 그룹핑)
  const mainAccounts=accounts.filter(a=>!a.parent_account_id);
  function accCharCards(acc){
    const allCharsOfAcc=characters.filter(c=>c.account_id===acc.id);
    return allCharsOfAcc.filter(c=>raidTasks.some(t=>t.character_id===c.id)&&selectedChars.has(c.id));
  }
  function accStats(chars){
    const total=chars.reduce((s,c)=>s+raidTasks.filter(t=>t.character_id===c.id).length,0);
    const done=chars.reduce((s,c)=>s+raidTasks.filter(t=>t.character_id===c.id&&isEffDone(t)).length,0);
    return{total,done,...goldBreakdownFor(chars)};
  }
  function renderAccHeader(acc,chars,subLabel){
    const st=accStats(chars);
    const isOpen=!collapsedAccs.has(acc.id+(subLabel||''));
    const allClear=st.done===st.total&&st.total>0;
    const pct=st.total?Math.round(st.done/st.total*100):0;
    const toggleKey=acc.id+(subLabel||'');
    return{isOpen,html:`<div class="acc-section">
      <div class="acc-header" onclick="toggleAcc('${toggleKey}')">
        <span class="acc-toggle">${isOpen?'▼':'▶'}</span>
        <span class="acc-name">${esc(subLabel||acc.name)}</span>
        <span class="acc-stat">레이드 완료 ${st.done}/${st.total}</span>
        <div class="acc-prog-wrap"><div class="acc-prog-bar" style="width:${pct}%;background:${allClear?'var(--green)':'var(--teal)'};"></div></div>
        <div class="gold-split acc-gold-split">${goldMiniHTML('유통 골드',st.earnedFlow,st.flow,'flow')}${goldMiniHTML('귀속 골드',st.earnedBound,st.bound,'bound')}${goldMiniHTML('더보기 골드',st.earnedBonus,st.bonus,'bonus')}</div>
        ${allClear?`<span class="acc-allclear">✓ 올클</span>`:''}
      </div>
      ${isOpen?`<div class="char-grid">${chars.map(c=>charCardHTML(c)).join('')}</div>`:''}
    </div>`};
  }
  let sectHtml='';
  mainAccounts.forEach(acc=>{
    const mainChars=accCharCards(acc);
    const subAccs=accounts.filter(a=>a.parent_account_id===acc.id);
    const subChars=subAccs.flatMap(sa=>accCharCards(sa));
    if(!mainChars.length&&!subChars.length)return;
    if(mainChars.length){const{html}=renderAccHeader(acc,mainChars,null);sectHtml+=html;}
    if(subChars.length){const{html}=renderAccHeader(acc,subChars,acc.name+' - 부계정');sectHtml+=html;}
  });
  // orphan subs
  accounts.filter(a=>a.parent_account_id&&!accounts.some(m=>m.id===a.parent_account_id)).forEach(acc=>{
    const chars=accCharCards(acc);if(!chars.length)return;const{html}=renderAccHeader(acc,chars,null);sectHtml+=html;
  });
  document.getElementById('account-sections').innerHTML=sectHtml;
}

function charCardHTML(c){
  const tasks=raidTasks.filter(t=>t.character_id===c.id).sort((a,b)=>a.sort_order-b.sort_order);
  if(!tasks.length)return'';
  const done=tasks.filter(t=>isEffDone(t)).length,tot=tasks.length;
  const allDone=done===tot;
  return`<div class="char-card ${allDone?'all-done':''}">
    <div class="cc-header">
          <div class="cc-name ${allDone?'done':''}"><span style="display:flex;align-items:center;gap:4px;">${iconImg(c.icon_url||'','entity-icon-sm')}${esc(c.name)}</span>${c.combat_power?`<span style="font-size:.64rem;color:var(--text-3);margin-left:6px;">전투력 ${Number(c.combat_power).toLocaleString()}</span>`:''}</div>
      ${c.class_name?`<div class="cc-meta">${esc(c.class_name)}</div>`:''}
      ${c.item_level?`<div class="cc-meta">Lv.${c.item_level}</div>`:''}
      <div class="cc-prog ${allDone?'done':''}">${done}/${tot}${allDone?' ✓':''}</div>
    </div>
    <div class="cc-body">
      ${tasks.map(t=>raidTaskRowHTML(t)).join('')}
    </div>
  </div>`;
}

function raidTaskRowHTML(t){
  const done=isEffDone(t);
  const isTemp=tempRaidTaskIds&&tempRaidTaskIds.has(t.id);
  const isRemoved=tempRemovedRaidTaskIds&&tempRemovedRaidTaskIds.has(t.id);
  const raidName=t.preset_name||t.name;
  const popupPresetId=t.preset_id||(tempRemovedPresetByTask[t.id]?.id)||'';
  const gc=getGroupColor(raidName);
  const dc=diffClass(t.difficulty||'');
  const flow=Math.max(0,(Number(t.clear_gold)||0)-(Number(t.bound_gold)||0)),bound=Number(t.bound_gold)||0,bonus=Number(t.bonus_gold)||0;
  const flagChips=[
    flow?`<span class="ov-gold-chip flow ${t.receive_gold===false?'off':''}">유통 ${t.receive_gold===false?'안받음':'받음'}</span>`:'',
    bound?`<span class="ov-gold-chip bound ${t.receive_bound===false?'off':''}">귀속 ${t.receive_bound===false?'안받음':'받음'}</span>`:'',
    bonus?`<span class="ov-gold-chip bonus ${t.receive_bonus===false?'off':''}">더보기 ${t.receive_bonus===false?'안함':'함'}</span>`:''
  ].join('');
  return`<div class="rt-row ${done?'done':''}" id="ov-rti-${t.id}" onclick="toggleRaidTask('${t.id}')">
    <div class="rt-check"><span class="rt-check-icon">✓</span></div>
    <div class="rt-info">
      <div class="rt-name" style="display:flex;align-items:center;gap:4px;">${iconImg(getGroupIcon(raidName),'entity-icon-sm')}<span style="color:${gc};">${esc(raidName)}</span>${t.difficulty?` <span class="${dc}" style="font-size:.72rem;margin-left:2px;">${esc(t.difficulty)}</span>`:''}</div>
      <div class="ov-gold-row">${flagChips}</div>
      ${(t.has_party_link||isTemp||isRemoved)?`<div style="margin-top:2px;"><span class="ov-party-chip ${(isTemp||isRemoved)?'temp':''}" onclick="event.stopPropagation();showOvPartyPopup('${popupPresetId}','${t.character_id}','${t.id}')">🔗 ${isRemoved?'임시파티해제':isTemp?'임시파티연동':'파티연동'}</span></div>`:''}
    </div>
  </div>`;
}
async function showOvPartyPopup(presetId,charId,taskId=''){
  if(!document.getElementById('modal-ov-party')){
    const m=document.createElement('div');m.className='overlay';m.id='modal-ov-party';
    m.innerHTML=`<div class="modal" style="max-width:440px;"><div class="modal-title">🔗 파티 연동 정보</div><div id="ov-party-content" style="min-height:60px;"></div><div class="modal-footer"><button class="btn btn-sec" onclick="closeModal('modal-ov-party')">닫기</button></div></div>`;
    document.body.appendChild(m);
  }
  const el=document.getElementById('ov-party-content');
  el.innerHTML='<div class="loading-full"><div class="spinner"></div></div>';
  openModal('modal-ov-party');
  try{
    const DAYS_KO=['일','월','화','수','목','금','토'];
    const[{data:preset,error:presetErr},{data:partiesData,error:partyErr}]=await Promise.all([
      sb.from('raid_presets').select('*').eq('id',presetId).single(),
      sb.from('raid_parties').select('*').eq('preset_id',presetId).order('sort_order').order('created_at')
    ]);
    if(presetErr)throw presetErr;if(partyErr)throw partyErr;
    if(!preset){el.innerHTML='<span style="color:var(--muted);">정보 없음</span>';return;}
    const pIds=(partiesData||[]).map(p=>p.id);
    const[{data:members,error:mErr},{data:schData,error:sErr}]=await Promise.all([
      pIds.length?sb.from('raid_party_members').select('*,characters(id,name,class_name,item_level,combat_power,icon_url)').in('party_id',pIds):{data:[]},
      pIds.length?sb.from('raid_schedules').select('id,party_id,day_of_week').in('party_id',pIds):{data:[]}
    ]);
    if(mErr)throw mErr;if(sErr)throw sErr;
    const tempPartyIds=new Set();
    if(taskId){
      const{data:ovrs}=await sb.from('raid_schedule_overrides').select('schedule_id,temp_changes').eq('week_start_date',getWeekKey(0));
      (ovrs||[]).forEach(o=>{
        const added=(o.temp_changes&&o.temp_changes.added)||{};
        const isTemp=Object.values(added).some(v=>v&&v.taskId===taskId);
        if(isTemp){const sch=(schData||[]).find(s=>s.id===o.schedule_id);if(sch)tempPartyIds.add(sch.party_id);}
      });
    }
    const targetParties=(partiesData||[]).filter(p=>(members||[]).some(m=>m.party_id===p.id&&m.character_id===charId)||tempPartyIds.has(p.id));
    const dayMap={};(schData||[]).forEach(s=>{if(!dayMap[s.party_id])dayMap[s.party_id]=[];dayMap[s.party_id].push(s.day_of_week);});
    const gc=preset.color||getGroupColor(preset.name||'');
    let html=`<div style="padding:10px 12px;background:var(--s3);border-radius:10px;margin-bottom:12px;border-left:3px solid ${gc};">
      <div style="font-size:.88rem;font-weight:700;color:${gc};display:flex;align-items:center;gap:6px;">${iconImg(preset.icon_url||'','entity-icon-sm')}${esc(preset.name)}${preset.difficulty?` <span class="${diffClass(preset.difficulty)}">${esc(preset.difficulty)}</span>`:''}</div>
    </div>`;
    if(!targetParties.length){el.innerHTML=html+'<div style="color:var(--muted);font-size:.82rem;padding:8px 0;">해당 캐릭터가 배치된 파티가 없습니다.</div>';return;}
    targetParties.forEach(p=>{
      const pMembers=(members||[]).filter(m=>m.party_id===p.id).sort((a,b)=>a.slot_index-b.slot_index);
      const days=(dayMap[p.id]||[]).map(d=>DAYS_KO[d]+'요일').join(', ');
      const pc=p.color||'#e0ddd5';
      const isTemp=tempPartyIds.has(p.id);
      html+=`<div style="margin-bottom:10px;border:1px solid ${isTemp?'rgba(200,168,75,.38)':'var(--border)'};border-radius:10px;overflow:hidden;background:${isTemp?'rgba(200,168,75,.06)':'transparent'};">
        <div style="padding:8px 10px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;">
          <span style="font-weight:700;font-size:.82rem;color:${pc};">${esc(p.name||'파티')}</span>${days?`<span style="font-size:.68rem;color:var(--gold);margin-left:auto;">📅 ${days}</span>`:''}
          ${isTemp?`<span class="ov-party-chip temp" style="cursor:default;">임시파티연동</span>`:''}
          <a class="btn btn-sec btn-sm" style="text-decoration:none;" href="raid.html?party=${p.id}">파티 이동</a>
        </div>
        <div style="padding:6px 8px;">${Array.from({length:p.party_size},(_, i)=>{
          const m=pMembers.find(x=>x.slot_index===i);const ch=m?.characters;
          const isMe=ch&&ch.id===charId;
          return`<div style="display:flex;align-items:center;gap:6px;padding:4px 6px;background:${isMe?'rgba(255,184,77,.1)':'transparent'};border:1px solid ${isMe?'rgba(255,184,77,.3)':'transparent'};border-radius:8px;font-size:.77rem;">
            <span style="color:var(--dim);width:14px;">${i+1}</span>
            ${ch?`${ch.icon_url?`<img class="entity-icon-sm" src="${ch.icon_url}" onerror="this.style.display='none'">`:''}
            <span style="${isMe?'color:var(--gold);font-weight:700;':''}">${esc(ch.name)}</span>
            <span style="color:var(--muted);font-size:.67rem;">${esc(ch.class_name||'')}${ch.item_level?' Lv.'+ch.item_level:''}${ch.combat_power?' · 전투력 '+Number(ch.combat_power).toLocaleString():''}</span>`
            :'<span style="color:var(--dim);">빈 슬롯</span>'}
          </div>`;
        }).join('')}</div>
      </div>`;
    });
    el.innerHTML=html;
  }catch(err){console.error(err);el.innerHTML='<div style="color:#fca5a5;font-size:.82rem;">파티 정보를 불러오지 못했습니다.</div>';}
}

// ─── Toggle (★ 핵심 수정: await 로 실제 DB 저장 보장) ───
async function toggleRaidTask(taskId){
  const t=raidTasks.find(x=>x.id===taskId);if(!t)return;
  const nowDone=!isEffDone(t);
  const ts=nowDone?appNowIso():null;
  const up={is_completed:nowDone,last_completed_at:ts};
  // DOM update immediately
  const el=document.getElementById('ov-rti-'+taskId);
  if(el){
    el.classList.toggle('done',nowDone);
    const icon=el.querySelector('.rt-check-icon');if(icon)icon.style.opacity=nowDone?'1':'0';
    const cb=el.querySelector('.rt-check');if(cb){cb.style.background=nowDone?'var(--green)':'';cb.style.borderColor=nowDone?'var(--green)':'var(--border-lit)';}
    const nm=el.querySelector('.rt-name');if(nm){nm.style.color=nowDone?'var(--muted)':'';nm.style.textDecoration=nowDone?'line-through':'';}
  }
  // Memory update
  Object.assign(t,up);
  render();
  // ★ await: Supabase JS v2에서 await 없으면 쿼리 미실행
  const{error}=await sb.from('raid_tasks').update(up).eq('id',taskId);
  if(error){toast('❗ 저장 실패: '+error.message);return;}
}

function renderSummary(){
  let totalRaids=0,doneRaids=0;
  [...selectedChars].forEach(cid=>{raidTasks.filter(t=>t.character_id===cid).forEach(t=>{totalRaids++;if(isEffDone(t))doneRaids++;});});
  const gsum=goldBreakdownFor([...selectedChars]);
  const pct=totalRaids?Math.round(doneRaids/totalRaids*100):0;
  const sb2=document.getElementById('summary-bar');
  if(sb2)sb2.innerHTML=`<div class="sum-item done">레이드 완료 <b>${doneRaids}/${totalRaids}</b></div><div class="sum-prog"><div class="sum-prog-bar" style="width:${pct}%"></div></div><div class="gold-split">${goldMiniHTML('유통 골드',gsum.earnedFlow,gsum.flow,'flow')}${goldMiniHTML('귀속 골드',gsum.earnedBound,gsum.bound,'bound')}${goldMiniHTML('더보기 골드',gsum.earnedBonus,gsum.bonus,'bonus')}</div>${weekOffset===0?`<div class="sum-item" style="margin-left:auto;font-size:.72rem;color:var(--dim);">초기화 ${nextResetLabel()}</div>`:''}`;
}

function toggleAcc(id){
  if(collapsedAccs.has(id))collapsedAccs.delete(id);else collapsedAccs.add(id);
  localStorage.setItem('la_ov_collapsed',JSON.stringify([...collapsedAccs]));
  render();
}

function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2600);}

// ─── Image Picker (shared) ───
const ICON_REPO=localStorage.getItem('la_icon_repo')||'ghk71/LoAHomeworkCheck';
const ICON_RAW=`https://raw.githubusercontent.com/${ICON_REPO}/main/`;
const ICON_API=`https://api.github.com/repos/${ICON_REPO}/contents/`;
let _pickerCb=null;
function iconImg(url,cls='entity-icon'){return url?`<img class="${cls}" src="${url}" onerror="this.style.display='none'">`:'';} 

async function openImagePicker(cb,path='images/'){
  _pickerCb=cb;
  document.getElementById('picker-content').innerHTML='<div class="pick-empty"><div class="spinner"></div></div>';
  openModal('modal-img-picker');
  await loadPickerDir(path);
}
async function loadPickerDir(path){
  const cKey='la_ic_'+path;
  let items;
  try{const c=sessionStorage.getItem(cKey);if(c)items=JSON.parse(c);}catch{}
  if(!items){
    const r=await fetch(ICON_API+path);
    if(!r.ok){document.getElementById('picker-content').innerHTML='<div class="pick-empty">폴더를 불러올 수 없습니다<br><small>images/ 폴더가 repo에 있는지 확인하세요</small></div>';return;}
    items=await r.json();
    try{sessionStorage.setItem(cKey,JSON.stringify(items));}catch{}
  }
  const dirs=items.filter(x=>x.type==='dir');
  const imgs=items.filter(x=>x.type==='file'&&/\.(png|jpg|jpeg|gif|webp|svg)$/i.test(x.name));
  // Breadcrumb
  const parts=path.replace(/^\/images\//,'').replace(/^images\//,'').split('/').filter(Boolean);
  let bc=`<span class="pick-bc" onclick="loadPickerDir('images/')">images</span>`;
  let cum='images/';parts.forEach(p=>{cum+=p+'/';bc+=` / <span class="pick-bc" onclick="loadPickerDir('${cum}')">${p}</span>`;});
  document.getElementById('picker-breadcrumb').innerHTML=bc;
  // Content
  let html='';
  if(dirs.length){html+=dirs.map(d=>`<div class="pick-folder" onclick="loadPickerDir('${path}${d.name}/')">📁 ${d.name}</div>`).join('');}
  if(imgs.length){html+=`<div class="pick-imgs">${imgs.map(f=>{const url=ICON_RAW+f.path;return`<div class="pick-img-wrap" title="${f.name}" onclick="selectPickerImg('${url}')"><img src="${url}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`;}).join('')}</div>`;}
  if(!dirs.length&&!imgs.length)html='<div class="pick-empty">이미지가 없습니다</div>';
  document.getElementById('picker-content').innerHTML=html;
}
function selectPickerImg(url){if(_pickerCb)_pickerCb(url);closeModal('modal-img-picker');}
function pickerRemoveIcon(){if(_pickerCb)_pickerCb(null);closeModal('modal-img-picker');}

function getGroupColor(name){return raidGroupSettings[name]?.color||(!raidGroupSettingsAvailable?localStorage.getItem('la_gc_'+name):null)||'#4caf50';}
function getGroupIcon(name){return raidGroupSettings[name]?.icon_url||(!raidGroupSettingsAvailable?localStorage.getItem('la_gicon_'+name):null)||'';}
function diffClass(d){if(!d)return'';const dl=d.toLowerCase();if(dl.includes('나이트메어')||dl.includes('3단계'))return'diff-nightmare';if(dl.includes('하드')||dl.includes('2단계'))return'diff-hard';if(dl.includes('노말')||dl.includes('1단계'))return'diff-normal';return'';}

function openModal(id){document.getElementById(id)?.classList.add('open');}
function closeModal(id){document.getElementById(id)?.classList.remove('open');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function appNowMs(){const t=Number(localStorage.getItem('la_test_now')||0);return Number.isFinite(t)&&t>0?t:Date.now();}
function appNow(){return new Date(appNowMs());}
function appNowIso(){return new Date(appNowMs()).toISOString();}
init();
</script>
