<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 레이드 현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
/* Diff colors */
--bg:#0a0a0f;--s1:#111118;--s2:#16161f;--s3:#1e1e2a;--border:#2a2a3d;--border-lit:#3d3d5c;--gold:#c8a84b;--gold-bright:#e8c86a;--gold-dim:#8a6e2a;--gold-glow:rgba(200,168,75,.2);--text:#e0ddd5;--muted:#5a5f72;--dim:#2e3045;--green:#2ecc71;--red:#e74c3c;--orange:#e67e22;--teal:#1abc9c;--r:5px;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column;}
.page-nav{background:#070710;border-bottom:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;}
.pnav-item{padding:8px 20px;font-size:.82rem;color:var(--muted);text-decoration:none;transition:all .15s;display:flex;align-items:center;gap:6px;border-right:1px solid var(--border);}
.pnav-item:hover{color:var(--text);background:rgba(255,255,255,.03);}
.pnav-item.active{color:var(--gold);background:rgba(200,168,75,.06);border-bottom:2px solid var(--gold);}
.header{background:var(--s1);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);}
.header-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);letter-spacing:2px;}
.main{flex:1;overflow-y:auto;padding:16px 20px;}

/* Week nav */
.week-nav-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:9px 14px;background:var(--s2);border:1px solid var(--border);border-radius:6px;}
.week-nav-label{font-size:.86rem;font-weight:600;flex:1;text-align:center;}

/* Summary */
.summary-bar{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;padding:10px 16px;background:var(--s2);border:1px solid var(--border);border-radius:6px;align-items:center;}
.sum-item{font-size:.81rem;color:var(--muted);}
.sum-item b{color:var(--text);}
.sum-item.gold b{color:#f0c040;}
.sum-item.done b{color:var(--green);}
.sum-prog{height:6px;flex:1;min-width:120px;background:var(--s3);border-radius:3px;overflow:hidden;}
.sum-prog-bar{height:100%;background:var(--green);border-radius:3px;transition:width .3s;}

/* Character filter bar */
.char-filter-bar{margin-bottom:14px;background:var(--s2);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.cfb-hd{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border);}
.cfb-hd:hover{background:rgba(255,255,255,.02);}
.cfb-label{font-size:.74rem;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;flex:1;}
.cfb-count{font-size:.73rem;color:var(--muted);}
.cfb-toggle{font-size:.7rem;color:var(--muted);}
.cfb-body{padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
/* Account row */
.cfb-acc-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.cf-acc-btn{padding:4px 12px;border-radius:12px;border:1px solid var(--border-lit);background:var(--s1);color:var(--muted);cursor:pointer;font-size:.78rem;font-family:'Noto Sans KR',sans-serif;font-weight:700;transition:all .15s;flex-shrink:0;}
.cf-acc-btn:hover{border-color:var(--gold);color:var(--gold);}
.cf-acc-btn.all-on{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,.12);}
.cf-acc-btn.partial{border-color:rgba(200,168,75,.4);color:rgba(200,168,75,.7);background:rgba(200,168,75,.06);}
.cf-acc-sep{width:1px;height:20px;background:var(--border);flex-shrink:0;margin:0 2px;}
/* Character buttons */
.cf-btn{padding:4px 11px;border-radius:12px;border:1px solid var(--border);background:var(--s3);color:var(--muted);cursor:pointer;font-size:.79rem;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.cf-btn:hover{border-color:var(--border-lit);color:var(--text);}
.cf-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,.09);}

/* Account section */
.acc-section{margin-bottom:20px;}
.acc-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;user-select:none;padding:8px 12px;background:var(--s1);border:1px solid var(--border);border-radius:6px;transition:background .12s;}
.acc-prog-wrap{flex:1;min-width:60px;max-width:140px;height:5px;background:var(--s3);border-radius:3px;overflow:hidden;}
.acc-prog-bar{height:100%;border-radius:3px;transition:width .3s;}
.acc-header:hover{background:rgba(255,255,255,.02);}
.acc-toggle{font-size:.68rem;color:var(--muted);}
.acc-name{font-family:'Cinzel',serif;font-size:.92rem;color:var(--gold);flex:1;}
.acc-stat{font-size:.76rem;color:var(--muted);}
.acc-allclear{font-size:.74rem;color:var(--green);font-weight:600;}

/* Character card grid */
.char-grid{display:flex;flex-wrap:wrap;gap:10px;}
.char-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;overflow:hidden;min-width:220px;max-width:280px;flex:1;transition:border-color .15s;}
.char-card:hover{border-color:var(--border-lit);}
.char-card.all-done{border-color:rgba(46,204,113,.35);}
.cc-header{padding:9px 13px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.cc-name{font-size:.87rem;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-name.done{color:var(--green);}
.cc-meta{font-size:.68rem;color:var(--muted);flex-shrink:0;}
.cc-prog{font-size:.7rem;padding:1px 7px;border-radius:8px;border:1px solid var(--border);background:var(--s3);flex-shrink:0;white-space:nowrap;}
.cc-prog.done{color:var(--green);border-color:rgba(46,204,113,.35);}
.cc-body{padding:6px 10px;}

/* Raid task row */
.rt-row{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;border-radius:3px;transition:background .12s;}
.rt-row:last-child{border-bottom:none;}
.rt-row:hover{background:rgba(255,255,255,.03);}
.rt-row.done .rt-name{color:var(--muted);text-decoration:line-through;}
.rt-check{width:18px;height:18px;border:2px solid var(--border-lit);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;user-select:none;}
.rt-row:hover .rt-check{border-color:var(--gold);}
.rt-row.done .rt-check{background:var(--green);border-color:var(--green);}
.rt-check-icon{color:#fff;font-size:10px;opacity:0;font-weight:700;}
.rt-row.done .rt-check-icon{opacity:1;}
.rt-info{flex:1;min-width:0;}
.rt-name{font-size:.79rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rt-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;}
.rt-badge{font-size:.62rem;padding:0 5px;border-radius:6px;white-space:nowrap;}
.rt-gold{color:#f0c040;background:rgba(240,192,64,.1);border:1px solid rgba(240,192,64,.2);}
.rt-bound{color:var(--orange);background:rgba(230,126,34,.08);border:1px solid rgba(230,126,34,.2);}
.rt-bonus{color:#b39ddb;background:rgba(179,157,219,.08);border:1px solid rgba(179,157,219,.2);}
.rt-diff{color:var(--muted);background:var(--s3);border:1px solid var(--border);}
.rt-linked{color:var(--teal);background:rgba(26,188,156,.06);border:1px solid rgba(26,188,156,.2);}

/* Buttons */
.btn{padding:6px 12px;border-radius:var(--r);border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.8rem;transition:all .15s;display:inline-flex;align-items:center;gap:4px;line-height:1;}
.btn-sec{background:var(--s3);color:var(--text);border:1px solid var(--border-lit);}.btn-sec:hover{border-color:var(--gold);}
.btn-ghost{background:transparent;color:var(--muted);padding:4px 6px;font-size:.74rem;border-radius:3px;}.btn-ghost:hover{color:var(--text);}
.btn-sm{padding:4px 8px;font-size:.75rem;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-full{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:var(--muted);}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:var(--s1);}::-webkit-scrollbar-thumb{background:var(--border-lit);border-radius:3px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--s3);border:1px solid var(--gold-dim);color:var(--text);padding:9px 16px;border-radius:var(--r);font-size:.84rem;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:300;animation:toastIn .25s ease,toastOut .25s ease 2.25s forwards;}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes toastOut{to{opacity:0;transform:translateY(8px);}}
.diff-nightmare{color:#bb88ff;font-weight:600;}.diff-hard{color:#c8a04a;font-weight:600;}.diff-normal{color:#7a8090;font-weight:600;}

/* ─── Image Picker ─── */
.pick-bc{cursor:pointer;color:var(--gold);font-size:.78rem;}.pick-bc:hover{text-decoration:underline;}
.pick-folder{padding:7px 10px;background:var(--s3);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:.82rem;margin-bottom:5px;transition:border-color .12s;display:flex;align-items:center;gap:6px;}
.pick-folder:hover{border-color:var(--gold);}
.pick-imgs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.pick-img-wrap{width:64px;height:64px;border:2px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .12s;background:var(--s3);}
.pick-img-wrap:hover{border-color:var(--gold);}
.pick-img-wrap img{width:56px;height:56px;object-fit:contain;}
.pick-empty{font-size:.8rem;color:var(--muted);padding:20px;text-align:center;}
/* Icon display */
.entity-icon{width:22px;height:22px;object-fit:contain;border-radius:3px;flex-shrink:0;}
.entity-icon-sm{width:18px;height:18px;object-fit:contain;border-radius:2px;flex-shrink:0;}
.icon-btn{padding:2px 6px;font-size:.68rem;border:1px solid var(--border);border-radius:3px;background:var(--s3);color:var(--muted);cursor:pointer;transition:border-color .12s;}
.icon-btn:hover{border-color:var(--gold);color:var(--gold);}

</style>
</head>
<body>
<nav class="page-nav">
  <a href="index.html" class="pnav-item">⚔️ 숙제</a>
  <a href="core.html" class="pnav-item">🔮 코어현황</a>
  <a href="raid.html" class="pnav-item">🏰 레이드</a>
  <a href="overview.html" class="pnav-item active">📊 레이드 현황</a>
  <a href="parties.html" class="pnav-item">👥 파티 현황</a>
</nav>
<div class="header">
  <span>📊</span>
  <div class="header-title">레이드 현황</div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
    <span id="hdr-week" style="font-size:.74rem;color:var(--muted);padding:4px 8px;background:var(--s3);border:1px solid var(--border);border-radius:4px;"></span>
    <button class="btn btn-sec btn-sm" onclick="loadAll()">🔄 새로고침</button>
  </div>
</div>
<div class="main">
  <div id="loading" class="loading-full"><div class="spinner"></div> 불러오는 중...</div>
  <div id="content" style="display:none;">
    <div class="week-nav-bar">
      <button class="btn btn-sec btn-sm" onclick="moveWeek(-1)">◀ 이전</button>
      <span class="week-nav-label" id="week-label"></span>
      <button class="btn btn-sec btn-sm" onclick="moveWeek(1)">다음 ▶</button>
      <button class="btn btn-ghost btn-sm" onclick="goCurrentWeek()">이번 주</button>
    </div>
    <div class="char-filter-bar" id="char-filter-bar">
      <div class="cfb-hd" onclick="toggleFilterBar()">
        <span class="cfb-label">🔍 캐릭터 필터</span>
        <span class="cfb-count" id="cfb-count"></span>
        <button class="btn btn-sec btn-sm" onclick="event.stopPropagation();selectAllChars()">전체</button>
        <button class="btn btn-sec btn-sm" onclick="event.stopPropagation();deselectAllChars()">해제</button>
        <span class="cfb-toggle" id="cfb-toggle">▼</span>
      </div>
      <div class="cfb-body" id="cfb-body"></div>
    </div>
    <div id="summary-bar" class="summary-bar"></div>
    <div id="account-sections"></div>
  </div>
</div>
<script>
const{createClient}=supabase;
function getConfig(){const u=localStorage.getItem('la_url'),k=localStorage.getItem('la_key');return u&&k?{url:u,key:k}:null;}

let sb,accounts=[],characters=[],raidTasks=[];
let weekOffset=0;
let collapsedAccs=new Set(JSON.parse(localStorage.getItem('la_ov_collapsed')||'[]'));
let selectedChars=new Set(); // selected character ids for filter
let filterOpen=localStorage.getItem('la_ov_filter_open')!=='0';

const DAYS=['일','월','화','수','목','금','토'];

// ─── Init ───
async function init(){
  const cfg=getConfig();if(!cfg){window.location.href='index.html';return;}
  sb=createClient(cfg.url,cfg.key);
  await loadAll();
}
async function loadAll(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('content').style.display='none';
  const[r1,r2,r3,r4]=await Promise.all([
    sb.from('accounts').select('*').order('sort_order').order('created_at'),
    sb.from('characters').select('*').order('sort_order').order('created_at'),
    sb.from('raid_tasks').select('*').order('sort_order').order('created_at'),
    sb.from('raid_presets').select('id,name')
  ]);
  accounts=r1.data||[];characters=r2.data||[];raidTasks=r3.data||[];
  const presetsMap={};(r4.data||[]).forEach(p=>{presetsMap[p.id]=p.name;});
  raidTasks.forEach(t=>{
    if(t.preset_id&&presetsMap[t.preset_id]){
      t.preset_name=presetsMap[t.preset_id];
      // 아이콘 동기화
      const icon=localStorage.getItem('la_gicon_'+t.preset_name);
      if(icon)t.preset_icon=icon;
    }
  });
  // Init filter: all chars with raids selected by default
  const charsWithRaids=characters.filter(c=>raidTasks.some(t=>t.character_id===c.id));
  const saved=localStorage.getItem('la_ov_sel_chars');
  if(saved){try{const ids=JSON.parse(saved);selectedChars=new Set(ids.filter(id=>charsWithRaids.some(c=>c.id===id)));}catch{selectedChars=new Set(charsWithRaids.map(c=>c.id));}}
  else{selectedChars=new Set(charsWithRaids.map(c=>c.id));}
  await autoReset();
  updateWeekLabel();
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  renderFilterBar();
  render();
}

// ─── Week ───
function getWeekStart(off=0){
  const now=new Date(),kst=new Date(now.getTime()+9*3600000);
  let b=(kst.getUTCDay()-3+7)%7;if(b===0&&kst.getUTCHours()<6)b=7;
  const ws=new Date(kst);ws.setUTCDate(ws.getUTCDate()-b+off*7);ws.setUTCHours(6,0,0,0);return ws;
}
function getLastReset(){return getWeekStart(weekOffset);}
function isEffDone(t){
  if(!t.is_completed||!t.last_completed_at)return false;
  return new Date(t.last_completed_at)>getWeekStart(0); // always compare against current week reset
}
function nextResetLabel(){
  const next=new Date(getWeekStart(0));next.setUTCDate(next.getUTCDate()+7);
  const diff=next-Date.now();if(diff<=0)return'곧';
  const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
  return h>0?`${h}시간 후`:`${m}분 후`;
}
function updateWeekLabel(){
  const s=getWeekStart(weekOffset),e=new Date(s);e.setUTCDate(e.getUTCDate()+6);
  const f=x=>`${x.getUTCMonth()+1}/${x.getUTCDate()}`;
  const label=weekOffset===0?`이번 주 (${f(s)} ~ ${f(e)})`:`${f(s)} (수) ~ ${f(e)} (화)`;
  document.getElementById('week-label').textContent=label;
  document.getElementById('hdr-week').textContent=`${f(s)} ~ ${f(e)}`;
}
function moveWeek(n){weekOffset+=n;updateWeekLabel();render();}
function goCurrentWeek(){weekOffset=0;updateWeekLabel();render();}
async function autoReset(){
  const lr=getWeekStart(0);
  const toReset=raidTasks.filter(t=>t.is_completed&&t.last_completed_at&&new Date(t.last_completed_at)<=lr);
  if(!toReset.length)return;
  await sb.from('raid_tasks').update({is_completed:false,last_completed_at:null}).in('id',toReset.map(t=>t.id));
  toReset.forEach(t=>{t.is_completed=false;t.last_completed_at=null;});
}

// ─── Filter ───
function saveFilter(){localStorage.setItem('la_ov_sel_chars',JSON.stringify([...selectedChars]));}
function toggleFilterBar(){filterOpen=!filterOpen;localStorage.setItem('la_ov_filter_open',filterOpen?'1':'0');applyFilterOpenState();}
function applyFilterOpenState(){document.getElementById('cfb-body').style.display=filterOpen?'flex':'none';document.getElementById('cfb-toggle').textContent=filterOpen?'▼':'▶';}
function renderFilterBar(){
  const charsWithRaids=characters.filter(c=>raidTasks.some(t=>t.character_id===c.id));
  let html='';
  const mainAccs=accounts.filter(a=>!a.parent_account_id);
  const renderRow=(label,chars,sub=false)=>{
    if(!chars.length)return'';
    const allOn=chars.every(c=>selectedChars.has(c.id)),anyOn=chars.some(c=>selectedChars.has(c.id));
    const ids=chars.map(c=>c.id);
    let row=`<div class="cfb-acc-row" ${sub?'style="margin-left:14px;"':''}>`;
    row+=`<button class="cf-acc-btn ${allOn?'all-on':anyOn?'partial':''}" onclick="toggleCharGroup([${ids.map(id=>`'${id}'`).join(',')}])" ${sub?'style="font-size:.72rem;"':''}}>${esc(label)}</button>`;
    row+=`<div class="cf-acc-sep"></div>`;
    chars.forEach(c=>{row+=`<button class="cf-btn ${selectedChars.has(c.id)?'on':''}" onclick="toggleChar('${c.id}')">${esc(c.name)}${c.item_level?` <span style="font-size:.67rem;opacity:.6">Lv.${c.item_level}</span>`:''}</button>`;});
    row+=`</div>`;return row;
  };
  mainAccs.forEach(acc=>{
    const mainChars=charsWithRaids.filter(c=>c.account_id===acc.id);
    const subAccs=accounts.filter(a=>a.parent_account_id===acc.id);
    const subChars=subAccs.flatMap(sa=>charsWithRaids.filter(c=>c.account_id===sa.id));
    html+=renderRow(acc.name,mainChars);
    html+=renderRow(acc.name+'-부계정',subChars,true);
  });
  accounts.filter(a=>a.parent_account_id&&!accounts.some(m=>m.id===a.parent_account_id)).forEach(acc=>{
    const chars=charsWithRaids.filter(c=>c.account_id===acc.id);
    html+=renderRow(acc.name,chars);
  });
  document.getElementById('cfb-body').innerHTML=html;
  const cnt=document.getElementById('cfb-count');
  if(cnt)cnt.textContent=`${selectedChars.size}/${charsWithRaids.length}명`;
  applyFilterOpenState();
}
function toggleCharGroup(ids){const allOn=ids.every(id=>selectedChars.has(id));ids.forEach(id=>{if(allOn)selectedChars.delete(id);else selectedChars.add(id);});saveFilter();renderFilterBar();render();}
function toggleChar(id){if(selectedChars.has(id))selectedChars.delete(id);else selectedChars.add(id);saveFilter();renderFilterBar();render();}
function selectAllChars(){const ci=characters.filter(c=>raidTasks.some(t=>t.character_id===c.id));selectedChars=new Set(ci.map(c=>c.id));saveFilter();renderFilterBar();render();}
function deselectAllChars(){selectedChars.clear();saveFilter();renderFilterBar();render();}

// ─── Render ───
function render(){
  // Summary - only selected chars
  let totalRaids=0,doneRaids=0,totalGold=0,earnedGold=0,totalBound=0;
  [...selectedChars].forEach(cid=>{
    raidTasks.filter(t=>t.character_id===cid).forEach(t=>{
      totalRaids++;
      const flow=(Number(t.clear_gold)||0)-(Number(t.bound_gold)||0);
      const bg=Number(t.bound_gold)||0;
      if(t.receive_gold!==false){totalGold+=flow;totalBound+=bg;}
      if(isEffDone(t)&&t.receive_gold!==false){doneRaids++;earnedGold+=flow;}
      else if(isEffDone(t)&&t.receive_gold===false)doneRaids++;
    });
  });
  const pct=totalRaids?Math.round(doneRaids/totalRaids*100):0;
  document.getElementById('summary-bar').innerHTML=`
    <div class="sum-item done">레이드 완료 <b>${doneRaids}/${totalRaids}</b></div>
    <div class="sum-prog"><div class="sum-prog-bar" style="width:${pct}%"></div></div>
    <div class="sum-item gold">유통골드 <b>${earnedGold.toLocaleString()} / ${totalGold.toLocaleString()} G</b></div>
    ${weekOffset===0?`<div class="sum-item" style="margin-left:auto;font-size:.72rem;color:var(--dim);">초기화 ${nextResetLabel()}</div>`:''}`;

  // Account sections - filtered
  document.getElementById('account-sections').innerHTML=accounts.map(acc=>{
    const allCharsOfAcc=characters.filter(c=>c.account_id===acc.id);
    const withRaids=allCharsOfAcc.filter(c=>raidTasks.some(t=>t.character_id===c.id)&&selectedChars.has(c.id));
    if(!withRaids.length)return'';
    const accTotal=withRaids.reduce((s,c)=>s+raidTasks.filter(t=>t.character_id===c.id).length,0);
    const accDone=withRaids.reduce((s,c)=>s+raidTasks.filter(t=>t.character_id===c.id&&isEffDone(t)).length,0);
    const accFlow=withRaids.reduce((s,c)=>s+raidTasks.filter(t=>t.character_id===c.id&&t.receive_gold!==false).reduce((ss,t)=>ss+(Number(t.clear_gold)||0)-(Number(t.bound_gold)||0),0),0);
    const accBound=withRaids.reduce((s,c)=>s+raidTasks.filter(t=>t.character_id===c.id&&t.receive_gold!==false).reduce((ss,t)=>ss+(Number(t.bound_gold)||0),0),0);
    const accEarnedFlow=withRaids.reduce((s,c)=>s+raidTasks.filter(t=>t.character_id===c.id&&isEffDone(t)&&t.receive_gold!==false).reduce((ss,t)=>ss+(Number(t.clear_gold)||0)-(Number(t.bound_gold)||0),0),0);
    const isOpen=!collapsedAccs.has(acc.id);
    const allClear=accDone===accTotal&&accTotal>0;
    const accPct=accTotal?Math.round(accDone/accTotal*100):0;
    return`<div class="acc-section">
      <div class="acc-header" onclick="toggleAcc('${acc.id}')">
        <span class="acc-toggle">${isOpen?'▼':'▶'}</span>
        <span class="acc-name">${esc(acc.name)}</span>
        <span class="acc-stat">${accDone}/${accTotal}</span>
        <div class="acc-prog-wrap"><div class="acc-prog-bar" style="width:${accPct}%;background:${allClear?'var(--green)':'var(--teal)'};"></div></div>
        ${accFlow?`<span style="font-size:.72rem;color:#f0c040;">💰 유통 ${accEarnedFlow.toLocaleString()}/${accFlow.toLocaleString()}G</span>`:''}
        ${accBound?`<span style="font-size:.72rem;color:var(--orange);">귀속 ${accBound.toLocaleString()}G</span>`:''}
        ${allClear?`<span class="acc-allclear">✓ 올클</span>`:''}
      </div>
      ${isOpen?`<div class="char-grid">${withRaids.map(c=>charCardHTML(c)).join('')}</div>`:''}
    </div>`;
  }).join('');
}

function charCardHTML(c){
  const tasks=raidTasks.filter(t=>t.character_id===c.id).sort((a,b)=>a.sort_order-b.sort_order);
  if(!tasks.length)return'';
  const done=tasks.filter(t=>isEffDone(t)).length,tot=tasks.length;
  const allDone=done===tot;
  return`<div class="char-card ${allDone?'all-done':''}">
    <div class="cc-header">
      <div class="cc-name ${allDone?'done':''}"><span style="display:flex;align-items:center;gap:4px;">${iconImg(c.icon_url||'','entity-icon-sm')}${esc(c.name)}</span></div>
      ${c.class_name?`<div class="cc-meta">${esc(c.class_name)}</div>`:''}
      ${c.item_level?`<div class="cc-meta">Lv.${c.item_level}</div>`:''}
      <div class="cc-prog ${allDone?'done':''}">${done}/${tot}${allDone?' ✓':''}</div>
    </div>
    <div class="cc-body">
      ${tasks.map(t=>raidTaskRowHTML(t)).join('')}
    </div>
  </div>`;
}

function raidTaskRowHTML(t){
  const done=isEffDone(t);
  const raidName=t.preset_name||t.name;
  const gc=getGroupColor(raidName);
  const dc=diffClass(t.difficulty||'');
  return`<div class="rt-row ${done?'done':''}" id="ov-rti-${t.id}" onclick="toggleRaidTask('${t.id}')">
    <div class="rt-check"><span class="rt-check-icon">✓</span></div>
    <div class="rt-info">
      <div class="rt-name" style="display:flex;align-items:center;gap:4px;">${iconImg(localStorage.getItem('la_gicon_'+raidName)||'','entity-icon-sm')}<span style="color:${gc};">${esc(raidName)}</span>${t.difficulty?` <span class="${dc}" style="font-size:.72rem;margin-left:2px;">${esc(t.difficulty)}</span>`:''}</div>
    </div>
  </div>`;
}

// ─── Toggle (★ 핵심 수정: await 로 실제 DB 저장 보장) ───
async function toggleRaidTask(taskId){
  const t=raidTasks.find(x=>x.id===taskId);if(!t)return;
  const nowDone=!isEffDone(t);
  const ts=nowDone?new Date().toISOString():null;
  const up={is_completed:nowDone,last_completed_at:ts};
  // DOM update immediately
  const el=document.getElementById('ov-rti-'+taskId);
  if(el){
    el.classList.toggle('done',nowDone);
    const icon=el.querySelector('.rt-check-icon');if(icon)icon.style.opacity=nowDone?'1':'0';
    const cb=el.querySelector('.rt-check');if(cb){cb.style.background=nowDone?'var(--green)':'';cb.style.borderColor=nowDone?'var(--green)':'var(--border-lit)';}
    const nm=el.querySelector('.rt-name');if(nm){nm.style.color=nowDone?'var(--muted)':'';nm.style.textDecoration=nowDone?'line-through':'';}
  }
  // Memory update
  Object.assign(t,up);
  // Summary re-render (lightweight)
  renderSummary();
  // ★ await: Supabase JS v2에서 await 없으면 쿼리 미실행
  const{error}=await sb.from('raid_tasks').update(up).eq('id',taskId);
  if(error){toast('❗ 저장 실패: '+error.message);return;}
}

function renderSummary(){
  let totalRaids=0,doneRaids=0,totalGold=0,earnedGold=0,totalBound=0;
  [...selectedChars].forEach(cid=>{raidTasks.filter(t=>t.character_id===cid).forEach(t=>{totalRaids++;const flow=(Number(t.clear_gold)||0)-(Number(t.bound_gold)||0);const bg=Number(t.bound_gold)||0;if(t.receive_gold!==false){totalGold+=flow;totalBound+=bg;}if(isEffDone(t)&&t.receive_gold!==false){doneRaids++;earnedGold+=flow;}else if(isEffDone(t))doneRaids++;});});
  const pct=totalRaids?Math.round(doneRaids/totalRaids*100):0;
  const sb2=document.getElementById('summary-bar');
  if(sb2)sb2.innerHTML=`<div class="sum-item done">레이드 완료 <b>${doneRaids}/${totalRaids}</b></div><div class="sum-prog"><div class="sum-prog-bar" style="width:${pct}%"></div></div><div class="sum-item gold">유통골드 <b>${earnedGold.toLocaleString()} / ${totalGold.toLocaleString()} G</b></div>${totalBound?`<div class="sum-item" style="color:var(--orange);">귀속골드 <b>${totalBound.toLocaleString()} G</b></div>`:''}<div class="sum-item">남은 유통 <b style="color:${totalGold-earnedGold>0?'var(--orange)':'var(--green)'}">${(totalGold-earnedGold).toLocaleString()} G</b></div>${weekOffset===0?`<div class="sum-item" style="margin-left:auto;font-size:.72rem;color:var(--dim);">초기화 ${nextResetLabel()}</div>`:''}`;
}

function toggleAcc(id){
  if(collapsedAccs.has(id))collapsedAccs.delete(id);else collapsedAccs.add(id);
  localStorage.setItem('la_ov_collapsed',JSON.stringify([...collapsedAccs]));
  render();
}

function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2600);}

// ─── Image Picker (shared) ───
const ICON_REPO='ghk71/LoAHomeworkCheck';
const ICON_RAW=`https://raw.githubusercontent.com/${ICON_REPO}/main/`;
const ICON_API=`https://api.github.com/repos/${ICON_REPO}/contents/`;
let _pickerCb=null;
function iconImg(url,cls='entity-icon'){return url?`<img class="${cls}" src="${url}" onerror="this.style.display='none'">`:'';} 

async function openImagePicker(cb,path='images/'){
  _pickerCb=cb;
  document.getElementById('picker-content').innerHTML='<div class="pick-empty"><div class="spinner"></div></div>';
  openModal('modal-img-picker');
  await loadPickerDir(path);
}
async function loadPickerDir(path){
  const cKey='la_ic_'+path;
  let items;
  try{const c=sessionStorage.getItem(cKey);if(c)items=JSON.parse(c);}catch{}
  if(!items){
    const r=await fetch(ICON_API+path);
    if(!r.ok){document.getElementById('picker-content').innerHTML='<div class="pick-empty">폴더를 불러올 수 없습니다<br><small>images/ 폴더가 repo에 있는지 확인하세요</small></div>';return;}
    items=await r.json();
    try{sessionStorage.setItem(cKey,JSON.stringify(items));}catch{}
  }
  const dirs=items.filter(x=>x.type==='dir');
  const imgs=items.filter(x=>x.type==='file'&&/\.(png|jpg|jpeg|gif|webp|svg)$/i.test(x.name));
  // Breadcrumb
  const parts=path.replace(/^\/images\//,'').replace(/^images\//,'').split('/').filter(Boolean);
  let bc=`<span class="pick-bc" onclick="loadPickerDir('images/')">images</span>`;
  let cum='images/';parts.forEach(p=>{cum+=p+'/';bc+=` / <span class="pick-bc" onclick="loadPickerDir('${cum}')">${p}</span>`;});
  document.getElementById('picker-breadcrumb').innerHTML=bc;
  // Content
  let html='';
  if(dirs.length){html+=dirs.map(d=>`<div class="pick-folder" onclick="loadPickerDir('${path}${d.name}/')">📁 ${d.name}</div>`).join('');}
  if(imgs.length){html+=`<div class="pick-imgs">${imgs.map(f=>{const url=ICON_RAW+f.path;return`<div class="pick-img-wrap" title="${f.name}" onclick="selectPickerImg('${url}')"><img src="${url}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`;}).join('')}</div>`;}
  if(!dirs.length&&!imgs.length)html='<div class="pick-empty">이미지가 없습니다</div>';
  document.getElementById('picker-content').innerHTML=html;
}
function selectPickerImg(url){if(_pickerCb)_pickerCb(url);closeModal('modal-img-picker');}
function pickerRemoveIcon(){if(_pickerCb)_pickerCb(null);closeModal('modal-img-picker');}

function getGroupColor(name){return localStorage.getItem('la_gc_'+name)||'#4caf50';}
function diffClass(d){if(!d)return'';const dl=d.toLowerCase();if(dl.includes('나이트메어')||dl.includes('3단계'))return'diff-nightmare';if(dl.includes('하드')||dl.includes('2단계'))return'diff-hard';if(dl.includes('노말')||dl.includes('1단계'))return'diff-normal';return'';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
init();
</script>

<!-- Image Picker Modal -->
<div class="overlay" id="modal-img-picker"><div class="modal" style="max-width:520px;height:70vh;display:flex;flex-direction:column;">
  <div class="modal-title">🖼️ 아이콘 선택</div>
  <div id="picker-breadcrumb" style="font-size:.78rem;padding:2px 0 8px;color:var(--muted);flex-shrink:0;border-bottom:1px solid var(--border);margin-bottom:8px;"></div>
  <div id="picker-content" style="flex:1;overflow-y:auto;"></div>
  <div class="modal-footer" style="margin-top:8px;">
    <button class="btn btn-danger btn-sm" style="margin-right:auto;" onclick="pickerRemoveIcon()">🗑 아이콘 제거</button>
    <button class="btn btn-sec" onclick="closeModal('modal-img-picker')">취소</button>
  </div>
</div></div>
